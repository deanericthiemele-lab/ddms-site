<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Constructions BLR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Firebase Realtime Database -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, push, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcXkL5jdFj9TDsKAhIXds_bl82v24U5xw",
  authDomain: "production-c3930.firebaseapp.com",
  projectId: "production-c3930",
  databaseURL: "https://production-c3930-default-rtdb.europe-west1.firebasedatabase.app",
  storageBucket: "production-c3930.firebasestorage.app",
  messagingSenderId: "69326528736",
  appId: "1:69326528736:web:b8c1fa13421728ddc73885"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window._blrData = {};
window._db = db;
window._dbRef = ref;
window._dbSet = set;
window._dbPush = push;
window._dbRemove = remove;

onValue(ref(db, "blr_constructions"), (snapshot) => {
  window._blrData = snapshot.val() || {};
  if (typeof window.renderTable === "function") window.renderTable();
});

window._saveRow = async function(id, data){
  if(id){
    await set(ref(db, "blr_constructions/" + id), data);
  } else {
    const newRef = push(ref(db, "blr_constructions"));
    await set(newRef, data);
  }
};

window._deleteRow = async function(id){
  await remove(ref(db, "blr_constructions/" + id));
};

window._statutOptions = [];
onValue(ref(db, "blr_statut_options"), (snapshot) => {
  const data = snapshot.val();
  window._statutOptions = Array.isArray(data) ? data : (data ? Object.values(data) : []);
  if (typeof window.refreshStatutSelect === "function") window.refreshStatutSelect();
  if (typeof window.renderTable === "function") window.renderTable();
});

window._addStatutOption = async function(val){
  val = (val || "").trim();
  if(!val) return;
  if(window._statutOptions.includes(val)) return;
  const updated = [...window._statutOptions, val];
  await set(ref(db, "blr_statut_options"), updated);
};
</script>

<style>
body{font-family:Arial,sans-serif;margin:10px;font-size:14px}
button{background:#d3d3d3;border:none;padding:6px 10px;border-radius:6px;font-size:13px;cursor:pointer;margin-right:6px}
button:hover{filter:brightness(.95)}
button.primary{background:#2563eb;color:#fff}
button.danger{background:#dc2626;color:#fff}
h1{border:1px solid #ccc;border-radius:6px;padding:8px;font-size:16px;font-weight:bold;margin-bottom:6px}
.search-zone{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.search-zone input[type="text"]{padding:6px 8px;border:1px solid #aaa;border-radius:6px;width:280px}
table{border-collapse:collapse;width:100%;margin-top:10px}
th,td{border:1px solid #ccc;padding:6px;font-size:13px}
th{background:#eee;cursor:pointer;white-space:nowrap}
th:hover{background:#e0e0e0}
td.actions{white-space:nowrap;text-align:center}
.popup{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:1000}
.popup.open{display:flex}
.popup-content{background:#fff;border-radius:8px;padding:15px;width:520px;max-height:85vh;overflow:auto}
.popup-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.close{cursor:pointer;font-weight:bold;font-size:18px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid label{display:flex;flex-direction:column;font-size:12px;color:#555;gap:3px}
.form-grid input,.form-grid select{padding:6px 8px;border:1px solid #aaa;border-radius:6px;font-size:13px}
.form-grid .full{grid-column:1/3}
.empty-msg{padding:20px;text-align:center;color:#888}
.gps-link{color:#2563eb;text-decoration:underline}
</style>
</head>
<body>

<button onclick="location.href='suivi_dossiers.html'">Retour</button>
<button onclick="location.href='lte.html'">LTE</button>

<h1 id="resume">Constructions BLR : 0</h1>

<div class="search-zone">
  <input type="text" id="searchInput" placeholder="Rechercher client, site, localisation, équipement..."/>
  <select id="anneeFilter" style="padding:6px 8px;border:1px solid #aaa;border-radius:6px;">
    <option value="">📅 Toutes les années</option>
  </select>
  <button class="primary" id="btnAdd">+ Ajouter une liaison</button>
  <button id="btnExport">Exporter Excel</button>
  <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none"/>
  <button id="btnImport">Importer Excel</button>
</div>

<table id="tableBlr">
<thead>
<tr>
<th data-key="cout">Coût</th>
<th data-key="bc">Bon de commande</th>
<th data-key="montantBc">Montant BC</th>
<th data-key="fournisseur">Fournisseur</th>
<th data-key="annee">Année</th>
<th data-key="client">Client</th>
<th data-key="site">Site</th>
<th data-key="localisation">Localisation</th>
<th data-key="debit">Débit</th>
<th data-key="gps">GPS</th>
<th data-key="architecture">Architecture</th>
<th data-key="equipement">Équipement</th>
<th data-key="modele">Modèle</th>
<th data-key="ip">Adresse IP</th>
<th data-key="dateInstall">Date installation</th>
<th data-key="statut">Statut</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- Popup ajout / édition -->
<div class="popup" id="popupForm">
 <div class="popup-content">
  <div class="popup-header">
   <h2 id="popupTitle">Ajouter une liaison BLR</h2>
   <span class="close" onclick="closePopup()">✕</span>
  </div>
  <div class="form-grid">
    <label>Coût
      <input type="text" id="f_cout" placeholder="ex: 1 500 000 FCFA"/>
    </label>
    <label>Bon de commande
      <input type="text" id="f_bc" placeholder="ex: BC-2026-001"/>
    </label>
    <label>Montant Bon de commande
      <input type="text" id="f_montantBc" placeholder="ex: 1 500 000 FCFA"/>
    </label>
    <label>Fournisseur
      <input type="text" id="f_fournisseur"/>
    </label>
    <label>Année
      <input type="text" id="f_annee" placeholder="2026"/>
    </label>
    <label>Client
      <input type="text" id="f_client"/>
    </label>
    <label>Site
      <input type="text" id="f_site"/>
    </label>
    <label>Localisation
      <input type="text" id="f_localisation"/>
    </label>
    <label>Débit
      <input type="text" id="f_debit" placeholder="ex: 10 Mbps"/>
    </label>
    <label>GPS
      <input type="text" id="f_gps" placeholder="ex: 5.345, -4.024"/>
    </label>
    <label>Architecture
      <input type="text" id="f_architecture" placeholder="ex: PtP, PtMP"/>
    </label>
    <label>Équipement
      <input type="text" id="f_equipement"/>
    </label>
    <label>Modèle
      <input type="text" id="f_modele"/>
    </label>
    <label>Adresse IP
      <input type="text" id="f_ip"/>
    </label>
    <label>Date installation
      <input type="date" id="f_dateInstall"/>
    </label>
    <label class="full">Statut
      <div style="display:flex;gap:6px;align-items:center">
        <select id="f_statut" style="flex:1;padding:6px 8px;border:1px solid #aaa;border-radius:6px;font-size:13px">
          <option value="">-- Sélectionner --</option>
        </select>
        <button type="button" id="btnAddStatut" title="Ajouter un statut à la liste" style="padding:6px 10px">+</button>
      </div>
    </label>
  </div>
  <div style="margin-top:14px;text-align:right">
    <button onclick="closePopup()">Annuler</button>
    <button class="primary" id="btnSave">Enregistrer</button>
  </div>
 </div>
</div>

<script>
const FIELDS = ["cout","bc","montantBc","fournisseur","annee","client","site","localisation","debit","gps","architecture","equipement","modele","ip","dateInstall","statut"];
let editingId = null;
let sortKey = null, sortDir = 1;
let currentRows = []; // dernières lignes affichées (après recherche/filtre/tri) -> utilisées pour l'export dynamique

// Formate un montant en ajoutant des séparateurs de milliers, en conservant un éventuel suffixe (ex: "FCFA")
function formatMontant(val){
  if(val === undefined || val === null || val === "") return "";
  const str = String(val).trim();
  const match = str.match(/^([\d\s.,]+)(.*)$/);
  if(!match) return escapeHtml(str);
  let numPart = match[1].replace(/[\s,]/g, "");
  let suffix = match[2].trim();
  if(!numPart) return escapeHtml(str);
  const num = parseFloat(numPart);
  if(isNaN(num)) return escapeHtml(str);
  const formatted = num.toLocaleString("fr-FR");
  return escapeHtml(formatted + (suffix ? " " + suffix : ""));
}

// Tente de parser une date dans différents formats (ISO yyyy-mm-dd, jj/mm/aaaa, numéro de série Excel)
function parseDate(val){
  if(!val) return null;
  const str = String(val).trim();
  let m = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m){
    const d = new Date(+m[1], +m[2]-1, +m[3]);
    return isNaN(d.getTime()) ? null : d;
  }
  m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m){
    const d = new Date(+m[3], +m[2]-1, +m[1]);
    return isNaN(d.getTime()) ? null : d;
  }
  if(/^\d+$/.test(str)){
    const num = parseInt(str, 10);
    if(num > 20000 && num < 60000){
      const epoch = new Date(1899, 11, 30);
      return new Date(epoch.getTime() + num * 86400000);
    }
  }
  return null;
}

// Affiche la date au format jj/mm/aaaa ; si non reconnue, ne pas planter, afficher la valeur brute
function formatDateFr(val){
  if(!val) return "";
  const d = parseDate(val);
  if(!d) return escapeHtml(String(val));
  const dd = String(d.getDate()).padStart(2, "0");
  const mm = String(d.getMonth()+1).padStart(2, "0");
  const yyyy = d.getFullYear();
  return `${dd}/${mm}/${yyyy}`;
}

function refreshStatutSelect(){
  const sel = document.getElementById("f_statut");
  if(!sel) return;
  const current = sel.value;
  sel.innerHTML = '<option value="">-- Sélectionner --</option>' +
    (window._statutOptions || []).map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join("");
  sel.value = current;
}
window.refreshStatutSelect = refreshStatutSelect;

function openPopup(id){
  editingId = id || null;
  document.getElementById("popupTitle").textContent = id ? "Modifier la liaison BLR" : "Ajouter une liaison BLR";
  refreshStatutSelect();
  const row = id ? (window._blrData[id] || {}) : {};
  FIELDS.forEach(f => { document.getElementById("f_"+f).value = row[f] || ""; });
  document.getElementById("popupForm").classList.add("open");
}
function closePopup(){
  document.getElementById("popupForm").classList.remove("open");
  editingId = null;
}
window.openPopup = openPopup;
window.closePopup = closePopup;

document.getElementById("btnAdd").onclick = () => openPopup(null);

document.getElementById("btnAddStatut").onclick = async () => {
  const val = prompt("Nouveau statut à ajouter à la liste :");
  if(val && val.trim()){
    await window._addStatutOption(val.trim());
    const sel = document.getElementById("f_statut");
    sel.value = val.trim();
  }
};

document.getElementById("btnSave").onclick = async () => {
  const data = {};
  FIELDS.forEach(f => { data[f] = document.getElementById("f_"+f).value.trim(); });
  if(!data.client && !data.site){
    alert("Merci de renseigner au moins le client ou le site.");
    return;
  }
  await window._saveRow(editingId, data);
  closePopup();
};

window.editRow = (id) => openPopup(id);
window.deleteRow = async (id) => {
  if(confirm("Supprimer cette liaison BLR ?")){
    await window._deleteRow(id);
  }
};

function escapeHtml(s){
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function gpsCell(gps){
  if(!gps) return "";
  const clean = gps.trim();
  const url = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(clean);
  return `<a class="gps-link" href="${url}" target="_blank">${escapeHtml(clean)}</a>`;
}

function renderTable(){
  const data = window._blrData || {};
  const search = (document.getElementById("searchInput").value || "").toLowerCase();
  const anneeFilter = document.getElementById("anneeFilter").value;

  // peupler le filtre annee
  const annees = new Set();
  Object.values(data).forEach(r => { if(r.annee) annees.add(r.annee); });
  const annSel = document.getElementById("anneeFilter");
  const current = annSel.value;
  annSel.innerHTML = '<option value="">📅 Toutes les années</option>' +
    Array.from(annees).sort().reverse().map(a => `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join("");
  annSel.value = current;

  let rows = Object.entries(data).map(([id, r]) => ({id, ...r}));

  if(anneeFilter){
    rows = rows.filter(r => r.annee === anneeFilter);
  }
  if(search){
    rows = rows.filter(r => FIELDS.some(f => (r[f] || "").toLowerCase().includes(search)));
  }
  if(sortKey){
    rows.sort((a,b) => {
      if(sortKey === "dateInstall"){
        const da = parseDate(a.dateInstall);
        const db = parseDate(b.dateInstall);
        if(da && db) return (da - db) * sortDir;
        if(da && !db) return -1;
        if(!da && db) return 1;
        return 0;
      }
      const va = (a[sortKey] || "").toString().toLowerCase();
      const vb = (b[sortKey] || "").toString().toLowerCase();
      if(va < vb) return -1*sortDir;
      if(va > vb) return 1*sortDir;
      return 0;
    });
  } else {
    // Tri par défaut : statut "En cours" en premier, puis date d'installation la plus récente
    // Les valeurs de date non reconnues ne bloquent pas le tri (placées en fin de liste)
    rows.sort((a,b) => {
      const aEnCours = (a.statut || "").toLowerCase().includes("en cours") ? 0 : 1;
      const bEnCours = (b.statut || "").toLowerCase().includes("en cours") ? 0 : 1;
      if(aEnCours !== bEnCours) return aEnCours - bEnCours;
      const da = parseDate(a.dateInstall);
      const db = parseDate(b.dateInstall);
      if(da && db) return db - da;
      if(da && !db) return -1;
      if(!da && db) return 1;
      return 0;
    });
  }

  currentRows = rows;

  document.getElementById("resume").textContent = "Constructions BLR : " + rows.length;

  const tbody = document.querySelector("#tableBlr tbody");
  if(rows.length === 0){
    tbody.innerHTML = `<tr><td colspan="17" class="empty-msg">Aucune liaison BLR enregistrée</td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>${formatMontant(r.cout)}</td>
      <td>${escapeHtml(r.bc)}</td>
      <td>${formatMontant(r.montantBc)}</td>
      <td>${escapeHtml(r.fournisseur)}</td>
      <td>${escapeHtml(r.annee)}</td>
      <td>${escapeHtml(r.client)}</td>
      <td>${escapeHtml(r.site)}</td>
      <td>${escapeHtml(r.localisation)}</td>
      <td>${escapeHtml(r.debit)}</td>
      <td>${gpsCell(r.gps)}</td>
      <td>${escapeHtml(r.architecture)}</td>
      <td>${escapeHtml(r.equipement)}</td>
      <td>${escapeHtml(r.modele)}</td>
      <td>${escapeHtml(r.ip)}</td>
      <td>${formatDateFr(r.dateInstall)}</td>
      <td>${escapeHtml(r.statut)}</td>
      <td class="actions">
        <button onclick="editRow('${r.id}')">✏️</button>
        <button class="danger" onclick="deleteRow('${r.id}')">🗑️</button>
      </td>
    </tr>
  `).join("");
}
window.renderTable = renderTable;

document.getElementById("searchInput").addEventListener("input", renderTable);
document.getElementById("anneeFilter").addEventListener("change", renderTable);

document.querySelectorAll("#tableBlr th[data-key]").forEach(th => {
  th.addEventListener("click", () => {
    const key = th.dataset.key;
    if(sortKey === key){ sortDir *= -1; } else { sortKey = key; sortDir = 1; }
    renderTable();
  });
});

// Export Excel — tient compte de la recherche / du filtre année / du tri en cours
document.getElementById("btnExport").onclick = () => {
  const rows = (currentRows && currentRows.length) ? currentRows : Object.values(window._blrData || {});
  const exportRows = rows.map(r => ({
    "Coût": r.cout || "",
    "Bon de commande": r.bc || "",
    "Montant BC": r.montantBc || "",
    "Fournisseur": r.fournisseur || "",
    "Année": r.annee || "",
    "Client": r.client || "",
    "Site": r.site || "",
    "Localisation": r.localisation || "",
    "Débit": r.debit || "",
    "GPS": r.gps || "",
    "Architecture": r.architecture || "",
    "Équipement": r.equipement || "",
    "Modèle": r.modele || "",
    "Adresse IP": r.ip || "",
    "Date installation": formatDateFr(r.dateInstall) || (r.dateInstall || ""),
    "Statut": r.statut || ""
  }));
  const headers = ["Coût","Bon de commande","Montant BC","Fournisseur","Année","Client","Site","Localisation","Débit","GPS","Architecture","Équipement","Modèle","Adresse IP","Date installation","Statut"];
  const ws = XLSX.utils.json_to_sheet(exportRows, { header: headers });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "BLR");
  XLSX.writeFile(wb, "constructions_BLR.xlsx");
};

// Import Excel
document.getElementById("btnImport").onclick = () => document.getElementById("fileInput").click();
document.getElementById("fileInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (evt) => {
    const wb = XLSX.read(evt.target.result, {type:"binary"});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws, {defval:""});
    const map = {
      "Coût":"cout","Cout":"cout",
      "Bon de commande":"bc","BC":"bc",
      "Montant BC":"montantBc","Montant Bon de commande":"montantBc",
      "Fournisseur":"fournisseur",
      "Année":"annee","Annee":"annee",
      "Client":"client",
      "Site":"site",
      "Localisation":"localisation",
      "Débit":"debit","Debit":"debit",
      "GPS":"gps",
      "Architecture":"architecture",
      "Équipement":"equipement","Equipement":"equipement",
      "Modèle":"modele","Modele":"modele",
      "Adresse IP":"ip","IP":"ip",
      "Date installation":"dateInstall",
      "Statut":"statut"
    };
    let count = 0;
    for(const row of json){
      const data = {};
      Object.keys(row).forEach(k => {
        const key = map[k.trim()];
        if(key) data[key] = String(row[k]).trim();
      });
      if(data.statut) await window._addStatutOption(data.statut);
      if(Object.keys(data).length){
        await window._saveRow(null, data);
        count++;
      }
    }
    alert(count + " ligne(s) importée(s).");
    e.target.value = "";
  };
  reader.readAsBinaryString(file);
});

renderTable();
</script>

</body>
</html>
