<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Carte Incidents Abidjan - Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

  <style>
    body { margin:0; font-family: Arial, sans-serif; }
    #map { height: 100vh; }

    /* Bouton retour */
    .btn-back {
      padding:8px 12px;
      font-weight:bold;
      border:none;
      border-radius:5px;
      background:#111;
      color:white;
      cursor:pointer;
    }

    /* Sélecteur mois (haut droite) */
    .month-selector {
      position:absolute;
      top:15px;
      right:20px;
      background:white;
      padding:8px 12px;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
      border-radius:6px;
      z-index:1000;
      font-weight:bold;
      display:flex;
      gap:8px;
      align-items:center;
    }

    /* Dropdown multi-mois */
    #monthDropdownBtn {
      padding:5px 10px;
      border:1px solid #ccc;
      border-radius:5px;
      background:white;
      cursor:pointer;
      font-size:13px;
      font-weight:bold;
      min-width:110px;
      text-align:left;
    }
    #monthDropdownPanel {
      display:none;
      position:absolute;
      top:44px;
      right:0;
      background:white;
      border-radius:8px;
      box-shadow:0 4px 20px rgba(0,0,0,0.2);
      padding:10px 0;
      z-index:2000;
      min-width:200px;
      max-height:420px;
      overflow-y:auto;
    }
    #monthDropdownPanel.open { display:block; }
    .month-check-item {
      display:flex;
      align-items:center;
      gap:8px;
      padding:5px 14px;
      cursor:pointer;
      font-size:13px;
      font-weight:normal;
      transition:background .1s;
    }
    .month-check-item:hover { background:#f5f5f5; }
    .month-check-item input { cursor:pointer; accent-color:#111; }
    .month-check-sep { border-top:1px solid #eee; margin:4px 0; }
    .month-check-actions {
      display:flex;
      gap:6px;
      padding:6px 14px 2px;
      font-size:11px;
    }
    .month-check-actions span {
      cursor:pointer;
      color:#1a56db;
      text-decoration:underline;
    }

    /* Bouton Analyse */
    #btnAnalyse {
      padding:6px 14px;
      background:#111;
      color:#fff;
      border:none;
      border-radius:5px;
      font-size:13px;
      font-weight:bold;
      cursor:pointer;
      white-space:nowrap;
    }
    #btnAnalyse:hover { background:#333; }

    /* Modal Analyse */
    #analyseModal {
      display:none;
      position:fixed;
      inset:0;
      z-index:9998;
      background:rgba(0,0,0,0.5);
      align-items:center;
      justify-content:center;
    }
    #analyseModal.open { display:flex; }
    #analyseModalBox {
      background:#f8f9fa;
      border-radius:12px;
      width:96vw;
      max-width:1200px;
      max-height:92vh;
      display:flex;
      flex-direction:column;
      box-shadow:0 12px 40px rgba(0,0,0,0.3);
      overflow:hidden;
    }
    #analyseModalHeader {
      background:#111;
      color:#fff;
      padding:16px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-size:15px;
      font-weight:bold;
    }
    #analyseModalHeader button {
      background:none; border:none; color:#fff; font-size:20px; cursor:pointer;
    }
    #analyseModalBody {
      overflow-y:auto;
      flex:1;
      padding:20px;
    }
    .analyse-section {
      background:white;
      border-radius:8px;
      padding:16px 18px;
      margin-bottom:14px;
      box-shadow:0 1px 4px rgba(0,0,0,0.08);
    }
    .analyse-section h3 {
      margin:0 0 12px;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.5px;
      color:#555;
      border-bottom:2px solid #eee;
      padding-bottom:8px;
    }
    .analyse-kpi-row {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .akpi {
      background:#f4f4f4;
      border-radius:8px;
      padding:10px 16px;
      text-align:center;
      min-width:100px;
      flex:1;
    }
    .akpi .val { font-size:22px; font-weight:bold; color:#111; }
    .akpi .lbl { font-size:11px; color:#777; margin-top:2px; }
    .akpi.red .val { color:#b30000; }
    .akpi.blue .val { color:#1a56db; }
    .akpi.green .val { color:#1a7a1a; }

    /* Table analyse */
    .analyse-table { width:100%; border-collapse:collapse; font-size:12px; }
    .analyse-table th {
      background:#f0f0f0; padding:7px 10px; text-align:left;
      font-weight:bold; color:#444; border-bottom:2px solid #ddd;
    }
    .analyse-table td { padding:6px 10px; border-bottom:1px solid #eee; }
    .analyse-table tbody tr:hover { background:#fafafa; }
    .analyse-table .num { text-align:right; font-weight:bold; }
    .bar-bg { background:#eee; border-radius:4px; height:8px; min-width:60px; }
    .bar-fill { height:8px; border-radius:4px; background:#b30000; }
    .bar-fill.blue { background:#1a56db; }

    /* Comparaison mois */
    .cmp-grid { display:grid; gap:8px; }
    .cmp-row { display:flex; align-items:center; gap:8px; font-size:12px; }
    .cmp-mois { width:36px; font-weight:bold; color:#555; }
    .cmp-bars { flex:1; display:flex; flex-direction:column; gap:3px; }
    .cmp-val { width:36px; text-align:right; font-size:11px; color:#333; }
    .trend-up { color:#b30000; }
    .trend-dn { color:#1a7a1a; }
    .trend-eq { color:#888; }

    #analyseExportBtn {
      margin:0 20px 16px;
      padding:8px 18px;
      background:#1a56db;
      color:#fff;
      border:none;
      border-radius:6px;
      font-size:13px;
      font-weight:bold;
      cursor:pointer;
      align-self:flex-start;
    }
    #analyseExportBtn:hover { background:#1344b0; }

    #analyseFooter {
      background:#f0f0f0;
      border-top:1px solid #ddd;
      padding:12px 20px;
      display:flex;
      gap:10px;
      justify-content:center;
      align-items:center;
    }
    .analyse-footer-btn {
      padding:9px 22px;
      border:none;
      border-radius:6px;
      font-size:13px;
      font-weight:bold;
      cursor:pointer;
    }
    .analyse-footer-btn.blue { background:#1a56db; color:#fff; }
    .analyse-footer-btn.blue:hover { background:#1344b0; }
    .analyse-footer-btn.grey { background:#555; color:#fff; }
    .analyse-footer-btn.grey:hover { background:#333; }
    #copyStatus { font-size:12px; color:#1a7a1a; display:none; }

    /* Résumé incidents (sous mois) */
    #summaryBox{
      position:absolute;
      top:65px;
      right:20px;
      background:white;
      padding:8px 10px;
      width:260px;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
      border-radius:6px;
      z-index:1000;
      font-size:12px;
      line-height:18px;
      max-height:70vh;
      overflow:auto;
    }

    /* Panel gauche */
    #leftPanel{
      position:absolute;
      top:65px;
      left:20px;
      width:260px;
      background:white;
      padding:8px 10px;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
      border-radius:6px;
      z-index:1000;
      font-size:12px;
      line-height:18px;
      max-height:70vh;
      overflow:auto;
    }

    /* Bouton retour container */
    #topLeftBar{
      position:absolute;
      top:15px;
      left:20px;
      z-index:1000;
    }

    /* Texte au centre des cercles */
    .circle-label{
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      font-weight:bold;
      color:white;            /* demandé texte blanc */
      font-size:12px;         /* un peu plus petit */
      width:100%;
      height:100%;
      text-shadow: 0 1px 2px rgba(0,0,0,0.65); /* lisible sur jaune */
    }

    /* Légende */
    .legend {
      background:white;
      padding:12px;
      line-height:22px;
      color:#333;
      font-size:14px;
      box-shadow:0 0 8px rgba(0,0,0,0.2);
    }

    /* Modal popup zone */
    #zoneModal {
      display:none;
      position:fixed;
      inset:0;
      z-index:9999;
      background:rgba(0,0,0,0.45);
      align-items:center;
      justify-content:center;
    }
    #zoneModal.open { display:flex; }
    #zoneModalBox {
      background:#fff;
      border-radius:10px;
      width:620px;
      max-width:95vw;
      max-height:80vh;
      display:flex;
      flex-direction:column;
      box-shadow:0 8px 32px rgba(0,0,0,0.28);
      overflow:hidden;
    }
    #zoneModalHeader {
      background:#111;
      color:#fff;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-size:15px;
      font-weight:bold;
      letter-spacing:.3px;
    }
    #zoneModalHeader button {
      background:none;
      border:none;
      color:#fff;
      font-size:20px;
      cursor:pointer;
      line-height:1;
      padding:0 2px;
    }
    #zoneModalKpis {
      display:flex;
      gap:10px;
      padding:12px 18px 8px;
      border-bottom:1px solid #eee;
      flex-wrap:wrap;
      align-items:center;
    }
    #zoneModalToolbar {
      display:flex;
      gap:8px;
      padding:8px 18px;
      border-bottom:1px solid #eee;
      align-items:center;
    }
    #zoneSearch {
      flex:1;
      padding:6px 10px;
      border:1px solid #ddd;
      border-radius:6px;
      font-size:12px;
      outline:none;
    }
    #zoneSearch:focus { border-color:#111; }
    #btnExportZone {
      padding:6px 14px;
      background:#1a56db;
      color:#fff;
      border:none;
      border-radius:6px;
      font-size:12px;
      font-weight:bold;
      cursor:pointer;
      white-space:nowrap;
    }
    #btnExportZone:hover { background:#1344b0; }
    #zoneResultCount { font-size:11px; color:#888; white-space:nowrap; }
    .kpi-chip {
      background:#f4f4f4;
      border-radius:6px;
      padding:5px 12px;
      font-size:12px;
      font-weight:bold;
      color:#333;
    }
    .kpi-chip span { color:#b30000; font-size:14px; }
    #zoneModalBody {
      overflow-y:auto;
      flex:1;
      padding:0;
    }
    #zoneModalBody table {
      width:100%;
      border-collapse:collapse;
      font-size:12px;
    }
    #zoneModalBody thead th {
      background:#f0f0f0;
      padding:8px 10px;
      text-align:left;
      font-weight:bold;
      color:#444;
      border-bottom:2px solid #ddd;
      position:sticky;
      top:0;
    }
    #zoneModalBody tbody tr:hover { background:#fafafa; }
    #zoneModalBody tbody td {
      padding:7px 10px;
      border-bottom:1px solid #eee;
      vertical-align:top;
    }
    .tag-cable { background:#fde8e8; color:#b30000; border-radius:4px; padding:1px 6px; font-size:11px; font-weight:bold; }
    .tag-autre { background:#e8f0fe; color:#1a56db; border-radius:4px; padding:1px 6px; font-size:11px; }
  </style>
</head>
<body>

  <div id="topLeftBar" style="position:absolute;top:15px;left:20px;z-index:1000;display:flex;gap:8px;">
    <button class="btn-back" onclick="window.location.href='ingenierie.html'">⬅ Retour Ingénierie</button>
    <button class="btn-back" onclick="window.location.href='cic.html'">CIC</button>
    <button class="btn-back" onclick="togglePanel('leftPanel')" title="Localisations">📋 Loca.</button>
    <button class="btn-back" onclick="togglePanel('summaryBox')" title="Résumé Incidents">📊 Résumé</button>
  </div>

  <div class="month-selector">
    <span style="font-size:13px">Période :</span>
    <div style="position:relative">
      <button id="monthDropdownBtn" onclick="toggleMonthPanel(event)">Jun ▾</button>
      <div id="monthDropdownPanel">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 14px 4px;">
          <div class="month-check-actions" style="padding:0;gap:6px;">
            <span onclick="selectAllMonths()">Tout</span>
            <span onclick="selectNoneMonths()">Aucun</span>
          </div>
          <span onclick="closeMonthPanel()" style="cursor:pointer;font-size:15px;color:#555;line-height:1;padding:2px 4px;" title="Fermer">✕</span>
        </div>
        <div class="month-check-sep"></div>
        <label class="month-check-item"><input type="checkbox" value="0" id="chkAnneeEntiere" onchange="onAnneeEntiereCheck()"> Année entière</label>
        <div class="month-check-sep"></div>
        <label class="month-check-item"><input type="checkbox" value="1" class="chk-mois" onchange="onMoisCheck()"> Jan</label>
        <label class="month-check-item"><input type="checkbox" value="2" class="chk-mois" onchange="onMoisCheck()"> Fév</label>
        <label class="month-check-item"><input type="checkbox" value="3" class="chk-mois" onchange="onMoisCheck()"> Mar</label>
        <label class="month-check-item"><input type="checkbox" value="4" class="chk-mois" onchange="onMoisCheck()"> Avr</label>
        <label class="month-check-item"><input type="checkbox" value="5" class="chk-mois" onchange="onMoisCheck()"> Mai</label>
        <label class="month-check-item"><input type="checkbox" value="6" class="chk-mois" onchange="onMoisCheck()"> Jun</label>
        <label class="month-check-item"><input type="checkbox" value="7" class="chk-mois" onchange="onMoisCheck()"> Jul</label>
        <label class="month-check-item"><input type="checkbox" value="8" class="chk-mois" onchange="onMoisCheck()"> Aoû</label>
        <label class="month-check-item"><input type="checkbox" value="9" class="chk-mois" onchange="onMoisCheck()"> Sep</label>
        <label class="month-check-item"><input type="checkbox" value="10" class="chk-mois" onchange="onMoisCheck()"> Oct</label>
        <label class="month-check-item"><input type="checkbox" value="11" class="chk-mois" onchange="onMoisCheck()"> Nov</label>
        <label class="month-check-item"><input type="checkbox" value="12" class="chk-mois" onchange="onMoisCheck()"> Déc</label>
        <div class="month-check-sep"></div>
        <div style="padding:6px 14px 8px;">
          <div style="font-size:11px;color:#555;font-weight:600;margin-bottom:5px;">Période personnalisée</div>
          <div style="display:flex;align-items:center;gap:4px;font-size:12px;">
            <span style="color:#555">Du</span>
            <input type="date" id="periodeDebut" style="border:1px solid #ccc;border-radius:4px;padding:3px 5px;font-size:11px;flex:1;" onchange="onPeriodeCustom()">
          </div>
          <div style="display:flex;align-items:center;gap:4px;font-size:12px;margin-top:4px;">
            <span style="color:#555">Au</span>
            <input type="date" id="periodeFin" style="border:1px solid #ccc;border-radius:4px;padding:3px 5px;font-size:11px;flex:1;" onchange="onPeriodeCustom()">
          </div>
        </div>
      </div>
    </div>
    <button id="btnAnalyse" onclick="openAnalyseModal()">📊 Analyse</button>
  </div>

  <!-- Modal Analyse -->
  <div id="analyseModal" onclick="if(event.target===this) closeAnalyseModal()">
    <div id="analyseModalBox">
      <div id="analyseModalHeader">
        <span id="analyseModalTitle">Analyse Incidents</span>
        <button onclick="closeAnalyseModal()">✕</button>
      </div>
      <div id="analyseModalBody"></div>
      <div id="analyseFooter">
        <button class="analyse-footer-btn blue" onclick="exportRapport()">⬇ Exporter le rapport</button>
        <button class="analyse-footer-btn grey" onclick="copierRapport(this)" id="btnCopierRapport">📋 Copier</button>
      </div>
    </div>
  </div>

  <div id="summaryBox" style="display:none"><b>Résumé Incidents</b><hr>Chargement…</div>
  <div id="leftPanel" style="display:none"><b>Localisations</b><hr>Chargement…</div>

  <div id="map"></div>

  <!-- Modal zone incidents -->
  <div id="zoneModal" onclick="if(event.target===this) closeZoneModal()">
    <div id="zoneModalBox">
      <div id="zoneModalHeader">
        <span id="zoneModalTitle">Incidents — ZONE</span>
        <button onclick="closeZoneModal()" title="Fermer">✕</button>
      </div>
      <div id="zoneModalKpis"></div>
      <div id="zoneModalToolbar">
        <input id="zoneSearch" type="text" placeholder="🔍 Rechercher (client, ND, cause, date…)" oninput="filterZoneTable()">
        <span id="zoneResultCount"></span>
        <button id="btnExportZone" onclick="exportZoneExcel()">⬇ Excel</button>
      </div>
      <div id="zoneModalBody"></div>
    </div>
  </div>

  <!-- Libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script>
    // === MAP INIT ===
    const map = L.map('map').setView([5.34, -4.03], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // Contour Abidjan (simplifié)
    const abidjanBoundary = L.polygon([
      [5.44, -4.15],
      [5.45, -4.05],
      [5.43, -3.92],
      [5.38, -3.85],
      [5.28, -3.88],
      [5.22, -3.95],
      [5.23, -4.10],
      [5.30, -4.15]
    ], { color:'#000', weight:3, fillOpacity:0 }).addTo(map);

    map.fitBounds(abidjanBoundary.getBounds());

    // Communes Abidjan (points)
    const communesCoords = {
      "COCODY":[5.36,-3.96],
      "PLATEAU":[5.32,-4.02],
      "MARCORY":[5.29,-3.97],
      "TREICHVILLE":[5.30,-4.01],
      "YOPOUGON":[5.33,-4.09],
      "PORT-BOUET":[5.26,-3.94],
      "ABOBO":[5.43,-4.01],
      "BINGERVILLE":[5.35,-3.88]
    };

    
    const abidjanZones = ["COCODY","PLATEAU","MARCORY","TREICHVILLE","YOPOUGON","PORT-BOUET","PORT BOUET","ABOBO","BINGERVILLE",
      "ADJAME","ADJAMÉ","ATTECOUBE","ATTÉCOUBÉ","KOUMASSI","ANYAMA","SONGON",
      "GRAND BASSAM","GRAND-BASSAM","BONOUA","DABOU","JACQUEVILLE",
      "ALEPE","ALÉPÉ","ABOISSO","ADZOPE","ADZOPÉ","AGBOVILLE","SIKENSI","TIASSALE","TIASSALÉ"];

    function isAbidjan(loc){
        if(!loc) return false;
        const s = loc.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[-_]/g," ").replace(/\s+/g," ").trim();
        const keys = [
          'COCODY','PLATEAU','MARCORY','MAROCRY',
          'TREICHVILLE','TRECHVILLE','TREICVILLE','TRECVILLE','TRRICHVILLE',
          'YOPOUGON','YOPUGON','YOPOUGNON',
          'PORT BOUET','PORTBOUET','PORT BOUE','VRIDI','VIRID','VRDI',
          'ABOBO','BINGERVILLE','ADJAME','ATTECOUBE','KOUMASSI','ANYAMA','SONGON',
          'BASSAM','BONOUA','DABOU','JACQUEVILLE','JACKVILLE',
          'ALEPE','ABOISSO','ASSINIE','ASSINE',
          'ADZOPE','AGBOVILLE','SIKENSI','TIASSALE',
          'RIVIERA','ANGRE','AKOUEDO','GESCO','BIETRY','GONZAGUEVILLE',
          'PALMERAIE','PLAMERAIE','2PLATEAU','2 PLATEAU',
          'ABIDJAN','ANGUEDEDOU','ADIOPO'
        ];
        return keys.some(k => s.includes(k));
    }


    // Causes "Cable" (liste fournie)
    const causesCable = [
      "BRINS FO MAUVAIS",
      "CÂBLE FO COUPÉ",
      "CABLE FO COUPE",           // tolérance
      "COUPURE FO FTTX",
      "JARRETIERES CENTRAL",
      "PROBLÈME TRANSMISSION",
      "PROBLEME TRANSMISSION",
      "DERCO",
      "CUIVRE DÉFFECTUEUX",
      "CUIVRE DEFFECTUEUX",
      "COUPURE FO ROA",
      "FO DÉFFECTUEUX",
      "FO DEFFECTUEUX"
    ];

    // Groupes causes (résumé à droite)
    const causeGroups = {
      "Cable": causesCable,
      "Bande passante": ["BANDE PASSANTE SATURÉE","BANDE PASSANTE SATUREE","PROBLÈME BANDE PASSANTE","PROBLEME BANDE PASSANTE","USAGE CLIENT"],
      "Environnement client": ["PROBLÈME ENVIRONNEMENT CLIENT","PROBLEME ENVIRONNEMENT CLIENT","PROBLÈME EQUIPEMENTS OCI CHEZ LE CLIENT","PROBLEME EQUIPEMENTS OCI CHEZ LE CLIENT","PB EQPT OCI CHEZ LE CLIENT","ATTENTE RDV CLIENT","JARRETIERES CLIENT","PROBLÈME EQUIPEMENTS CLIENT","PROBLEME EQUIPEMENTS CLIENT","CÂBLE RÉSEAUX RJ45","CABLE RESEAUX RJ45"],
      "BLR": ["PROBLÈME RADIO BLR/FH","PROBLEME RADIO BLR/FH","FAISCEAU DÉFFECTUEUX","FAISCEAU DEFFECTUEUX","POE DÉFFECTUEUX","POE DEFFECTUEUX","PB SWITCH BLR"],
      "Autocom": ["PERTE DE CONFIG COMPTE CLIENT","PB AUTOCOM","PROBLÈME CONFIG IMS","PROBLEME CONFIG IMS","COMPTE SIP"],
      "Erreur signalisation": ["RÉITÉRATION DE SIGNALISATION","REITERATION DE SIGNALISATION","ERREUR DE SIGNALISATION"],
      "Central OCI": ["ALIGNEMENT PORT OLT PB MGPLX","PROBLÈME IP & CONFIG","PROBLEME IP & CONFIG","PROBLÈME EQUIPEMENTS D’ACCÈS","PROBLEME EQUIPEMENTS D’ACCES","PROBLEME EQUIPEMENTS D'ACCES","PB MODEM CENTRAL","PROBLÈME OCB/CSN","PROBLEME OCB/CSN","PB PE"],
      "VSAT": ["VSAT"],
      "Supervision": ["PROBLÈME DE SUPERVISION CORTEX","PROBLEME DE SUPERVISION CORTEX","SUPERVISION CORTEX"],
      "Energie": ["PB ENERGIE","PB ÉNERGIE"],
      "Autres": []
    };

    // Couleurs volumes (zones)

    // Parse date excel OU string JJ/MM/AAAA
    function toJSDate(v){
      if(v == null || v === "") return null;
      if(typeof v === "number"){
        return new Date((v - 25569) * 86400 * 1000);
      }
      if(typeof v === "string"){
        const m = v.trim().match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
        if(m){
          const dd = parseInt(m[1],10), mm = parseInt(m[2],10), yy = parseInt(m[3],10);
          return new Date(yy, mm-1, dd);
        }
        const d2 = new Date(v);
        return isNaN(d2.getTime()) ? null : d2;
      }
      return null;
    }

function normaliserAbidjan(loc){
    const s = (loc || "").toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[-_]/g," ").replace(/\s+/g," ").trim();
    if(s.includes("YOPOUGON")||s.includes("YOPUGON")||s.includes("YOPOUGNON")) return "YOPOUGON";
    if(s.includes("COCODY")||s.includes("COCOCDY")||s.includes("COOCDY")||s.includes("RIVIERA")||s.includes("ANGRE")||s.includes("AKOUEDO")||s.includes("ADIOPO")||s.includes("PALMERAIE")||s.includes("PLAMERAIE")||s.includes("2PLATEAU")||s.includes("2 PLATEAU")) return "COCODY";
    if(s.includes("MARCORY")||s.includes("MAROCRY")||s.includes("BIETRY")||s.includes("GESCO")||s.includes("GONZAGUEVILLE")) return "MARCORY";
    if(s.includes("TREICHVILLE")||s.includes("TRECHVILLE")||s.includes("TREICVILLE")||s.includes("TRECVILLE")||s.includes("TRRICHVILLE")) return "TREICHVILLE";
    if(s.includes("PORT BOUET")||s.includes("PORTBOUET")||s.includes("PORT BOUE")||s.includes("VRIDI")||s.includes("VIRID")||s.includes("VRDI")) return "PORT-BOUET";
    if(s.includes("ABOBO"))       return "ABOBO";
    if(s.includes("BINGERVILLE")) return "BINGERVILLE";
    if(s.includes("ADJAME"))      return "ADJAMÉ";
    if(s.includes("ATTECOUBE"))   return "ATTÉCOUBÉ";
    if(s.includes("KOUMASSI"))    return "KOUMASSI";
    if(s.includes("PLATEAU"))     return "PLATEAU";
    if(s.includes("ANYAMA")||s.includes("ANGUEDEDOU")) return "ANYAMA";
    if(s.includes("SONGON"))      return "SONGON";
    if(s.includes("BASSAM"))      return "GRAND-BASSAM";
    if(s.includes("BONOUA"))      return "BONOUA";
    if(s.includes("DABOU"))       return "DABOU";
    if(s.includes("JACQUEVILLE")||s.includes("JACKVILLE")) return "JACQUEVILLE";
    if(s.includes("ALEPE"))       return "ALÉPÉ";
    if(s.includes("ASSINIE")||s.includes("ASSINE")) return "ASSINIE";
    if(s.includes("ABOISSO"))     return "ABOISSO";
    if(s.includes("ADZOPE"))      return "ADZOPÉ";

    if(s.includes("SIKENSI"))     return "SIKENSI";
    if(s.includes("TIASSALE"))    return "TIASSALÉ";
    return s;
}

        const circle = L.circle(communesCoords[loc],{

    // === MODAL ZONE ===
    let _zoneRows = []; // cache pour search + export (une ligne = un ND)

    function openZoneModal(locName){
      const months = getSelectedMonths();
      if(!DATA_JSON) return;

      const raw = DATA_JSON.filter(row => {
        const d = toJSDate(row["DATE DE CRÉATION"]);
        if(!d) return false;
        if(!monthMatchesRow(d, months)) return false;
        const locRaw = (row["LOCALISATION CLIENT"] || "").toUpperCase().trim();
        return normaliserAbidjan(locRaw) === locName;
      });

      // Grouper par ND — une ligne par ND
      const ndMap = {};
      raw.forEach(r => {
        const nd = (r["ND"] || "—").toString().trim();
        const cause = (r["CAUSE RÉELLE"] || "—").toUpperCase().trim();
        const dateRaw = r["DATE DE CRÉATION"];
        const d = toJSDate(dateRaw);
        if(!ndMap[nd]) {
          ndMap[nd] = { nd, client: r["RAISON SOCIALE"] || "—", entries: [] };
        }
        ndMap[nd].entries.push({
          dateStr: d ? d.toLocaleDateString('fr-FR') : (dateRaw || "—"),
          dateTs: d ? d.getTime() : 0,
          cause,
          isCable: causesCable.includes(cause)
        });
      });

      // Construire _zoneRows : trier les entrées de chaque ND chronologiquement
      _zoneRows = Object.values(ndMap).map(g => {
        g.entries.sort((a,b) => a.dateTs - b.dateTs);
        const dates  = g.entries.map(e => e.dateStr).join(' | ');
        const causes = g.entries.map(e => e.cause).join(' | ');
        const nbIncidents = g.entries.length;
        const isCableAny  = g.entries.some(e => e.isCable);
        return {
          nd: g.nd, client: g.client, nbIncidents,
          dates, causes, isCableAny,
          firstTs: g.entries[0]?.dateTs || 0,
          _search: (g.nd + ' ' + g.client + ' ' + dates + ' ' + causes).toLowerCase()
        };
      });

      // Tri décroissant par nbIncidents
      _zoneRows.sort((a,b) => b.nbIncidents - a.nbIncidents || b.firstTs - a.firstTs);

      const totalIncidents = raw.length;
      const cable = raw.filter(r => causesCable.includes((r["CAUSE RÉELLE"]||"").toUpperCase().trim())).length;
      const autre = totalIncidents - cable;

      const moisNoms_local = ["Année","Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
      const periodLabel = months.includes(0) ? 'Année'
        : months.length === 1 ? moisNoms_local[months[0]]
        : months.map(m=>moisNoms_local[m]).join(', ');
      document.getElementById('zoneModalTitle').textContent =
        `Incidents — ${locName} · ${periodLabel}`;

      document.getElementById('zoneModalKpis').innerHTML = `
        <div class="kpi-chip">Total incidents <span>${totalIncidents}</span></div>
        <div class="kpi-chip">Incident Câble <span style="color:#b30000">${cable}</span></div>
        <div class="kpi-chip">Autre <span style="color:#1a56db">${autre}</span></div>
        <div class="kpi-chip">ND distincts <span style="color:#555">${_zoneRows.length}</span></div>
      `;

      document.getElementById('zoneSearch').value = '';
      renderZoneTable(_zoneRows);
      document.getElementById('zoneModal').classList.add('open');
      document.getElementById('zoneSearch').focus();
    }

          <td style="vertical-align:top;font-size:12px">${causesHtml}</td>

      html += `</tbody></table>`;

    function getSelectedMonths(){
      // Priorité 1 : période personnalisée Du/Au
      const deb = document.getElementById('periodeDebut')?.value;
      const fin = document.getElementById('periodeFin')?.value;
      if(deb && fin) return ['custom'];
      // Priorité 2 : cases cochées
      const annee = document.getElementById('chkAnneeEntiere');
      if(annee && annee.checked) return [0];
      const boxes = document.querySelectorAll('.chk-mois:checked');
      if(!boxes.length) return [0];
      return Array.from(boxes).map(b => parseInt(b.value));
    }

    function monthMatchesRow(d, months){
      if(months[0] === 'custom'){
        const deb = document.getElementById('periodeDebut')?.value;
        const fin = document.getElementById('periodeFin')?.value;
        if(!deb || !fin) return true;
        const debDate = new Date(deb + 'T00:00:00');
        const finDate = new Date(fin + 'T23:59:59');
        return d >= debDate && d <= finDate;
      }
      if(months.includes(0)) return true;
      return months.includes(d.getMonth() + 1);
    }

    // computeForMonths : version multi-mois
    function computeForMonths(json, months){
      const zoneCounts = {};
      const groupCounts = {};
      Object.keys(causeGroups).forEach(k => groupCounts[k] = 0);
      const abjLoc = {}, intLoc = {};
      let total = 0, totalAbj = 0, totalInt = 0;

      json.forEach(row => {
        const d = toJSDate(row["DATE DE CRÉATION"]);
        if(!d) return;
        if(!monthMatchesRow(d, months)) return;
        total++;
        const locRaw = (row["LOCALISATION CLIENT"] || "").toUpperCase().trim();
        const cause  = (row["CAUSE RÉELLE"] || "").toUpperCase().trim();
        if(!zoneCounts[locRaw]) zoneCounts[locRaw] = {cable:0, autre:0};
        if(causesCable.includes(cause)) zoneCounts[locRaw].cable++;
        else zoneCounts[locRaw].autre++;
        if(isAbidjan(locRaw)){
          totalAbj++;
          const locNorm = normaliserAbidjan(locRaw);
          abjLoc[locNorm] = (abjLoc[locNorm] || 0) + 1;
        } else {
          totalInt++;
          const ville = normaliserVille(locRaw);
          intLoc[ville] = (intLoc[ville] || 0) + 1;
        }
        let matched = false;
        for(const g in causeGroups){
          if(causeGroups[g].includes(cause)){ groupCounts[g]++; matched = true; break; }
        }
        if(!matched) groupCounts["Autres"]++;
      });
      return { zoneCounts, groupCounts, abjLoc, intLoc, total, totalAbj, totalInt };
    }

    // ── MODAL ANALYSE ──────────────────────────────────────────────
    function openAnalyseModal(){
      if(!DATA_JSON){ alert('Données non chargées.'); return; }
      const months = getSelectedMonths();
      const isCustom = months[0] === 'custom';
      const isMulti = !isCustom && !months.includes(0) && months.length > 1;
      const isFull  = !isCustom && months.includes(0);

      // Titre
      let titre;
      if(isCustom){
        const deb = document.getElementById('periodeDebut').value;
        const fin = document.getElementById('periodeFin').value;
        titre = 'Analyse — Du ' + deb.split('-').reverse().join('/') + ' au ' + fin.split('-').reverse().join('/');
      } else {
        titre = isFull ? 'Analyse — Année entière'
          : isMulti ? 'Analyse comparative — ' + months.map(m => moisNoms[m]).join(', ')
          : 'Analyse — ' + moisNoms[months[0]];
      }
      document.getElementById('analyseModalTitle').textContent = titre;

      const body = document.getElementById('analyseModalBody');
      body.innerHTML = '';

      if(isMulti){
        body.innerHTML = buildAnalyseComparative(months);
      } else {
        const mList = isFull ? [0] : months;
        body.innerHTML = buildAnalyseMois(isCustom ? 'custom' : mList[0]);
      }

      document.getElementById('analyseModal').classList.add('open');
    }

    function closeAnalyseModal(){
      document.getElementById('analyseModal').classList.remove('open');

    // ── Bilan mois unique (ou année) ───────────────────────────────
    function buildAnalyseMois(month){
      const rows = DATA_JSON.filter(r => {
        const d = toJSDate(r["DATE DE CRÉATION"]);
        if(!d) return false;
        if(month === 'custom'){
          const deb = document.getElementById('periodeDebut').value;
          const fin = document.getElementById('periodeFin').value;
          if(!deb || !fin) return true;
          return d >= new Date(deb+'T00:00:00') && d <= new Date(fin+'T23:59:59');
        }
        return month === 0 || d.getMonth()+1 === month;
      });
      const total = rows.length;
      if(!total) return '<div style="padding:30px;text-align:center;color:#999">Aucune donnée.</div>';

      const cable = rows.filter(r => causesCable.includes((r["CAUSE RÉELLE"]||"").toUpperCase().trim())).length;

      // Abidjan vs Intérieur + détail câble — boucle unique
      let totalAbj = 0, totalInt = 0;
      const abjLoc = {}, intLoc = {};
      const zonesDetail = {}, zonesDetailInt = {};
      const zones = {};
      rows.forEach(r => {
        const locRaw = (r["LOCALISATION CLIENT"]||"").toUpperCase().trim();
        const c   = (r["CAUSE RÉELLE"]||"").toUpperCase().trim();
        const isCab = causesCable.includes(c);
        if(isAbidjan(locRaw)){
          totalAbj++;
          const loc = normaliserAbidjan(locRaw);
          abjLoc[loc] = (abjLoc[loc]||0)+1;
          if(!zonesDetail[loc]) zonesDetail[loc] = {cable:0};
          if(isCab) zonesDetail[loc].cable++;
          if(!zones[loc]) zones[loc] = {total:0, cable:0};
          zones[loc].total++;
          if(isCab) zones[loc].cable++;
        } else {
          totalInt++;
          const v = normaliserVille(locRaw);
          intLoc[v] = (intLoc[v]||0)+1;
          if(!zonesDetailInt[v]) zonesDetailInt[v] = {cable:0};
          if(isCab) zonesDetailInt[v].cable++;
        }
      });
      const sortedAbj = Object.entries(abjLoc).sort((a,b)=>b[1]-a[1]);
      const sortedInt = Object.entries(intLoc).sort((a,b)=>{
        if(a[0]==='Autres') return 1;
        if(b[0]==='Autres') return -1;
        return b[1]-a[1];
      });
      const autresInt = 0, autresIntCable = 0;
      const zonesAbj = sortedAbj.filter(([z])=>communesCoords[z]);
      const zonesTouchees = zonesAbj.length;
      const sortedZones = Object.entries(zones).sort((a,b)=>b[1].total-a[1].total);
      const maxZ = sortedZones[0]?.[1].total || 1;

      // Répartition par catégorie de cause (causeGroups)
      const catCounts = {};
      Object.keys(causeGroups).forEach(k => catCounts[k] = 0);
      rows.forEach(r => {
        const c = (r["CAUSE RÉELLE"]||"").toUpperCase().trim();
        let matched = false;
        for(const g in causeGroups){
          if(causeGroups[g].includes(c)){ catCounts[g]++; matched=true; break; }
        }
        if(!matched) catCounts["Autres"]++;
      });
      const sortedCats = Object.entries(catCounts).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
      const maxCat = sortedCats[0]?.[1]||1;

      // Top causes détaillées
      const causes = {};
      rows.forEach(r => {
        const c = (r["CAUSE RÉELLE"]||"—").toUpperCase().trim();
        causes[c] = (causes[c]||0)+1;
      });
      const sortedCauses = Object.entries(causes).sort((a,b)=>b[1]-a[1]).slice(0,10);
      const maxCause = sortedCauses[0]?.[1]||1;

      // ND récurrents
      const nds = {};
      rows.forEach(r => {
        const nd = (r["ND"]||"—").toString().trim();
        const loc = normaliserAbidjan((r["LOCALISATION CLIENT"]||"").toUpperCase().trim());
        const client = r["RAISON SOCIALE"]||"—";
        if(!nds[nd]) nds[nd] = {nd, client, loc, count:0};
        nds[nd].count++;
      });
      const recurrents = Object.values(nds).filter(n=>n.count>=2).sort((a,b)=>b.count-a.count).slice(0,10);

      let html = '';

      // ── KPIs globaux ──
      html += `<div class="analyse-section">
        <h3>Vue globale</h3>
        <div class="analyse-kpi-row">
          <div class="akpi"><div class="val">${total}</div><div class="lbl">Total incidents</div></div>
          <div class="akpi"><div class="val">${totalAbj}</div><div class="lbl">Zone Abidjan (${pct(totalAbj,total)}%)</div></div>
          <div class="akpi blue"><div class="val">${totalInt}</div><div class="lbl">Zone Intérieur (${pct(totalInt,total)}%)</div></div>
          <div class="akpi red"><div class="val">${cable}</div><div class="lbl">Incident Câble (${pct(cable,total)}%)</div></div>
          <div class="akpi blue"><div class="val">${total-cable}</div><div class="lbl">Incident hors câble (${pct(total-cable,total)}%)</div></div>
          <div class="akpi green"><div class="val">${recurrents.length}</div><div class="lbl">Incident répétitif (ND)</div></div>
        </div>
      </div>`;

      // ── Abidjan vs Intérieur ──
      html += `<div class="analyse-section">
        <h3>🗺️ Abidjan vs Intérieur</h3>
        <div class="analyse-kpi-row" style="margin-bottom:14px">
          <div class="akpi"><div class="val">${totalAbj}</div><div class="lbl">Abidjan (${pct(totalAbj,total)}%)</div></div>
          <div class="akpi blue"><div class="val">${totalInt}</div><div class="lbl">Intérieur (${pct(totalInt,total)}%)</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div>
            <div style="font-size:12px;font-weight:bold;color:#555;margin-bottom:6px">Zone Abidjan</div>
            <table class="analyse-table">
              <thead><tr><th>Zone</th><th class="num">Câble</th><th class="num">Autre</th><th class="num">Volume 📍</th></tr></thead>
              <tbody>
              ${sortedAbj.map(([z,v])=>`<tr>
                <td>${communesCoords[z]?'<b>'+z+'</b>':z}</td>
                <td class="num" style="color:#b30000">${zonesDetail&&zonesDetail[z]?zonesDetail[z].cable:0}</td>
                <td class="num" style="color:#1a56db">${zonesDetail&&zonesDetail[z]?(v-(zonesDetail[z].cable||0)):v}</td>
                <td class="num" style="${parseFloat(pct(v,total))>=15?'color:#b30000;font-weight:bold':''}">${v}</td>
              </tr>`).join('')}
              </tbody>
            </table>
          </div>
          <div>
            <div style="font-size:12px;font-weight:bold;color:#555;margin-bottom:6px">Villes Intérieur</div>
            <table class="analyse-table">
              <thead><tr><th>Ville</th><th class="num">Câble</th><th class="num">Autre</th><th class="num">Volume 📍</th></tr></thead>
              <tbody>
              ${(()=>{
                // Villes connues (sans Autres), triées par volume
                const villesConnues = sortedInt.filter(([z])=>z!=='Autres');
                const autresRow = sortedInt.find(([z])=>z==='Autres');
                // Nb lignes Abidjan = nb lignes cible (hors ligne Autres)
                const nAbj = sortedAbj.length;
                const nVilles = villesConnues.length;
                // Lignes villes connues
                let rows = villesConnues.map(([z,v])=>{
                  const cbl = zonesDetailInt&&zonesDetailInt[z]?zonesDetailInt[z].cable:0;
                  return `<tr><td>${z}</td><td class="num" style="color:#b30000">${cbl}</td><td class="num" style="color:#1a56db">${v-cbl}</td><td class="num">${v}</td></tr>`;
                });
                // Lignes vides pour aligner avec Abidjan (avant la ligne Autres)
                const padding = Math.max(0, nAbj - nVilles - 1); // -1 pour la ligne Autres
                for(let i=0; i<padding; i++) rows.push('<tr><td>&nbsp;</td><td></td><td></td><td></td></tr>');
                // Ligne Autres toujours en dernier
                if(autresRow){
                  const [,av] = autresRow;
                  const acbl = zonesDetailInt&&zonesDetailInt['Autres']?zonesDetailInt['Autres'].cable:0;
                  rows.push(`<tr style="border-top:1px solid #ddd;color:#888;font-style:italic"><td>Autres</td><td class="num" style="color:#b30000">${acbl}</td><td class="num" style="color:#1a56db">${av-acbl}</td><td class="num">${av}</td></tr>`);
                } else {
                  rows.push('<tr style="border-top:1px solid #ddd;color:#ccc;font-style:italic"><td>Autres</td><td class="num">—</td><td class="num">—</td><td class="num">0</td></tr>');
                }
                return rows.join('');
              })()}
              </tbody>
            </table>
          </div>
        </div>
      </div>`;

      // ── Répartition par catégorie ──
      html += `<div class="analyse-section">
        <h3>📊 Répartition par cause</h3>
        <table class="analyse-table">
          <thead><tr><th>Catégorie</th><th class="num">Nb</th><th class="num">%</th><th>Barre</th></tr></thead>
          <tbody>`;
      sortedCats.forEach(([cat,v]) => {
        const isCab = cat === 'Cable';
        const w = Math.round(v/maxCat*100);
        const style = isCab ? 'color:#b30000;font-weight:bold' : parseFloat(pct(v,total))>=15 ? 'color:#e34a33' : '';
        html += `<tr>
          <td style="${style}">${isCab?'🔴 ':''}<b>${cat}</b></td>
          <td class="num" style="${style}">${v}</td>
          <td class="num">${pct(v,total)}%</td>
          <td><div class="bar-bg"><div class="bar-fill ${isCab?'':'blue'}" style="width:${w}%"></div></div></td>
        </tr>`;

      html += `</tbody></table></div>`;

      // ── Répartition par type d'abonnement ──
      const aboCounts = {};
      rows.forEach(r => {
        const aboRaw = (r["TYPE ABONNEMENT"]||"—").trim().toUpperCase();
        const abo = aboRaw === 'NUMERIQUE' ? 'T0/T2' : aboRaw;
        aboCounts[abo] = (aboCounts[abo]||0)+1;

      const sortedAbo = Object.entries(aboCounts).sort((a,b)=>b[1]-a[1]);

          <tbody>`;
      sortedAbo.forEach(([abo,v]) => {
        const w = Math.round(v/maxAbo*100);
        const style = parseFloat(pct(v,total))>=20 ? 'color:#b30000;font-weight:bold' : parseFloat(pct(v,total))>=10 ? 'color:#e34a33' : '';
        html += `<tr>
          <td style="${style}"><b>${abo}</b></td>
          <td class="num" style="${style}">${v}</td>
          <td class="num">${pct(v,total)}%</td>
          <td><div class="bar-bg"><div class="bar-fill blue" style="width:${w}%"></div></div></td>
        </tr>`;

      // ── Top 10 clients ──
      const clientCounts = {};
      rows.forEach(r => {

    // ── Analyse comparative multi-mois ─────────────────────────────
    function buildAnalyseComparative(months){
      const moisData = months.map(m => {
        const rows = DATA_JSON.filter(r => {
          const d = toJSDate(r["DATE DE CRÉATION"]);
          return d && d.getMonth()+1 === m;
        });
        const total = rows.length;
        const cable = rows.filter(r => causesCable.includes((r["CAUSE RÉELLE"]||"").toUpperCase().trim())).length;
        const zones = {};
        rows.forEach(r => {
          const loc = normaliserAbidjan((r["LOCALISATION CLIENT"]||"").toUpperCase().trim());
          zones[loc] = (zones[loc]||0)+1;
        });
        const topZone = Object.entries(zones).sort((a,b)=>b[1]-a[1])[0];
        const nds = {};
        rows.forEach(r => { const nd=(r["ND"]||"—").toString().trim(); nds[nd]=(nds[nd]||0)+1; });
        const recurrents = Object.values(nds).filter(v=>v>=2).length;
        return { m, total, cable, pctCable: pct(cable,total), topZone: topZone?.[0]||'—', topZoneV: topZone?.[1]||0, recurrents, zones };
      });

      const maxTotal = Math.max(...moisData.map(d=>d.total),1);
      const maxCable = Math.max(...moisData.map(d=>d.cable),1);

      let html = '';

      // KPIs comparatifs
      html += `<div class="analyse-section">
        <h3>Synthèse comparative — ${months.map(m=>moisNoms[m]).join(' · ')}</h3>
        <table class="analyse-table">
          <thead><tr><th>Mois</th><th class="num">Total</th><th class="num">Inc. Câble</th><th class="num">% Câble</th><th class="num">Incident répétitif (ND)</th><th>Zone critique</th><th>Évolution</th></tr></thead>
          <tbody>`;
      moisData.forEach((d,i) => {
        const prev = moisData[i-1];
        let trend = '';
        if(prev){
          const diff = d.total - prev.total;
          if(diff>0) trend=`<span class="trend-up">▲ +${diff}</span>`;
          else if(diff<0) trend=`<span class="trend-dn">▼ ${diff}</span>`;
          else trend=`<span class="trend-eq">= 0</span>`;
        }
        html += `<tr>
          <td><b>${moisNoms[d.m]}</b></td>
          <td class="num">${d.total}</td>
          <td class="num" style="color:#b30000">${d.cable}</td>
          <td class="num">${d.pctCable}%</td>
          <td class="num">${d.recurrents}</td>
          <td>${d.topZone} <small>(${d.topZoneV})</small></td>
          <td>${trend}</td>
        </tr>`;
      });
      html += `</tbody></table></div>`;

      // Barres comparatives incidents
      html += `<div class="analyse-section">

            </div>
          </div>

      html += `</div>

          <span style="display:inline-block;width:12px;height:8px;background:#b30000;border-radius:2px"></span> Total &nbsp;

        </div>

      // Zones par mois (top 5 communes, vue croisée)

        html += `<div class="analyse-section">

            <tbody>`;
        allZones.sort((a,b)=>{
          const ta = moisData.reduce((s,d)=>s+(d.zones[a]||0),0);

        const d = toJSDate(r["DATE DE CRÉATION"]);

      const totAll = allRows.length;

      allRows.forEach(r => {

        if(isAbidjan(locRaw)){
          totAbj++;
          const loc=normaliserAbidjan(locRaw);
          abjLoc2[loc]=(abjLoc2[loc]||0)+1;
          if(isCab) abjCableDetail2[loc]=(abjCableDetail2[loc]||0)+1;
        } else {
          totInt++;
          const v=normaliserVille(locRaw);
          intLoc2[v]=(intLoc2[v]||0)+1;
          if(isCab) intCableDetail2[v]=(intCableDetail2[v]||0)+1;
        }
      });
      const sortedAbj2 = Object.entries(abjLoc2).sort((a,b)=>b[1]-a[1]);
      const sortedInt2 = Object.entries(intLoc2).sort((a,b)=>{
        if(a[0]==='Autres') return 1;
        if(b[0]==='Autres') return -1;
        return b[1]-a[1];
      });
      const autresInt2 = 0, autresInt2Cable = 0;

      html += `<div class="analyse-section">

            ${(()=>{
              const villesConnues2 = sortedInt2.filter(([z])=>z!=='Autres');
              const autresRow2 = sortedInt2.find(([z])=>z==='Autres');
              const nAbj2 = sortedAbj2.length;

      // ── Répartition par catégorie (cumulé) ──

        const c=(r["CAUSE RÉELLE"]||"").toUpperCase().trim();

        for(const g in causeGroups){if(causeGroups[g].includes(c)){catCounts2[g]++;matched=true;break;}}
        if(!matched) catCounts2["Autres"]++;
      });
      const sortedCats2=Object.entries(catCounts2).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
      const maxCat2=sortedCats2[0]?.[1]||1;
      html+=`<div class="analyse-section">
        <h3>📊 Répartition par cause (cumulé)</h3>

        const isCab=cat==='Cable';
        const w=Math.round(v/maxCat2*100);
        const style=isCab?'color:#b30000;font-weight:bold':parseFloat(pct(v,totAll))>=15?'color:#e34a33':'';

      // ── Répartition par type d'abonnement (cumulé) ──
      const aboCounts2 = {};
      allRows.forEach(r => {
        const aboRaw = (r["TYPE ABONNEMENT"]||"—").trim().toUpperCase();
        const abo = aboRaw === 'NUMERIQUE' ? 'T0/T2' : aboRaw;
        aboCounts2[abo] = (aboCounts2[abo]||0)+1;
      });
      const sortedAbo2 = Object.entries(aboCounts2).sort((a,b)=>b[1]-a[1]);
      const maxAbo2 = sortedAbo2[0]?.[1]||1;

      html += `<div class="analyse-section">
        <h3>📦 Incidents par type d'abonnement (cumulé)</h3>
        <table class="analyse-table">
          <thead><tr><th>Type</th><th class="num">Nb</th><th class="num">%</th><th>Barre</th></tr></thead>
          <tbody>`;
      sortedAbo2.forEach(([abo,v]) => {
        const w = Math.round(v/maxAbo2*100);
        const style = parseFloat(pct(v,totAll))>=20?'color:#b30000;font-weight:bold':parseFloat(pct(v,totAll))>=10?'color:#e34a33':'';
        html += `<tr>
          <td style="${style}"><b>${abo}</b></td>
          <td class="num" style="${style}">${v}</td>
          <td class="num">${pct(v,totAll)}%</td>
          <td><div class="bar-bg"><div class="bar-fill blue" style="width:${w}%"></div></div></td>
        </tr>`;
      });
      html += `</tbody></table></div>`;

      // ── Top 10 clients (cumulé) ──
      const clientCounts2 = {};
      allRows.forEach(r => {
        const c = (r["RAISON SOCIALE"]||"—").trim();
        if(!clientCounts2[c]) clientCounts2[c] = {total:0, cable:0};
        clientCounts2[c].total++;
        if(causesCable.includes((r["CAUSE RÉELLE"]||"").toUpperCase().trim())) clientCounts2[c].cable++;
      });
      const top10Clients2 = Object.entries(clientCounts2).sort((a,b)=>b[1].total-a[1].total).slice(0,10);
      const maxClient2 = top10Clients2[0]?.[1].total||1;
      html+=`<div class="analyse-section">
        <h3>🏢 Top 10 clients impactés (cumulé)</h3>
        <table class="analyse-table"><thead><tr><th>Client</th><th class="num">Câble</th><th class="num">Autre</th><th class="num">Total</th><th>Barre</th></tr></thead><tbody>`;
      top10Clients2.forEach(([c,d],i)=>{
        const w=Math.round(d.total/maxClient2*100);
        const style=i===0?'color:#b30000;font-weight:bold':i<3?'color:#e34a33':'';
        html+=`<tr><td style="${style}"><b>${c}</b></td><td class="num" style="color:#b30000">${d.cable}</td><td class="num" style="color:#1a56db">${d.total-d.cable}</td><td class="num" style="${style}">${d.total}</td><td><div class="bar-bg"><div class="bar-fill blue" style="width:${w}%"></div></div></td></tr>`;
      });
      html+=`</tbody></table></div>`;

      // ── ND récurrents (cumulé) ──
      const nds2={};
      allRows.forEach(r=>{
        const nd=(r["ND"]||"—").toString().trim();
        const loc=normaliserAbidjan((r["LOCALISATION CLIENT"]||"").toUpperCase().trim());
        const client=r["RAISON SOCIALE"]||"—";
        if(!nds2[nd]) nds2[nd]={nd,client,loc,count:0};
        nds2[nd].count++;
      });
      const recurrents2=Object.values(nds2).filter(n=>n.count>=2).sort((a,b)=>b.count-a.count).slice(0,15);

        html+=`<div class="analyse-section">

        recurrents2.forEach(n=>{

        });
        html+=`</tbody></table></div>`;
      }

      return html;
    }
