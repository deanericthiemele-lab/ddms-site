<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Carte Incidents Abidjan - Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family: Arial, sans-serif; }
    #map { height: 100vh; }

    /* Bouton retour */
    .btn-back {
      padding:8px 12px;
      font-weight:bold;
      border:none;
      border-radius:5px;
      background:#111;
      color:white;
      cursor:pointer;
    }

    /* Sélecteur mois (haut droite) */
    .month-selector {
      position:absolute;
      top:15px;
      right:20px;
      background:white;
      padding:8px 12px;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
      border-radius:6px;
      z-index:1000;
      font-weight:bold;
      display:flex;
      gap:8px;
      align-items:center;
    }

    /* Dropdown multi-mois */
    #monthDropdownBtn {
      padding:5px 10px;
      border:1px solid #ccc;
      border-radius:5px;
      background:white;
      cursor:pointer;
      font-size:13px;
      font-weight:bold;
      min-width:110px;
      text-align:left;
    }
    #monthDropdownPanel {
      display:none;
      position:absolute;
      top:44px;
      right:0;
      background:white;
      border-radius:8px;
      box-shadow:0 4px 20px rgba(0,0,0,0.2);
      padding:10px 0;
      z-index:2000;
      min-width:160px;
      max-height:320px;
      overflow-y:auto;
    }
    #monthDropdownPanel.open { display:block; }
    .month-check-item {
      display:flex;
      align-items:center;
      gap:8px;
      padding:5px 14px;
      cursor:pointer;
      font-size:13px;
      font-weight:normal;
      transition:background .1s;
    }
    .month-check-item:hover { background:#f5f5f5; }
    .month-check-item input { cursor:pointer; accent-color:#111; }
    .month-check-sep { border-top:1px solid #eee; margin:4px 0; }
    .month-check-actions {
      display:flex;
      gap:6px;
      padding:6px 14px 2px;
      font-size:11px;
    }
    .month-check-actions span {
      cursor:pointer;
      color:#1a56db;
      text-decoration:underline;
    }

    /* Bouton Analyse */
    #btnAnalyse {
      padding:6px 14px;
      background:#111;
      color:#fff;
      border:none;
      border-radius:5px;
      font-size:13px;
      font-weight:bold;
      cursor:pointer;
      white-space:nowrap;
    }
    #btnAnalyse:hover { background:#333; }

    /* Modal Analyse */
    #analyseModal {
      display:none;
      position:fixed;
      inset:0;
      z-index:9998;
      background:rgba(0,0,0,0.5);
      align-items:center;
      justify-content:center;
    }
    #analyseModal.open { display:flex; }
    #analyseModalBox {
      background:#f8f9fa;
      border-radius:12px;
      width:96vw;
      max-width:1200px;
      max-height:92vh;
      display:flex;
      flex-direction:column;
      box-shadow:0 12px 40px rgba(0,0,0,0.3);
      overflow:hidden;
    }
    #analyseModalHeader {
      background:#111;
      color:#fff;
      padding:16px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-size:15px;
      font-weight:bold;
    }
    #analyseModalHeader button {
      background:none; border:none; color:#fff; font-size:20px; cursor:pointer;
    }
    #analyseModalBody {
      overflow-y:auto;
      flex:1;
      padding:20px;
    }
    .analyse-section {
      background:white;
      border-radius:8px;
      padding:16px 18px;
      margin-bottom:14px;
      box-shadow:0 1px 4px rgba(0,0,0,0.08);
    }
    .analyse-section h3 {
      margin:0 0 12px;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.5px;
      color:#555;
      border-bottom:2px solid #eee;
      padding-bottom:8px;
    }
    .analyse-kpi-row {
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .akpi {
      background:#f4f4f4;
      border-radius:8px;
      padding:10px 16px;
      text-align:center;
      min-width:100px;
      flex:1;
    }
    .akpi .val { font-size:22px; font-weight:bold; color:#111; }
    .akpi .lbl { font-size:11px; color:#777; margin-top:2px; }
    .akpi.red .val { color:#b30000; }
    .akpi.blue .val { color:#1a56db; }
    .akpi.green .val { color:#1a7a1a; }

    /* Table analyse */
    .analyse-table { width:100%; border-collapse:collapse; font-size:12px; }
    .analyse-table th {
      background:#f0f0f0; padding:7px 10px; text-align:left;
      font-weight:bold; color:#444; border-bottom:2px solid #ddd;
    }
    .analyse-table td { padding:6px 10px; border-bottom:1px solid #eee; }
    .analyse-table tbody tr:hover { background:#fafafa; }
    .analyse-table .num { text-align:right; font-weight:bold; }
    .bar-bg { background:#eee; border-radius:4px; height:8px; min-width:60px; }
    .bar-fill { height:8px; border-radius:4px; background:#b30000; }
    .bar-fill.blue { background:#1a56db; }

    /* Comparaison mois */
    .cmp-grid { display:grid; gap:8px; }
    .cmp-row { display:flex; align-items:center; gap:8px; font-size:12px; }
    .cmp-mois { width:36px; font-weight:bold; color:#555; }
    .cmp-bars { flex:1; display:flex; flex-direction:column; gap:3px; }
    .cmp-val { width:36px; text-align:right; font-size:11px; color:#333; }
    .trend-up { color:#b30000; }
    .trend-dn { color:#1a7a1a; }
    .trend-eq { color:#888; }

    #analyseExportBtn {
      margin:0 20px 16px;
      padding:8px 18px;
      background:#1a56db;
      color:#fff;
      border:none;
      border-radius:6px;
      font-size:13px;
      font-weight:bold;
      cursor:pointer;
      align-self:flex-start;
    }
    #analyseExportBtn:hover { background:#1344b0; }

    #analyseFooter {
      background:#f0f0f0;
      border-top:1px solid #ddd;
      padding:12px 20px;
      display:flex;
      gap:10px;
      justify-content:center;
      align-items:center;
    }
    .analyse-footer-btn {
      padding:9px 22px;
      border:none;
      border-radius:6px;
      font-size:13px;
      font-weight:bold;
      cursor:pointer;
    }
    .analyse-footer-btn.blue { background:#1a56db; color:#fff; }
    .analyse-footer-btn.blue:hover { background:#1344b0; }
    .analyse-footer-btn.grey { background:#555; color:#fff; }
    .analyse-footer-btn.grey:hover { background:#333; }
    #copyStatus { font-size:12px; color:#1a7a1a; display:none; }

    /* Résumé incidents (sous mois) */
    #summaryBox{
      position:absolute;
      top:65px;
      right:20px;
      background:white;
      padding:8px 10px;
      width:260px;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
      border-radius:6px;
      z-index:1000;
      font-size:12px;
      line-height:18px;
      max-height:70vh;
      overflow:auto;
    }

    /* Panel gauche */
    #leftPanel{
      position:absolute;
      top:65px;
      left:20px;
      width:260px;
      background:white;
      padding:8px 10px;
      box-shadow:0 0 10px rgba(0,0,0,0.3);
      border-radius:6px;
      z-index:1000;
      font-size:12px;
      line-height:18px;
      max-height:70vh;
      overflow:auto;
    }

    /* Bouton retour container */
    #topLeftBar{
      position:absolute;
      top:15px;
      left:20px;
      z-index:1000;
    }

    /* Texte au centre des cercles */
    .circle-label{
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      font-weight:bold;
      color:white;            /* demandé texte blanc */
      font-size:12px;         /* un peu plus petit */
      width:100%;
      height:100%;
      text-shadow: 0 1px 2px rgba(0,0,0,0.65); /* lisible sur jaune */
    }

    /* Légende */
    .legend {
      background:white;
      padding:12px;
      line-height:22px;
      color:#333;
      font-size:14px;
      box-shadow:0 0 8px rgba(0,0,0,0.2);
    }

    /* Modal popup zone */
    #zoneModal {
      display:none;
      position:fixed;
      inset:0;
      z-index:9999;
      background:rgba(0,0,0,0.45);
      align-items:center;
      justify-content:center;
    }
    #zoneModal.open { display:flex; }
    #zoneModalBox {
      background:#fff;
      border-radius:10px;
      width:620px;
      max-width:95vw;
      max-height:80vh;
      display:flex;
      flex-direction:column;
      box-shadow:0 8px 32px rgba(0,0,0,0.28);
      overflow:hidden;
    }
    #zoneModalHeader {
      background:#111;
      color:#fff;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      font-size:15px;
      font-weight:bold;
      letter-spacing:.3px;
    }
    #zoneModalHeader button {
      background:none;
      border:none;
      color:#fff;
      font-size:20px;
      cursor:pointer;
      line-height:1;
      padding:0 2px;
    }
    #zoneModalKpis {
      display:flex;
      gap:10px;
      padding:12px 18px 8px;
      border-bottom:1px solid #eee;
      flex-wrap:wrap;
      align-items:center;
    }
    #zoneModalToolbar {
      display:flex;
      gap:8px;
      padding:8px 18px;
      border-bottom:1px solid #eee;
      align-items:center;
    }
    #zoneSearch {
      flex:1;
      padding:6px 10px;
      border:1px solid #ddd;
      border-radius:6px;
      font-size:12px;
      outline:none;
    }
    #zoneSearch:focus { border-color:#111; }
    #btnExportZone {
      padding:6px 14px;
      background:#1a56db;
      color:#fff;
      border:none;
      border-radius:6px;
      font-size:12px;
      font-weight:bold;
      cursor:pointer;
      white-space:nowrap;
    }
    #btnExportZone:hover { background:#1344b0; }
    #zoneResultCount { font-size:11px; color:#888; white-space:nowrap; }
    .kpi-chip {
      background:#f4f4f4;
      border-radius:6px;
      padding:5px 12px;
      font-size:12px;
      font-weight:bold;
      color:#333;
    }
    .kpi-chip span { color:#b30000; font-size:14px; }
    #zoneModalBody {
      overflow-y:auto;
      flex:1;
      padding:0;
    }
    #zoneModalBody table {
      width:100%;
      border-collapse:collapse;
      font-size:12px;
    }
    #zoneModalBody thead th {
      background:#f0f0f0;
      padding:8px 10px;
      text-align:left;
      font-weight:bold;
      color:#444;
      border-bottom:2px solid #ddd;
      position:sticky;
      top:0;
    }
    #zoneModalBody tbody tr:hover { background:#fafafa; }
    #zoneModalBody tbody td {
      padding:7px 10px;
      border-bottom:1px solid #eee;
      vertical-align:top;
    }
    .tag-cable { background:#fde8e8; color:#b30000; border-radius:4px; padding:1px 6px; font-size:11px; font-weight:bold; }
    .tag-autre { background:#e8f0fe; color:#1a56db; border-radius:4px; padding:1px 6px; font-size:11px; }
  </style>
</head>
<body>

  <div id="topLeftBar" style="position:absolute;top:15px;left:20px;z-index:1000;display:flex;gap:8px;">
    <button class="btn-back" onclick="window.location.href='ingenierie.html'">⬅ Retour Ingénierie</button>
    <button class="btn-back" onclick="window.location.href='cic.html'">CIC</button>
    <button class="btn-back" onclick="togglePanel('leftPanel')" title="Localisations">📋 Loca.</button>
    <button class="btn-back" onclick="togglePanel('summaryBox')" title="Résumé Incidents">📊 Résumé</button>
  </div>

  <div class="month-selector">
    <span style="font-size:13px">Période :</span>
    <div style="position:relative">
      <button id="monthDropdownBtn" onclick="toggleMonthPanel(event)">Jun ▾</button>
      <div id="monthDropdownPanel">
        <div class="month-check-actions">
          <span onclick="selectAllMonths()">Tout</span>
          <span onclick="selectNoneMonths()">Aucun</span>
        </div>
        <div class="month-check-sep"></div>
        <label class="month-check-item"><input type="checkbox" value="0" onchange="onMonthCheck()"> Année entière</label>
        <div class="month-check-sep"></div>
        <label class="month-check-item"><input type="checkbox" value="1" onchange="onMonthCheck()"> Jan</label>
        <label class="month-check-item"><input type="checkbox" value="2" onchange="onMonthCheck()"> Fév</label>
        <label class="month-check-item"><input type="checkbox" value="3" onchange="onMonthCheck()"> Mar</label>
        <label class="month-check-item"><input type="checkbox" value="4" onchange="onMonthCheck()"> Avr</label>
        <label class="month-check-item"><input type="checkbox" value="5" onchange="onMonthCheck()"> Mai</label>
        <label class="month-check-item"><input type="checkbox" value="6" onchange="onMonthCheck()"> Jun</label>
        <label class="month-check-item"><input type="checkbox" value="7" onchange="onMonthCheck()"> Jul</label>
        <label class="month-check-item"><input type="checkbox" value="8" onchange="onMonthCheck()"> Aoû</label>
        <label class="month-check-item"><input type="checkbox" value="9" onchange="onMonthCheck()"> Sep</label>
        <label class="month-check-item"><input type="checkbox" value="10" onchange="onMonthCheck()"> Oct</label>
        <label class="month-check-item"><input type="checkbox" value="11" onchange="onMonthCheck()"> Nov</label>
        <label class="month-check-item"><input type="checkbox" value="12" onchange="onMonthCheck()"> Déc</label>
      </div>
    </div>
    <button id="btnAnalyse" onclick="openAnalyseModal()">📊 Analyse</button>
  </div>

  <!-- Modal Analyse -->
  <div id="analyseModal" onclick="if(event.target===this) closeAnalyseModal()">
    <div id="analyseModalBox">
      <div id="analyseModalHeader">
        <span id="analyseModalTitle">Analyse Incidents</span>
        <button onclick="closeAnalyseModal()">✕</button>
      </div>
      <div id="analyseModalBody"></div>
      <div id="analyseFooter">
        <button class="analyse-footer-btn blue" onclick="exportAnalyseExcel()">⬇ Exporter Excel</button>
        <button class="analyse-footer-btn grey" onclick="copierRapportImage()">📋 Copier image</button>
        <span id="copyStatus">✅ Copié dans le presse-papiers !</span>
      </div>
    </div>
  </div>

  <div id="summaryBox" style="display:none"><b>Résumé Incidents</b><hr>Chargement…</div>
  <div id="leftPanel" style="display:none"><b>Localisations</b><hr>Chargement…</div>

  <div id="map"></div>

  <!-- Modal zone incidents -->
  <div id="zoneModal" onclick="if(event.target===this) closeZoneModal()">
    <div id="zoneModalBox">
      <div id="zoneModalHeader">
        <span id="zoneModalTitle">Incidents — ZONE</span>
        <button onclick="closeZoneModal()" title="Fermer">✕</button>
      </div>
      <div id="zoneModalKpis"></div>
      <div id="zoneModalToolbar">
        <input id="zoneSearch" type="text" placeholder="🔍 Rechercher (client, ND, cause, date…)" oninput="filterZoneTable()">
        <span id="zoneResultCount"></span>
        <button id="btnExportZone" onclick="exportZoneExcel()">⬇ Excel</button>
      </div>
      <div id="zoneModalBody"></div>
    </div>
  </div>

  <!-- Libs -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script>
    // === MAP INIT ===
    const map = L.map('map').setView([5.34, -4.03], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    // Contour Abidjan (simplifié)
    const abidjanBoundary = L.polygon([
      [5.44, -4.15],
      [5.45, -4.05],
      [5.43, -3.92],
      [5.38, -3.85],
      [5.28, -3.88],
      [5.22, -3.95],
      [5.23, -4.10],
      [5.30, -4.15]
    ], { color:'#000', weight:3, fillOpacity:0 }).addTo(map);

    map.fitBounds(abidjanBoundary.getBounds());

    // Communes Abidjan (points)
    const communesCoords = {
      "COCODY":[5.36,-3.96],
      "PLATEAU":[5.32,-4.02],
      "MARCORY":[5.29,-3.97],
      "TREICHVILLE":[5.30,-4.01],
      "YOPOUGON":[5.33,-4.09],
      "PORT-BOUET":[5.26,-3.94],
      "ABOBO":[5.43,-4.01],
      "BINGERVILLE":[5.35,-3.88]
    };

    
    const abidjanZones = ["COCODY","PLATEAU","MARCORY","TREICHVILLE","YOPOUGON","PORT-BOUET","PORT BOUET","ABOBO","BINGERVILLE"];

    function isAbidjan(loc){
        if(!loc) return false;
        const clean = loc.toUpperCase().replace(/-/g," ").trim();
        return abidjanZones.some(z => clean.includes(z.replace(/-/g," ")));
    }


    // Causes "Cable" (liste fournie)
    const causesCable = [
      "BRINS FO MAUVAIS",
      "CÂBLE FO COUPÉ",
      "CABLE FO COUPE",           // tolérance
      "COUPURE FO FTTX",
      "JARRETIERES CENTRAL",
      "PROBLÈME TRANSMISSION",
      "PROBLEME TRANSMISSION",
      "DERCO",
      "CUIVRE DÉFFECTUEUX",
      "CUIVRE DEFFECTUEUX",
      "COUPURE FO ROA",
      "FO DÉFFECTUEUX",
      "FO DEFFECTUEUX"
    ];

    // Groupes causes (résumé à droite)
    const causeGroups = {
      "Cable": causesCable,
      "Bande passante": ["BANDE PASSANTE SATURÉE","BANDE PASSANTE SATUREE","PROBLÈME BANDE PASSANTE","PROBLEME BANDE PASSANTE","USAGE CLIENT"],
      "Environnement client": ["PROBLÈME ENVIRONNEMENT CLIENT","PROBLEME ENVIRONNEMENT CLIENT","PROBLÈME EQUIPEMENTS OCI CHEZ LE CLIENT","PROBLEME EQUIPEMENTS OCI CHEZ LE CLIENT","PB EQPT OCI CHEZ LE CLIENT","ATTENTE RDV CLIENT","JARRETIERES CLIENT","PROBLÈME EQUIPEMENTS CLIENT","PROBLEME EQUIPEMENTS CLIENT","CÂBLE RÉSEAUX RJ45","CABLE RESEAUX RJ45"],
      "BLR": ["PROBLÈME RADIO BLR/FH","PROBLEME RADIO BLR/FH","FAISCEAU DÉFFECTUEUX","FAISCEAU DEFFECTUEUX","POE DÉFFECTUEUX","POE DEFFECTUEUX","PB SWITCH BLR"],
      "Autocom": ["PERTE DE CONFIG COMPTE CLIENT","PB AUTOCOM","PROBLÈME CONFIG IMS","PROBLEME CONFIG IMS","COMPTE SIP"],
      "Erreur signalisation": ["RÉITÉRATION DE SIGNALISATION","REITERATION DE SIGNALISATION","ERREUR DE SIGNALISATION"],
      "Central OCI": ["ALIGNEMENT PORT OLT PB MGPLX","PROBLÈME IP & CONFIG","PROBLEME IP & CONFIG","PROBLÈME EQUIPEMENTS D’ACCÈS","PROBLEME EQUIPEMENTS D’ACCES","PROBLEME EQUIPEMENTS D'ACCES","PB MODEM CENTRAL","PROBLÈME OCB/CSN","PROBLEME OCB/CSN","PB PE"],
      "VSAT": ["VSAT"],
      "Supervision": ["PROBLÈME DE SUPERVISION CORTEX","PROBLEME DE SUPERVISION CORTEX","SUPERVISION CORTEX"],
      "Energie": ["PB ENERGIE","PB ÉNERGIE"],
      "Autres": []
    };

    // Couleurs volumes (zones)
    function getColor(total){
      if(total >= 80) return "#b30000";
      if(total >= 50) return "#e34a33";
      if(total >= 30) return "#fc8d59";
      if(total >= 15) return "#fdcc8a";
      return "#2b8cbe";
    }

    // Critique (panels) : basé sur % global
    function styleCritical(pct){
      if(pct >= 25) return "color:#b30000;font-weight:bold";
      if(pct >= 15) return "color:#e34a33";
      return "";
    }

    // Regroupement intelligent villes intérieur
    function normaliserVille(loc){
      loc = (loc || "").toUpperCase().trim();
      if(loc.includes("BOUAKE")) return "BOUAKE";
      if(loc.includes("DALOA")) return "DALOA";
      if(loc.includes("YAMOUSSOUKRO")) return "YAMOUSSOUKRO";
      if(loc.includes("SAN PEDRO")) return "SAN PEDRO";
      if(loc.includes("KORHOGO")) return "KORHOGO";
      if(loc.includes("MAN")) return "MAN";
      if(loc.includes("GAGNOA")) return "GAGNOA";
      return loc;
    }

    // Parse date excel OU string JJ/MM/AAAA
    function toJSDate(v){
      if(v == null || v === "") return null;
      if(typeof v === "number"){
        return new Date((v - 25569) * 86400 * 1000);
      }
      if(typeof v === "string"){
        const m = v.trim().match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
        if(m){
          const dd = parseInt(m[1],10), mm = parseInt(m[2],10), yy = parseInt(m[3],10);
          return new Date(yy, mm-1, dd);
        }
        const d2 = new Date(v);
        return isNaN(d2.getTime()) ? null : d2;
      }
      return null;
    }

    // Layers
    let layers = [];
    function clearMapLayers(){
      layers.forEach(l => map.removeLayer(l));
      layers = [];
    }

    // Légende volume
    let legendControl = null;
    function updateLegend(total){
      if(legendControl) map.removeControl(legendControl);
      legendControl = L.control({position:'bottomright'});
      legendControl.onAdd = function(){
        const div = L.DomUtil.create('div','legend');
        div.innerHTML += "<b>Code Couleur Volume</b><br><br>";
        div.innerHTML += "<span style='color:#b30000'>■</span> ≥ 80 : Critique<br>";
        div.innerHTML += "<span style='color:#e34a33'>■</span> 50 - 79 : Très élevé<br>";
        div.innerHTML += "<span style='color:#fc8d59'>■</span> 30 - 49 : Élevé<br>";
        div.innerHTML += "<span style='color:#fdcc8a'>■</span> 15 - 29 : Moyen<br>";
        div.innerHTML += "<span style='color:#2b8cbe'>■</span> < 15 : Faible<br>";
        div.innerHTML += "<hr><b>Total Mois :</b> " + total;
        return div;
      };
      legendControl.addTo(map);
    }

    // Data cache (évite de re-fetch à chaque mois)
    let DATA_JSON = null;

    async function loadData(){
      if(DATA_JSON) return DATA_JSON;
      const response = await fetch('data.xlsx');
      const arrayBuffer = await response.arrayBuffer();
      const wb = XLSX.read(arrayBuffer, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      DATA_JSON = XLSX.utils.sheet_to_json(sheet);
      return DATA_JSON;
    }

    
function normaliserAbidjan(loc){
    loc = (loc || "").toUpperCase()
        .replace(/-/g," ")
        .replace(/\s+/g," ")
        .trim();

    if(loc.includes("YOPOUGON")) return "YOPOUGON";
    if(loc.includes("PORT BOUET")) return "PORT-BOUET";

    return loc;
}

function computeForMonth(json, selectedMonth){
      // Alias pour compatibilité — délègue à computeForMonths
      return computeForMonths(json, [selectedMonth]);
    }

    function renderMap(zoneCounts){
      clearMapLayers();

      for(const loc in zoneCounts){
        if(!communesCoords[loc]) continue;

        const cable = zoneCounts[loc].cable;
        const autre = zoneCounts[loc].autre;
        const totalZone = cable + autre;
        const pctCable = totalZone ? ((cable/totalZone)*100).toFixed(0) : 0;
        const pctAutre = totalZone ? ((autre/totalZone)*100).toFixed(0) : 0;

        const circle = L.circle(communesCoords[loc],{
          radius: 1900,
          color:"#111",
          weight:2,
          fillColor: getColor(totalZone),
          fillOpacity: 0.9
        }).addTo(map);

        // Clic → popup liste incidents
        circle.on('click', (function(locName){ return function(){
          openZoneModal(locName);
        };})(loc));
        circle.getElement && circle.on('mouseover', function(){ this.setStyle({weight:4}); });
        circle.on('mouseout', function(){ this.setStyle({weight:2}); });

        layers.push(circle);

        const label = L.marker(communesCoords[loc],{
          icon: L.divIcon({
            className:'circle-label',
            html:`<div style="pointer-events:none;">
                    <div style="font-size:13px">${loc}</div>
                    <div>Cable: ${cable} (${pctCable}%)</div>
                    <div>Autre: ${autre} (${pctAutre}%)</div>
                  </div>`,
            iconSize:[320,150]
          }),
          interactive: false
        }).addTo(map);
        layers.push(label);
      }
    }

    // === MODAL ZONE ===
    let _zoneRows = []; // cache pour search + export (une ligne = un ND)

    function openZoneModal(locName){
      const months = getSelectedMonths();
      if(!DATA_JSON) return;

      const raw = DATA_JSON.filter(row => {
        const d = toJSDate(row["DATE DE CRÉATION"]);
        if(!d) return false;
        if(!monthMatchesRow(d, months)) return false;
        const locRaw = (row["LOCALISATION CLIENT"] || "").toUpperCase().trim();
        return normaliserAbidjan(locRaw) === locName;
      });

      // Grouper par ND — une ligne par ND
      const ndMap = {};
      raw.forEach(r => {
        const nd = (r["ND"] || "—").toString().trim();
        const cause = (r["CAUSE RÉELLE"] || "—").toUpperCase().trim();
        const dateRaw = r["DATE DE CRÉATION"];
        const d = toJSDate(dateRaw);
        if(!ndMap[nd]) {
          ndMap[nd] = { nd, client: r["RAISON SOCIALE"] || "—", entries: [] };
        }
        ndMap[nd].entries.push({
          dateStr: d ? d.toLocaleDateString('fr-FR') : (dateRaw || "—"),
          dateTs: d ? d.getTime() : 0,
          cause,
          isCable: causesCable.includes(cause)
        });
      });

      // Construire _zoneRows : trier les entrées de chaque ND chronologiquement
      _zoneRows = Object.values(ndMap).map(g => {
        g.entries.sort((a,b) => a.dateTs - b.dateTs);
        const dates  = g.entries.map(e => e.dateStr).join(' | ');
        const causes = g.entries.map(e => e.cause).join(' | ');
        const nbIncidents = g.entries.length;
        const isCableAny  = g.entries.some(e => e.isCable);
        return {
          nd: g.nd, client: g.client, nbIncidents,
          dates, causes, isCableAny,
          firstTs: g.entries[0]?.dateTs || 0,
          _search: (g.nd + ' ' + g.client + ' ' + dates + ' ' + causes).toLowerCase()
        };
      });

      // Tri décroissant par nbIncidents
      _zoneRows.sort((a,b) => b.nbIncidents - a.nbIncidents || b.firstTs - a.firstTs);

      const totalIncidents = raw.length;
      const cable = raw.filter(r => causesCable.includes((r["CAUSE RÉELLE"]||"").toUpperCase().trim())).length;
      const autre = totalIncidents - cable;

      const moisNoms_local = ["Année","Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
      const periodLabel = months.includes(0) ? 'Année'
        : months.length === 1 ? moisNoms_local[months[0]]
        : months.map(m=>moisNoms_local[m]).join(', ');
      document.getElementById('zoneModalTitle').textContent =
        `Incidents — ${locName} · ${periodLabel}`;

      document.getElementById('zoneModalKpis').innerHTML = `
        <div class="kpi-chip">Total incidents <span>${totalIncidents}</span></div>
        <div class="kpi-chip">Cable <span style="color:#b30000">${cable}</span></div>
        <div class="kpi-chip">Autre <span style="color:#1a56db">${autre}</span></div>
        <div class="kpi-chip">ND distincts <span style="color:#555">${_zoneRows.length}</span></div>
      `;

      document.getElementById('zoneSearch').value = '';
      renderZoneTable(_zoneRows);
      document.getElementById('zoneModal').classList.add('open');
      document.getElementById('zoneSearch').focus();
    }

    function renderZoneTable(rows){
      document.getElementById('zoneResultCount').textContent = rows.length + ' ND';
      if(rows.length === 0){
        document.getElementById('zoneModalBody').innerHTML =
          '<div style="padding:24px;text-align:center;color:#999;">Aucun résultat.</div>';
        return;
      }
      let html = `<table>
        <thead><tr>
          <th>#</th>
          <th>Client (Raison Sociale)</th>
          <th>ND</th>
          <th style="text-align:center">Nb incidents</th>
          <th>Dates (chronologiques)</th>
          <th>Causes réelles (chronologiques)</th>
        </tr></thead><tbody>`;

      rows.forEach((r, i) => {
        const nbStyle = r.nbIncidents >= 3
          ? 'font-weight:bold;color:#b30000'
          : r.nbIncidents >= 2 ? 'color:#e34a33' : 'color:#555';

        const datesArr  = r.dates.split(' | ');
        const causesArr = r.causes.split(' | ');

        const datesHtml  = datesArr.map(d => `<div style="padding:1px 0">${d}</div>`).join('');
        const causesHtml = causesArr.map(c => {
          const isCable = causesCable.includes(c.trim());
          return `<div style="padding:1px 0"><span class="${isCable?'tag-cable':'tag-autre'}">${c}</span></div>`;
        }).join('');

        html += `<tr>
          <td style="color:#aaa;vertical-align:top">${i+1}</td>
          <td style="vertical-align:top"><b>${r.client}</b></td>
          <td style="vertical-align:top;color:#555;white-space:nowrap">${r.nd}</td>
          <td style="${nbStyle};text-align:center;vertical-align:top;font-size:15px">${r.nbIncidents}</td>
          <td style="vertical-align:top;white-space:nowrap;font-size:12px">${datesHtml}</td>
          <td style="vertical-align:top;font-size:12px">${causesHtml}</td>
        </tr>`;
      });
      html += `</tbody></table>`;
      document.getElementById('zoneModalBody').innerHTML = html;
    }

    function filterZoneTable(){
      const q = document.getElementById('zoneSearch').value.trim().toLowerCase();
      if(!q){ renderZoneTable(_zoneRows); return; }
      renderZoneTable(_zoneRows.filter(r => r._search.includes(q)));
    }

    function exportZoneExcel(){
      const q = document.getElementById('zoneSearch').value.trim().toLowerCase();
      const rows = q ? _zoneRows.filter(r => r._search.includes(q)) : _zoneRows;

      const wsData = [["#","Client (Raison Sociale)","ND","Nb incidents","Dates","Causes réelles"]];
      rows.forEach((r,i) => {
        wsData.push([i+1, r.client, r.nd, r.nbIncidents, r.dates, r.causes]);
      });

      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(wsData);
      ws['!cols'] = [{wch:4},{wch:40},{wch:18},{wch:13},{wch:35},{wch:60}];
      XLSX.utils.book_append_sheet(wb, ws, 'Incidents');
      const title = document.getElementById('zoneModalTitle').textContent
        .replace(/[^a-zA-Z0-9_\- ]/g,'').trim();
      XLSX.writeFile(wb, title + '.xlsx');
    }

    function closeZoneModal(){
      document.getElementById('zoneModal').classList.remove('open');
    }

    document.addEventListener('keydown', e => { if(e.key === 'Escape') closeZoneModal(); });

    function renderSummary(groupCounts, total, totalAbj, totalInt){

      const cableTotal = groupCounts["Cable"] || 0;
      const nonCableTotal = total - cableTotal;
      const pctCableGlobal = total ? ((cableTotal/total)*100).toFixed(1) : "0.0";

      html += `<b><span style='cursor:pointer;color:#b30000' onmouseenter="showCableDetails(groupCounts, total)" onmouseleave="map.closePopup()">Cable :</span></b> ${cableTotal} (${pctCableGlobal}%)<br>`;
      html += `<b>Non-Cable Global :</b> ${nonCableTotal} (${pctNonCableGlobal}%)<hr>`;

      
sorted.forEach(([k,v])=>{
  const pct = total ? ((v/total)*100).toFixed(1) : "0.0";
  const st = (parseFloat(pct) >= 30) ? "style='color:#b30000;font-weight:bold;cursor:pointer'" :
             (parseFloat(pct) >= 15) ? "style='color:#e34a33;cursor:pointer'" :
             "style='cursor:pointer'";

  html += `<div ${st} onmouseenter="showCategoryDetails('${k}', getSelectedMonths())" onmouseleave="map.closePopup()">${k} : ${v} (${pct}%)</div>`;
});

    function renderLeftPanel(abjLoc, intLoc, total, totalAbj, totalInt){
      const sortedAbj = Object.entries(abjLoc).sort((a,b)=> b[1]-a[1]);
      const sortedInt = Object.entries(intLoc).sort((a,b)=> b[1]-a[1]);

      const pctAbj = total ? ((totalAbj/total)*100).toFixed(1) : "0.0";
      const pctInt = total ? ((totalInt/total)*100).toFixed(1) : "0.0";

        html += `<div style="${styleCritical(parseFloat(pct))}">${loc} : ${vol} (${pct}%)</div>`;

    async function reloadAll(){
      const months = getSelectedMonths();
      const json = await loadData();
      // On agrège sur les mois sélectionnés (0 = tous)
      const r = computeForMonths(json, months);
      renderMap(r.zoneCounts);
      renderSummary(r.groupCounts, r.total, r.totalAbj, r.totalInt);
      renderLeftPanel(r.abjLoc, r.intLoc, r.total, r.totalAbj, r.totalInt);
      updateLegend(r.total);
    }

    // ── Multi-mois helpers ──────────────────────────────────────────
    const moisNoms = ["Année","Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];

    function getSelectedMonths(){
      const boxes = document.querySelectorAll('#monthDropdownPanel input[type=checkbox]:checked');
      if(!boxes.length) return [0]; // rien coché → tout
      const vals = Array.from(boxes).map(b => parseInt(b.value));
      if(vals.includes(0)) return [0]; // "Année entière"
      return vals;
    }

    function monthMatchesRow(d, months){
      if(months.includes(0)) return true;
      return months.includes(d.getMonth() + 1);
    }

    function updateDropdownLabel(){
      const months = getSelectedMonths();
      const btn = document.getElementById('monthDropdownBtn');
      if(months.includes(0) || months.length === 0) { btn.textContent = 'Année ▾'; return; }
      if(months.length === 1) { btn.textContent = moisNoms[months[0]] + ' ▾'; return; }
      btn.textContent = months.length + ' mois ▾';
    }

    function toggleMonthPanel(e){
      e.stopPropagation();
      document.getElementById('monthDropdownPanel').classList.toggle('open');
    }
    document.addEventListener('click', () => {
      document.getElementById('monthDropdownPanel').classList.remove('open');
    });

    function onMonthCheck(){
      updateDropdownLabel();
      reloadAll();
    }

    function selectAllMonths(){
      document.querySelectorAll('#monthDropdownPanel input[type=checkbox]').forEach(b => b.checked = true);
      onMonthCheck();
    }
    function selectNoneMonths(){
      document.querySelectorAll('#monthDropdownPanel input[type=checkbox]').forEach(b => b.checked = false);
      onMonthCheck();
    }

    // computeForMonths : version multi-mois
    function computeForMonths(json, months){
      const zoneCounts = {};
      const groupCounts = {};
      Object.keys(causeGroups).forEach(k => groupCounts[k] = 0);
      const abjLoc = {}, intLoc = {};
      let total = 0, totalAbj = 0, totalInt = 0;

      json.forEach(row => {
        const d = toJSDate(row["DATE DE CRÉATION"]);
        if(!d) return;
        if(!monthMatchesRow(d, months)) return;
        total++;
        const locRaw = (row["LOCALISATION CLIENT"] || "").toUpperCase().trim();
        const cause  = (row["CAUSE RÉELLE"] || "").toUpperCase().trim();
        if(!zoneCounts[locRaw]) zoneCounts[locRaw] = {cable:0, autre:0};
        if(causesCable.includes(cause)) zoneCounts[locRaw].cable++;
        else zoneCounts[locRaw].autre++;
        if(isAbidjan(locRaw)){
          totalAbj++;
          const locNorm = normaliserAbidjan(locRaw);
          abjLoc[locNorm] = (abjLoc[locNorm] || 0) + 1;
        } else {
          totalInt++;
          const ville = normaliserVille(locRaw);
          intLoc[ville] = (intLoc[ville] || 0) + 1;
        }
        let matched = false;
        for(const g in causeGroups){
          if(causeGroups[g].includes(cause)){ groupCounts[g]++; matched = true; break; }
        }
        if(!matched) groupCounts["Autres"]++;
      });
      return { zoneCounts, groupCounts, abjLoc, intLoc, total, totalAbj, totalInt };
    }

    (function initMonthCheckboxes(){
      const cur = new Date().getMonth() + 1;
      const boxes = document.querySelectorAll('#monthDropdownPanel input[type=checkbox]');
      boxes.forEach(b => { if(parseInt(b.value) === cur) b.checked = true; });
      updateDropdownLabel();
    })();

    // ── MODAL ANALYSE ──────────────────────────────────────────────
    function openAnalyseModal(){
      if(!DATA_JSON){ alert('Données non chargées.'); return; }
      const months = getSelectedMonths();
      const isMulti = !months.includes(0) && months.length > 1;
      const isFull  = months.includes(0);

      // Titre
      let titre = isFull ? 'Analyse — Année entière'
        : isMulti ? 'Analyse comparative — ' + months.map(m => moisNoms[m]).join(', ')
        : 'Analyse — ' + moisNoms[months[0]];
      document.getElementById('analyseModalTitle').textContent = titre;

      const body = document.getElementById('analyseModalBody');
      body.innerHTML = '';

      if(isMulti){
        body.innerHTML = buildAnalyseComparative(months);
      } else {
        const mList = isFull ? [0] : months;
        body.innerHTML = buildAnalyseMois(mList[0]);
      }

      document.getElementById('analyseModal').classList.add('open');
    }

    function closeAnalyseModal(){
      document.getElementById('analyseModal').classList.remove('open');

    document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeZoneModal(); closeAnalyseModal(); }});

    // ── Bilan mois unique (ou année) ───────────────────────────────
    function buildAnalyseMois(month){
      const rows = DATA_JSON.filter(r => {
        const d = toJSDate(r["DATE DE CRÉATION"]);
        return d && (month === 0 || d.getMonth()+1 === month);
      });
      const total = rows.length;
      if(!total) return '<div style="padding:30px;text-align:center;color:#999">Aucune donnée.</div>';

      const cable = rows.filter(r => causesCable.includes((r["CAUSE RÉELLE"]||"").toUpperCase().trim())).length;

      // Abidjan vs Intérieur
      let totalAbj = 0, totalInt = 0;
      const abjLoc = {}, intLoc = {};
      rows.forEach(r => {
        const locRaw = (r["LOCALISATION CLIENT"]||"").toUpperCase().trim();
        if(isAbidjan(locRaw)){
          totalAbj++;
          const loc = normaliserAbidjan(locRaw);
          abjLoc[loc] = (abjLoc[loc]||0)+1;
        } else {
          totalInt++;
          const v = normaliserVille(locRaw);
          intLoc[v] = (intLoc[v]||0)+1;
        }
      });
      const sortedAbj = Object.entries(abjLoc).sort((a,b)=>b[1]-a[1]);
      const sortedInt = Object.entries(intLoc).sort((a,b)=>b[1]-a[1]).slice(0,8);
      const zonesAbj = sortedAbj.filter(([z])=>communesCoords[z]);
      const zonesTouchees = zonesAbj.length;

      // Par zone (pour barres)
      const zones = {};
      rows.forEach(r => {
        const loc = normaliserAbidjan((r["LOCALISATION CLIENT"]||"").toUpperCase().trim());
        const c   = (r["CAUSE RÉELLE"]||"").toUpperCase().trim();
        if(!zones[loc]) zones[loc] = {total:0, cable:0};
        zones[loc].total++;
        if(causesCable.includes(c)) zones[loc].cable++;
      });
      const sortedZones = Object.entries(zones).sort((a,b)=>b[1].total-a[1].total);
      const maxZ = sortedZones[0]?.[1].total || 1;

      // Répartition par catégorie de cause (causeGroups)
      const catCounts = {};
      Object.keys(causeGroups).forEach(k => catCounts[k] = 0);
      rows.forEach(r => {
        const c = (r["CAUSE RÉELLE"]||"").toUpperCase().trim();
        let matched = false;
        for(const g in causeGroups){
          if(causeGroups[g].includes(c)){ catCounts[g]++; matched=true; break; }
        }
        if(!matched) catCounts["Autres"]++;
      });
      const sortedCats = Object.entries(catCounts).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
      const maxCat = sortedCats[0]?.[1]||1;

      // Top causes détaillées
      const causes = {};
      rows.forEach(r => {
        const c = (r["CAUSE RÉELLE"]||"—").toUpperCase().trim();
        causes[c] = (causes[c]||0)+1;
      });
      const sortedCauses = Object.entries(causes).sort((a,b)=>b[1]-a[1]).slice(0,10);
      const maxCause = sortedCauses[0]?.[1]||1;

      // ND récurrents
      const nds = {};
      rows.forEach(r => {
        const nd = (r["ND"]||"—").toString().trim();
        const loc = normaliserAbidjan((r["LOCALISATION CLIENT"]||"").toUpperCase().trim());
        const client = r["RAISON SOCIALE"]||"—";
        if(!nds[nd]) nds[nd] = {nd, client, loc, count:0};
        nds[nd].count++;
      });
      const recurrents = Object.values(nds).filter(n=>n.count>=2).sort((a,b)=>b.count-a.count).slice(0,10);

      let html = '';

      // ── KPIs globaux ──
      html += `<div class="analyse-section">
        <h3>Vue globale</h3>
        <div class="analyse-kpi-row">
          <div class="akpi"><div class="val">${total}</div><div class="lbl">Total incidents</div></div>
          <div class="akpi red"><div class="val">${cable}</div><div class="lbl">Cable (${pct(cable,total)}%)</div></div>
          <div class="akpi blue"><div class="val">${total-cable}</div><div class="lbl">Non-cable (${pct(total-cable,total)}%)</div></div>
          <div class="akpi"><div class="val">${zonesTouchees}</div><div class="lbl">Zones Abidjan</div></div>
          <div class="akpi green"><div class="val">${recurrents.length}</div><div class="lbl">ND récurrents</div></div>
        </div>
      </div>`;

      // ── Abidjan vs Intérieur ──
      html += `<div class="analyse-section">
        <h3>🗺️ Abidjan vs Intérieur</h3>
        <div class="analyse-kpi-row" style="margin-bottom:14px">
          <div class="akpi"><div class="val">${totalAbj}</div><div class="lbl">Abidjan (${pct(totalAbj,total)}%)</div></div>
          <div class="akpi blue"><div class="val">${totalInt}</div><div class="lbl">Intérieur (${pct(totalInt,total)}%)</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div>
            <div style="font-size:12px;font-weight:bold;color:#555;margin-bottom:6px">Communes Abidjan</div>
            <table class="analyse-table">
              <thead><tr><th>Zone</th><th class="num">Nb</th><th class="num">%</th></tr></thead>
              <tbody>
              ${sortedAbj.map(([z,v])=>`<tr>
                <td>${communesCoords[z]?'<b>'+z+'</b>':z}</td>
                <td class="num">${v}</td>
                <td class="num" style="${parseFloat(pct(v,total))>=15?'color:#b30000;font-weight:bold':''}">${pct(v,total)}%</td>
              </tr>`).join('')}
              </tbody>
            </table>
          </div>
          <div>
            <div style="font-size:12px;font-weight:bold;color:#555;margin-bottom:6px">Villes Intérieur (Top 8)</div>
            <table class="analyse-table">
              <thead><tr><th>Ville</th><th class="num">Nb</th><th class="num">%</th></tr></thead>
              <tbody>
              ${sortedInt.map(([z,v])=>`<tr>
                <td>${z}</td>
                <td class="num">${v}</td>
                <td class="num">${pct(v,total)}%</td>
              </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>`;

      // ── Zones touchées Abidjan ──
      html += `<div class="analyse-section">
        <h3>📍 Zones Abidjan touchées (${zonesTouchees}/8)</h3>
        <table class="analyse-table">
          <thead><tr><th>Zone</th><th class="num">Total</th><th class="num">Cable</th><th class="num">Autre</th><th>Volume</th></tr></thead>
          <tbody>`;
      sortedZones.filter(([z])=>communesCoords[z]).forEach(([z,v]) => {
        const w = Math.round(v.total/maxZ*100);
        html += `<tr>
          <td><b>${z}</b></td>
          <td class="num">${v.total}</td>
          <td class="num" style="color:#b30000">${v.cable} <small>(${pct(v.cable,v.total)}%)</small></td>

    // ── Analyse comparative multi-mois ─────────────────────────────
    function buildAnalyseComparative(months){
      const moisData = months.map(m => {
        const rows = DATA_JSON.filter(r => {
          const d = toJSDate(r["DATE DE CRÉATION"]);
          return d && d.getMonth()+1 === m;
        });
        const total = rows.length;
        const cable = rows.filter(r => causesCable.includes((r["CAUSE RÉELLE"]||"").toUpperCase().trim())).length;
        const zones = {};
        rows.forEach(r => {
          const loc = normaliserAbidjan((r["LOCALISATION CLIENT"]||"").toUpperCase().trim());
          zones[loc] = (zones[loc]||0)+1;
        });
        const topZone = Object.entries(zones).sort((a,b)=>b[1]-a[1])[0];
        const nds = {};
        rows.forEach(r => { const nd=(r["ND"]||"—").toString().trim(); nds[nd]=(nds[nd]||0)+1; });
        const recurrents = Object.values(nds).filter(v=>v>=2).length;
        return { m, total, cable, pctCable: pct(cable,total), topZone: topZone?.[0]||'—', topZoneV: topZone?.[1]||0, recurrents, zones };
      });

      const maxTotal = Math.max(...moisData.map(d=>d.total),1);

      let html = '';

            ${sortedInt2.map(([z,v])=>`<tr><td>${z}</td><td class="num">${v}</td><td class="num">${pct(v,totAll)}%</td></tr>`).join('')}

      // ── Répartition par catégorie (cumulé) ──
      const catCounts2={};

        if(!matched) catCounts2["Autres"]++;

      const sortedCats2=Object.entries(catCounts2).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
      const maxCat2=sortedCats2[0]?.[1]||1;
      html+=`<div class="analyse-section">
        <h3>📊 Répartition par catégorie de cause (cumulé)</h3>
        <table class="analyse-table"><thead><tr><th>Catégorie</th><th class="num">Nb</th><th class="num">%</th><th>Barre</th></tr></thead><tbody>`;
      sortedCats2.forEach(([cat,v])=>{
        const isCab=cat==='Cable';
        const w=Math.round(v/maxCat2*100);
        const style=isCab?'color:#b30000;font-weight:bold':parseFloat(pct(v,totAll))>=15?'color:#e34a33':'';
        html+=`<tr><td style="${style}">${isCab?'🔴 ':''}<b>${cat}</b></td><td class="num" style="${style}">${v}</td><td class="num">${pct(v,totAll)}%</td><td><div class="bar-bg"><div class="bar-fill ${isCab?'':'blue'}" style="width:${w}%"></div></div></td></tr>`;

      html+=`</tbody></table></div>`;

      // ── Top 10 causes réelles (cumulé) ──
      const causes2={};

      const sortedCauses2=Object.entries(causes2).sort((a,b)=>b[1]-a[1]).slice(0,10);
      const maxCause2=sortedCauses2[0]?.[1]||1;
      html+=`<div class="analyse-section">
        <h3>🔍 Top 10 causes réelles (cumulé)</h3>

      sortedCauses2.forEach(([c,v])=>{

        const w=Math.round(v/maxCause2*100);
        html+=`<tr><td>${isCab?'<span class="tag-cable">Cable</span> ':''}<b>${c}</b></td><td class="num">${v}</td><td class="num">${pct(v,totAll)}%</td><td><div class="bar-bg"><div class="bar-fill ${isCab?'':'blue'}" style="width:${w}%"></div></div></td></tr>`;

      allRows.forEach(r=>{

    async function copierRapportImage(){
      const btn = document.querySelector('.analyse-footer-btn.grey');
      btn.textContent = '⏳ Génération…';
      btn.disabled = true;

      try {
        // Dessiner la carte sur canvas
        const bounds = abidjanBoundary.getBounds();
        const mapEl  = document.getElementById('map');
        const margin = 30;
        const tl = map.latLngToContainerPoint(bounds.getNorthWest());
        const br = map.latLngToContainerPoint(bounds.getSouthEast());
        const cx = Math.max(0, tl.x - margin);
        const cy = Math.max(0, tl.y - margin);
        const cw = Math.min(mapEl.offsetWidth,  br.x + margin) - cx;
        const ch = Math.min(mapEl.offsetHeight, br.y + margin) - cy;

        const MAP_W = 900, MAP_H = Math.round(ch / cw * MAP_W);
        const mc2 = document.createElement('canvas');
        mc2.width = MAP_W; mc2.height = MAP_H;
        const mc = mc2.getContext('2d');

        mc.fillStyle = '#d4e8f0'; mc.fillRect(0, 0, MAP_W, MAP_H);
        mc.fillStyle = '#e8e0d4'; mc.fillRect(0, 0, MAP_W, MAP_H * 0.72);

        function ll2c(lat, lng){
          const pt = map.latLngToContainerPoint([lat, lng]);
          return { x: Math.round((pt.x - cx) / cw * MAP_W), y: Math.round((pt.y - cy) / ch * MAP_H) };
        }

        mc.strokeStyle = '#222'; mc.lineWidth = 2.5; mc.beginPath();
        abidjanBoundary.getLatLngs()[0].forEach((ll, i) => {
          const p = ll2c(ll.lat, ll.lng);
          i === 0 ? mc.moveTo(p.x, p.y) : mc.lineTo(p.x, p.y);
        });
        mc.closePath(); mc.stroke();

        const months = getSelectedMonths();
        const r = computeForMonths(DATA_JSON, months);
        const RADIUS = Math.round(MAP_W * 0.055);

        for(const loc in r.zoneCounts){
          if(!communesCoords[loc]) continue;
          const cable = r.zoneCounts[loc].cable;
          const autre = r.zoneCounts[loc].autre;
          const total = cable + autre;
          const p = ll2c(communesCoords[loc][0], communesCoords[loc][1]);
          mc.beginPath(); mc.arc(p.x, p.y, RADIUS, 0, Math.PI*2);
          mc.fillStyle = getColor(total); mc.globalAlpha = 0.9; mc.fill();
          mc.globalAlpha = 1; mc.strokeStyle = '#111'; mc.lineWidth = 2; mc.stroke();
          mc.fillStyle = '#fff'; mc.textAlign = 'center'; mc.textBaseline = 'middle';
          mc.font = `bold ${Math.round(RADIUS*0.36)}px Arial`;
          mc.fillText(loc, p.x, p.y - RADIUS*0.22);
          mc.font = `${Math.round(RADIUS*0.28)}px Arial`;
          const pC = total ? Math.round(cable/total*100) : 0;
          mc.fillText(`Cbl:${cable}(${pC}%)`, p.x, p.y + RADIUS*0.12);
          mc.fillText(`Aut:${autre}(${100-pC}%)`, p.x, p.y + RADIUS*0.42);
        }

        const mapDataUrl = mc2.toDataURL('image/png');

        // Récupérer le HTML du rapport
        const body = document.getElementById('analyseModalBody');
        const prevOv = body.style.overflowY;
        const prevMH = body.style.maxHeight;
        body.style.overflowY = 'visible';
        body.style.maxHeight  = 'none';
        const rapportHTML = body.innerHTML;
        body.style.overflowY = prevOv;
        body.style.maxHeight  = prevMH;

        // Récupérer les styles du modal
        const styles = Array.from(document.styleSheets)
          .map(s => { try { return Array.from(s.cssRules).map(r=>r.cssText).join('\n'); } catch(e){ return ''; } })
          .join('\n');

        const titre = document.getElementById('analyseModalTitle').textContent;

    function showToast(msg){
      let t = document.getElementById('toastMsg');
      if(!t){
        t = document.createElement('div');
        t.id = 'toastMsg';
        t.style.cssText = `position:fixed;top:24px;left:50%;transform:translateX(-50%);
          background:#111;color:#fff;padding:14px 28px;border-radius:8px;
          font-size:14px;font-weight:bold;z-index:99999;
          box-shadow:0 4px 20px rgba(0,0,0,0.4);pointer-events:none;
          transition:opacity .4s`;
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.opacity = '1';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.style.opacity = '0'; }, 4000);
    }

function showCableDetails(groupCounts, total){

  let html = "<b>Détail Causes - Cable</b><hr>";

  // On récupère toutes les causes Cable depuis causeGroups
  const cableCauses = causeGroups["Cable"] || [];

  let detail = [];

  DATA_JSON.forEach(row=>{
      const cause = (row["CAUSE RÉELLE"] || "").toUpperCase().trim();
      if(cableCauses.includes(cause)){
          if(!detail[cause]) detail[cause] = 0;
          detail[cause]++;
      }
  });

  const sorted = Object.entries(detail)
      .sort((a,b)=> b[1]-a[1]);

  sorted.forEach(([c,v])=>{
      const pct = total ? ((v/total)*100).toFixed(1) : "0.0";
      html += c + " : " + v + " (" + pct + "%)<br>";
  });

  L.popup()
    .setLatLng(map.getCenter())
    .setContent(html)
    .openOn(map);
}


function showCategoryDetails(categoryName, monthsArg){
  let html = "<b>Détail Causes - " + categoryName + "</b><hr>";
  const causesList = causeGroups[categoryName] || [];
  const months = Array.isArray(monthsArg) ? monthsArg : [monthsArg];
  let detail = {};
  let totalMonth = 0;

  DATA_JSON.forEach(row=>{
      const d = toJSDate(row["DATE DE CRÉATION"]);
      if(!d) return;
      if(!monthMatchesRow(d, months)) return;
      totalMonth++;
      const cause = (row["CAUSE RÉELLE"] || "").toUpperCase().trim();
      if(causesList.includes(cause)){
          if(!detail[cause]) detail[cause] = 0;
          detail[cause]++;
      }
  });

  const sorted = Object.entries(detail).sort((a,b)=> b[1]-a[1]);
  sorted.forEach(([c,v])=>{
      const p = totalMonth ? ((v/totalMonth)*100).toFixed(1) : "0.0";
      html += c + " : " + v + " (" + p + "%)<br>";
  });
  if(sorted.length === 0) html += "Aucune donnée";

  L.popup().setLatLng(map.getCenter()).setContent(html).openOn(map);
}
