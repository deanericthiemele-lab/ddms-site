<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Suivi Paiement Factures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6f9;
  --card:#ffffff;
  --border:#dde2ea;
  --ink:#111319;
  --muted:#8a92a3;
  --navy:#003366;
  --orange:#E05A00;
  --encours:#0284c7;
  --termine:#059669;
}
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
body{
  font-family:'DM Sans', Arial, sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  padding:2rem 1rem 4rem;
}
.wrap{ max-width:1180px; margin:0 auto; }

/* ── Topbar ── */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:1.5rem; padding-bottom:1.25rem;
  border-bottom:1px solid var(--border);
  flex-wrap:wrap; gap:12px;
}
.back-link{
  display:inline-flex; align-items:center; gap:6px;
  font-size:12.5px; font-weight:600; color:var(--muted);
  text-decoration:none; letter-spacing:0.02em;
}
.back-link:hover{ color:var(--ink); }
.title-block{ margin-top:6px; }
.eyebrow{ font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }
h1{ font-size:24px; font-weight:600; margin-top:4px; }
.subtitle{ font-size:12.5px; color:var(--muted); margin-top:4px; max-width:520px; line-height:1.4; }

.btn{
  font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;
  border-radius:9px; border:1px solid var(--border); padding:10px 16px;
  background:#fff; color:var(--ink); transition:all .15s; white-space:nowrap;
}
.btn:hover{ border-color:#b0bac8; }
.btn-primary{ background:var(--orange); border-color:var(--orange); color:#fff; }
.btn-primary:hover{ background:#c94f00; }

.toolbar{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:1.1rem; }
.search-input{
  font-family:inherit; font-size:13px; padding:9px 12px; flex:1; min-width:180px;
  border:1px solid var(--border); border-radius:9px; background:#fff; color:var(--ink);
}
.toolbar .btn-primary{ margin-left:auto; }

/* ── Table ── */
.section-head{ display:flex; align-items:center; gap:10px; margin:1.6rem 0 10px; }
.section-title{ font-size:13px; font-weight:700; color:var(--ink); }
.section-count{
  font-size:11px; font-weight:600; color:var(--muted);
  background:#eef1f6; border-radius:20px; padding:2px 9px;
}

.table-scroll{
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  overflow-x:auto;
}
.table-scroll.termine-block{
  background:#eef0f3; opacity:.85;
}
.table-scroll.termine-block thead th{ background:#e6e9ee; }
.table-scroll.termine-block tbody tr:hover{ background:#e9ebef; }
table{ width:100%; border-collapse:collapse; min-width:920px; }
thead th{
  font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em;
  text-align:left; padding:12px 14px; border-bottom:1px solid var(--border); white-space:nowrap;
  background:#fbfcfd;
}
tbody td{
  padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:middle;
}
tbody tr:last-child td{ border-bottom:none; }
tbody tr:hover{ background:#fafbfd; }

th.col-objet, td.col-objet{ min-width:220px; }
th.col-file, td.col-file{ width:130px; }
th.col-montant, td.col-montant{ width:140px; }
th.col-statut, td.col-statut{ width:150px; }
th.col-action, td.col-action{ width:44px; }

.cell-input{
  width:100%; font-family:inherit; font-size:13px; padding:8px 9px;
  border:1px solid transparent; border-radius:7px; background:transparent; color:var(--ink);
}
.cell-input:hover{ border-color:var(--border); }
.cell-input:focus{ outline:none; border-color:var(--navy); background:#fff; }

/* ── File cell ── */
.file-cell{ display:flex; align-items:center; gap:6px; }
.file-btn{
  font-family:inherit; font-size:11.5px; font-weight:600; color:var(--muted);
  border:1.5px dashed var(--border); border-radius:7px; padding:7px 9px; cursor:pointer;
  background:#fbfcfd; white-space:nowrap; transition:all .15s;
}
.file-btn:hover{ border-color:var(--orange); color:var(--orange); }
.file-chip{
  display:flex; align-items:center; gap:5px; max-width:100%;
  background:#eef1f6; border-radius:7px; padding:5px 6px 5px 8px; min-width:0;
}
.file-chip a{
  font-size:11.5px; font-weight:600; color:var(--navy); text-decoration:none;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:78px;
}
.file-chip a:hover{ text-decoration:underline; }
.file-chip .x{
  background:none; border:none; cursor:pointer; color:var(--muted); font-size:13px; line-height:1;
  padding:2px 3px; flex-shrink:0;
}
.file-chip .x:hover{ color:#b91c1c; }

.status-select{
  font-family:inherit; font-size:12px; font-weight:600; color:#fff;
  border:none; border-radius:20px; padding:7px 10px; cursor:pointer; width:100%;
}
.st-encours{ background:var(--encours); }
.st-termine{ background:var(--termine); }

.row-del{
  width:28px; height:28px; border-radius:7px; border:1px solid var(--border);
  background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:var(--muted); transition:all .15s;
}
.row-del:hover{ border-color:#b91c1c; color:#b91c1c; }

.empty-state{
  text-align:center; color:var(--muted); font-size:12.5px; padding:36px 18px;
}

/* ── Toast ── */
.toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:#fff; font-size:13px; font-weight:500;
  padding:12px 20px; border-radius:10px; opacity:0; pointer-events:none;
  transition:all .25s; z-index:200; box-shadow:0 8px 24px rgba(0,0,0,0.2);
}
.toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

.locked-msg{ max-width:420px; margin:15vh auto; text-align:center; color:var(--muted); font-size:13px; }

@media (max-width:700px){
  body{ padding:1.2rem 0.6rem 3rem; }
  .toolbar .btn-primary{ margin-left:0; }
}
</style>
</head>
<body>

<div class="wrap" id="app" style="display:none;">

  <div class="topbar">
    <div>
      <a class="back-link" href="index.html">← Retour à l'accueil</a>
      <div class="title-block">
        <div class="eyebrow">DDMS · Autres directions</div>
        <h1>Suivi Paiement Factures</h1>
        <p class="subtitle">Suivi des dossiers : Coval, Codep, BC, PV et statut, en un coup d'œil.</p>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-input" id="searchInput" placeholder="Rechercher par objet…" oninput="renderAll()">
    <button class="btn btn-primary" onclick="addRow()">+ Nouvelle ligne</button>
  </div>

  <div class="section-head">
    <span class="section-title">En cours</span>
    <span class="section-count" id="countEnCours">0</span>
  </div>
  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th class="col-objet">Objet</th>
          <th class="col-file">Coval</th>
          <th class="col-montant">Montant</th>
          <th class="col-file">Codep</th>
          <th class="col-file">BC</th>
          <th class="col-file">PV</th>
          <th class="col-statut">Statut</th>
          <th class="col-action"></th>
        </tr>
      </thead>
      <tbody id="tbodyEnCours"></tbody>
    </table>
  </div>

  <div class="section-head">
    <span class="section-title">Terminé</span>
    <span class="section-count" id="countTermine">0</span>
  </div>
  <div class="table-scroll termine-block">
    <table>
      <thead>
        <tr>
          <th class="col-objet">Objet</th>
          <th class="col-file">Coval</th>
          <th class="col-montant">Montant</th>
          <th class="col-file">Codep</th>
          <th class="col-file">BC</th>
          <th class="col-file">PV</th>
          <th class="col-statut">Statut</th>
          <th class="col-action"></th>
        </tr>
      </thead>
      <tbody id="tbodyTermine"></tbody>
    </table>
  </div>

</div>

<div class="locked-msg" id="lockedMsg" style="display:none;">Accès refusé. Redirection…</div>

<div class="toast" id="toast"></div>

<!-- Firebase compat (fonctionne en local et sur Netlify) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDHbiAC8mfdg2ToiqytMgPUxWGEYNYf5RU",
  authDomain: "ddms-architectures.firebaseapp.com",
  projectId: "ddms-architectures",
  storageBucket: "ddms-architectures.firebasestorage.app",
  messagingSenderId: "767552965189",
  appId: "1:767552965189:web:5b0c5ab6cd5bf97a5fb12c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();
const COL = 'comite_depense';
const FILE_FIELDS = ['coval','codep','bc','pv'];

/* ── Accès ── */
(function gate(){
  let role = sessionStorage.getItem('comiteRole');
  if(!role){
    const mdp = prompt("Suivi Paiement Factures — Entrez le mot de passe :");
    if(mdp === 'comite' || mdp === 'adminddms'){
      sessionStorage.setItem('comiteRole','ok');
      role = 'ok';
    } else {
      document.getElementById('lockedMsg').style.display='block';
      setTimeout(()=>{ window.location.href='index.html'; }, 1200);
      return;
    }
  }
  document.getElementById('app').style.display='block';
  initApp();
})();

/* ── Etat ── */
let rows = [];
let pendingFileTarget = null; // {rowId, field}

function initApp(){
  db.collection(COL).orderBy('createdAt','desc').onSnapshot(snap=>{
    rows = snap.docs.map(d=>({ id:d.id, ...d.data() }));
    renderAll();
  }, err=>{
    console.error(err);
    showToast("Erreur de chargement Firebase");
  });
}

/* ── Helpers ── */
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(()=> t.classList.remove('show'), 2600);
}
function esc(s){
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fMontant(n){ return n ? Number(n).toLocaleString('fr-FR') : ''; }
function formatMontantLive(el){
  const raw = el.value.replace(/\D/g,'');
  el.value = raw ? Number(raw).toLocaleString('fr-FR') : '';
}
function parseMontant(v){
  return Number(String(v||'').replace(/\D/g,'')) || 0;
}
function fSize(bytes){
  if(!bytes) return '';
  const kb = bytes/1024;
  return kb < 1024 ? `${kb.toFixed(0)} Ko` : `${(kb/1024).toFixed(1)} Mo`;
}

/* ── Rendu ── */
function renderAll(){
  const search = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  const filtered = rows.filter(r => !search || (r.objet||'').toLowerCase().includes(search));

  const enCours = filtered.filter(r => r.statut !== 'termine');
  const termine = filtered.filter(r => r.statut === 'termine');

  document.getElementById('countEnCours').textContent = enCours.length;
  document.getElementById('countTermine').textContent = termine.length;

  const tbodyEnCours = document.getElementById('tbodyEnCours');
  tbodyEnCours.innerHTML = enCours.length
    ? enCours.map(rowHTML).join('')
    : `<tr><td colspan="8"><div class="empty-state">Aucune ligne en cours. Cliquez sur « + Nouvelle ligne » pour commencer.</div></td></tr>`;

  const tbodyTermine = document.getElementById('tbodyTermine');
  tbodyTermine.innerHTML = termine.length
    ? termine.map(rowHTML).join('')
    : `<tr><td colspan="8"><div class="empty-state">Aucun dossier terminé pour le moment.</div></td></tr>`;
}

function fileCellHTML(r, field){
  const f = (r.files || {})[field];
  if(f){
    return `
    <div class="file-cell">
      <div class="file-chip">
        <a href="${f.url}" target="_blank" title="${esc(f.name)} (${fSize(f.size)})">${esc(f.name)}</a>
        <button class="x" title="Supprimer" onclick="removeFile('${r.id}','${field}')">✕</button>
      </div>
    </div>`;
  }
  return `
  <div class="file-cell">
    <button class="file-btn" onclick="pickFile('${r.id}','${field}')">📎 Parcourir…</button>
  </div>`;
}

function rowHTML(r){
  const statut = r.statut === 'termine' ? 'termine' : 'en_cours';
  return `
  <tr data-id="${r.id}">
    <td class="col-objet">
      <input class="cell-input" value="${esc(r.objet)}" placeholder="Objet du dossier"
        onchange="updateField('${r.id}','objet', this.value)">
    </td>
    <td class="col-file">${fileCellHTML(r,'coval')}</td>
    <td class="col-montant">
      <input class="cell-input" type="text" inputmode="numeric" value="${fMontant(r.montant)}" placeholder="0"
        oninput="formatMontantLive(this)"
        onchange="updateField('${r.id}','montant', parseMontant(this.value))">
    </td>
    <td class="col-file">${fileCellHTML(r,'codep')}</td>
    <td class="col-file">${fileCellHTML(r,'bc')}</td>
    <td class="col-file">${fileCellHTML(r,'pv')}</td>
    <td class="col-statut">
      <select class="status-select ${statut==='termine'?'st-termine':'st-encours'}" onchange="updateField('${r.id}','statut', this.value)">
        <option value="en_cours" ${statut==='en_cours'?'selected':''}>En cours</option>
        <option value="termine" ${statut==='termine'?'selected':''}>Terminé</option>
      </select>
    </td>
    <td class="col-action">
      <button class="row-del" title="Supprimer la ligne" onclick="deleteRow('${r.id}')">🗑</button>
    </td>
  </tr>`;
}

/* ── CRUD ── */
async function addRow(){
  try{
    await db.collection(COL).add({
      objet: '', montant: 0, statut: 'en_cours', files: {},
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }catch(err){ console.error(err); showToast("Erreur lors de la création"); }
}

async function updateField(id, field, value){
  try{
    await db.collection(COL).doc(id).update({
      [field]: value,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  }catch(err){ console.error(err); showToast("Erreur lors de l'enregistrement"); }
}

async function deleteRow(id){
  if(!confirm("Supprimer définitivement cette ligne et ses fichiers ?")) return;
  try{
    const r = rows.find(x=>x.id===id);
    if(r && r.files){
      for(const field of FILE_FIELDS){
        const f = r.files[field];
        if(f && f.path){ try{ await storage.ref(f.path).delete(); }catch(e){} }
      }
    }
    await db.collection(COL).doc(id).delete();
    showToast("Ligne supprimée");
  }catch(err){ console.error(err); showToast("Erreur lors de la suppression"); }
}

/* ── Fichiers ── */
const hiddenFileInput = document.createElement('input');
hiddenFileInput.type = 'file';
hiddenFileInput.style.display = 'none';
document.body.appendChild(hiddenFileInput);
hiddenFileInput.addEventListener('change', async (ev)=>{
  const file = ev.target.files[0];
  ev.target.value = '';
  if(!file || !pendingFileTarget) return;
  const { rowId, field } = pendingFileTarget;
  pendingFileTarget = null;
  await uploadFileToCell(rowId, field, file);
});

function pickFile(rowId, field){
  pendingFileTarget = { rowId, field };
  hiddenFileInput.click();
}

async function uploadFileToCell(rowId, field, file){
  showToast(`Envoi de "${file.name}"…`);
  try{
    const r = rows.find(x=>x.id===rowId);
    const oldFile = r && r.files && r.files[field];

    const path = `comite_depense/${rowId}/${field}/${Date.now()}_${file.name}`;
    const ref = storage.ref(path);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    const meta = { name: file.name, url, path, size: file.size, uploadedAt: new Date().toISOString() };

    await db.collection(COL).doc(rowId).update({
      [`files.${field}`]: meta,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    if(oldFile && oldFile.path && oldFile.path !== path){
      try{ await storage.ref(oldFile.path).delete(); }catch(e){}
    }
    showToast("Fichier enregistré");
  }catch(err){
    console.error(err);
    showToast(`Échec de l'envoi de "${file.name}"`);
  }
}

async function removeFile(rowId, field){
  if(!confirm("Supprimer ce fichier ?")) return;
  try{
    const r = rows.find(x=>x.id===rowId);
    const f = r && r.files && r.files[field];
    if(f && f.path){ try{ await storage.ref(f.path).delete(); }catch(e){} }
    await db.collection(COL).doc(rowId).update({
      [`files.${field}`]: firebase.firestore.FieldValue.delete(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast("Fichier supprimé");
  }catch(err){ console.error(err); showToast("Erreur lors de la suppression"); }
}
</script>
</body>
</html>
