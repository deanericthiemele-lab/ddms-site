<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Mail</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
    font-family:Arial,sans-serif;
    margin:0;
    padding:25px;
    background:#f4f7fb;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:15px;
}

.back-btn{
    background:#1d4ed8;
    color:white;
    text-decoration:none;
    padding:12px 18px;
    border-radius:10px;
    font-weight:bold;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.search{
    flex:1;
    min-width:280px;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.counter{
    background:white;
    padding:12px 18px;
    border-radius:12px;
    font-weight:bold;
    color:#1d4ed8;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.title{
    font-size:34px;
    font-weight:bold;
    color:#0f172a;
    margin-bottom:20px;
}

.table-container{
    background:white;
    border-radius:16px;
    overflow:auto;
    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1d4ed8;
    color:white;
    padding:14px;
    text-align:left;
    position:sticky;
    top:0;
}

td{
    padding:12px;
    border-bottom:1px solid #e5e7eb;
}

tr:hover{
    background:#f8fafc;
}

.empty{
    text-align:center;
    padding:30px;
    color:red;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="topbar">

<a href="index.html" class="back-btn">⬅ Retour</a>

<input type="text"
       id="search"
       class="search"
       placeholder="Rechercher dans tous les champs...">

<div class="counter">
Total : <span id="count">0</span>
</div>

</div>

<div class="title">
Contact Mail
</div>

<div class="table-container">

<table id="table">

<thead id="thead"></thead>

<tbody id="tbody">
<tr>
<td class="empty">Chargement...</td>
</tr>
</tbody>

</table>

</div>

<script>

let allData = [];

const tbody = document.getElementById("tbody");
const thead = document.getElementById("thead");
const count = document.getElementById("count");
const search = document.getElementById("search");

async function loadExcel(){

    try{

        const response = await fetch("contactmail.xlsx");

        const buffer = await response.arrayBuffer();

        const workbook = XLSX.read(buffer,{type:"array"});

        const sheet = workbook.Sheets[workbook.SheetNames[0]];

        allData = XLSX.utils.sheet_to_json(sheet,{defval:""});

        render(allData);

    }catch(e){

        console.error(e);

        tbody.innerHTML = `
        <tr>
            <td class="empty">
                Impossible de charger contactmail.xlsx
            </td>
        </tr>
        `;
    }

}

function render(data){

    tbody.innerHTML = "";

    if(data.length === 0){

        tbody.innerHTML = `
        <tr>
            <td class="empty">
                Aucun résultat trouvé
            </td>
        </tr>
        `;

        count.textContent = 0;

        return;
    }

    const headers = Object.keys(data[0]);

    thead.innerHTML = `
    <tr>
        ${headers.map(h => `<th>${h}</th>`).join("")}
    </tr>
    `;

    data.forEach(row=>{

        const tr = document.createElement("tr");

        tr.innerHTML = headers.map(h =>
            `<td>${row[h]}</td>`
        ).join("");

        tbody.appendChild(tr);

    });

    count.textContent = data.length;

}

search.addEventListener("input",function(){

    const value = this.value.toLowerCase();

    const filtered = allData.filter(row =>

        Object.values(row)
        .join(" ")
        .toLowerCase()
        .includes(value)

    );

    render(filtered);

});

loadExcel();

</script>

</body>
</html>
