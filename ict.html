<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Supprimer dlivPrev — ict_deals</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>
  body{font-family:sans-serif;max-width:600px;margin:60px auto;padding:20px;background:#f8fafc}
  h2{color:#1e293b}
  button{background:#e11d48;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:20px}
  button:disabled{background:#94a3b8;cursor:not-allowed}
  #log{margin-top:20px;background:#1e293b;color:#e2e8f0;padding:16px;border-radius:8px;font-size:12px;font-family:monospace;height:300px;overflow-y:auto;white-space:pre-wrap}
  .ok{color:#4ade80}.err{color:#f87171}.info{color:#60a5fa}
</style>
</head>
<body>
<h2>🗑️ Supprimer le champ <code>dlivPrev</code></h2>
<p>Ce script supprime le champ <code>dlivPrev</code> de tous les documents de la collection <b>ict_deals</b>.</p>
<button id="btn" onclick="run()">Lancer la suppression</button>
<div id="log"></div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyDHbiAC8mfdg2ToiqytMgPUxWGEYNYf5RU",
  authDomain: "ddms-architectures.firebaseapp.com",
  projectId: "ddms-architectures",
  storageBucket: "ddms-architectures.firebasestorage.app",
  messagingSenderId: "767552965189",
  appId: "1:767552965189:web:5b0c5ab6cd5bf97a5fb12c"
});
var db = firebase.firestore();

function log(msg, cls){
  var d = document.getElementById('log');
  d.innerHTML += '<span class="'+(cls||'')+'">' + msg + '</span>\n';
  d.scrollTop = d.scrollHeight;
}

async function run(){
  document.getElementById('btn').disabled = true;
  log('🔍 Chargement des documents...', 'info');
  
  try {
    var snap = await db.collection('ict_deals').get();
    var total = snap.docs.length;
    log('📦 ' + total + ' documents trouvés', 'info');
    
    var done = 0, errors = 0;
    var BATCH_SIZE = 50;
    var docs = snap.docs;
    
    for(var i = 0; i < docs.length; i += BATCH_SIZE){
      var batch = db.batch();
      var slice = docs.slice(i, i + BATCH_SIZE);
      slice.forEach(function(doc){
        batch.update(doc.ref, {
          dlivPrev: firebase.firestore.FieldValue.delete()
        });
      });
      try {
        await batch.commit();
        done += slice.length;
        log('✅ ' + done + '/' + total + ' traités', 'ok');
      } catch(e) {
        errors++;
        log('❌ Erreur batch: ' + e.message, 'err');
      }
    }
    
    log('\n🎉 Terminé ! ' + done + ' documents mis à jour, ' + errors + ' erreurs.', 'ok');
  } catch(e) {
    log('❌ Erreur: ' + e.message, 'err');
  }
  
  document.getElementById('btn').disabled = false;
}
</script>
</body>
</html>
