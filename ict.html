function log(msg, color){
  var el=document.getElementById('log');
  var line=document.createElement('div');
  line.style.color=color||'#1e2533';
  line.textContent=msg;
  el.appendChild(line);
  el.scrollTop=el.scrollHeight;
}

async function startImport(){
  if(!db){ log('❌ Firebase non initialisé, attendez…','#dc2626'); return; }
  var btn=document.getElementById('btn-start');
  btn.disabled=true;
  var total=deals.length, ok=0, err=0;
  log('🚀 Démarrage import de '+total+' deals…','#2563eb');

  var BATCH=400;
  for(var i=0;i<deals.length;i+=BATCH){
    var chunk=deals.slice(i,Math.min(i+BATCH,deals.length));
    var batch=db.batch();
    chunk.forEach(function(d){
      batch.set(db.collection('ict_deals').doc(d.id), d);
    });
    try{
      await batch.commit();
      ok+=chunk.length;
      log('✅ Batch '+(Math.floor(i/BATCH)+1)+' : '+chunk.length+' deals (total: '+ok+')','#16a34a');
    }catch(e){
      err+=chunk.length;
      log('❌ Erreur batch : '+e.message,'#dc2626');
    }
    var pct=Math.round((i+chunk.length)/total*100);
    document.getElementById('progress').textContent=ok+'/'+total+' importés — '+err+' erreurs';
    document.getElementById('bar').style.width=pct+'%';
  }

  log('══════════════════════════════','#6b7a90');
  log('✅ Import terminé : '+ok+' succès, '+err+' erreurs','#1e2533');
  document.getElementById('progress').textContent='✅ Import terminé : '+ok+'/'+total;
  btn.disabled=false;
  btn.textContent='↩ Recommencer';
}
