<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<title>Vider Firebase — ict_deals</title>
<style>
body{font-family:sans-serif;padding:24px;background:#f5f7fa}
h1{font-size:18px;margin-bottom:8px;color:#dc2626}
p{font-size:13px;color:#6b7a90;margin-bottom:16px}
#log{background:#fff;border:1px solid #dde3ed;border-radius:8px;padding:16px;height:350px;overflow-y:auto;font-size:12px;font-family:monospace}
.btn-red{background:#dc2626;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;margin-right:8px}
.btn-red:disabled{opacity:.5;cursor:not-allowed}
.btn-g{background:#6b7a90;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600}
#progress{margin-top:12px;font-size:13px;font-weight:600}
.bar{height:8px;background:#e2e8f0;border-radius:4px;margin-top:8px;margin-bottom:16px}
.bar-fill{height:100%;background:#dc2626;border-radius:4px;transition:width .3s}
.warn{background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:#dc2626;font-weight:600}
</style>
</head>
<body>
<h1>🗑️ Vider la collection ict_deals</h1>
<div class="warn">⚠️ Cette action supprime TOUS les documents de ict_deals. Irréversible.</div>
<button class="btn-red" id="btn-start" onclick="startDelete()">🗑️ Vider la base</button>
<button class="btn-g" onclick="document.getElementById('log').innerHTML=''">Vider log</button>
<div id="progress">En attente…</div>
<div class="bar"><div class="bar-fill" id="bar" style="width:0%"></div></div>
<div id="log"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
var db;
window.addEventListener('load', function(){
  firebase.initializeApp({
    apiKey: "AIzaSyDHbiAC8mfdg2ToiqytMgPUxWGEYNYf5RU",
    authDomain: "ddms-architectures.firebaseapp.com",
    projectId: "ddms-architectures",
    storageBucket: "ddms-architectures.firebasestorage.app",
    messagingSenderId: "767552965189",
    appId: "1:767552965189:web:5b0c5ab6cd5bf97a5fb12c"
  });
  db = firebase.firestore();
  document.getElementById('progress').textContent = '✅ Firebase prêt';
});

function log(msg, color){
  var el=document.getElementById('log');
  var line=document.createElement('div');
  line.style.color=color||'#1e2533';
  line.textContent=msg;
  el.appendChild(line);
  el.scrollTop=el.scrollHeight;
}

async function startDelete(){
  if(!db){ log('❌ Firebase non prêt','#dc2626'); return; }
  if(!confirm('⚠️ Confirmer la suppression de TOUS les documents ict_deals ?')) return;
  var btn=document.getElementById('btn-start');
  btn.disabled=true;
  log('🔍 Chargement des documents…','#2563eb');

  var snap = await db.collection('ict_deals').get();
  var total = snap.size;
  log('📋 '+total+' documents trouvés','#1e2533');

  if(total===0){ log('✅ Collection déjà vide','#16a34a'); btn.disabled=false; return; }

  var docs = snap.docs;
  var deleted=0, BATCH=400;
  for(var i=0;i<docs.length;i+=BATCH){
    var chunk=docs.slice(i,Math.min(i+BATCH,docs.length));
    var batch=db.batch();
    chunk.forEach(function(d){ batch.delete(d.ref); });
    try{
      await batch.commit();
      deleted+=chunk.length;
      log('🗑️ Supprimé '+deleted+'/'+total,'#dc2626');
    }catch(e){
      log('❌ Erreur : '+e.message,'#dc2626');
    }
    var pct=Math.round(deleted/total*100);
    document.getElementById('progress').textContent=deleted+'/'+total+' supprimés';
    document.getElementById('bar').style.width=pct+'%';
  }
  log('══════════════════════════════','#6b7a90');
  log('✅ Terminé : '+deleted+' documents supprimés','#1e2533');
  document.getElementById('progress').textContent='✅ Base vidée — '+deleted+' documents supprimés';
  btn.disabled=false;
}
</script>
</body>
</html>
