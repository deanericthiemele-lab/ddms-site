<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>2026</title>

<!-- SheetJS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
/* ===== IA DDMS ===== */

async function askIA(){

 const question=document.getElementById("questionIA").value;

 if(!question){
   alert("Pose une question");
   return;
 }

 document.getElementById("reponseIA").innerHTML="Analyse en cours...";

 const response=await fetch("/.netlify/functions/ia-ddms",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({question:question})
 });

 const data=await response.json();

 document.getElementById("reponseIA").innerHTML=data.answer || "Pas de réponse";
}

async function analyseReseau(){

 document.getElementById("reponseIA").innerHTML="Analyse réseau en cours...";

 const response=await fetch("/.netlify/functions/ia-ddms",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({question:"Analyse le réseau et détecte les anomalies"})
 });

 const data=await response.json();

 document.getElementById("reponseIA").innerHTML=data.answer || "Pas de réponse";
}
</script>

</head>
<body>

<h2>Assistant IA DDMS</h2>

<input id="questionIA" placeholder="Pose une question">

<button onclick="askIA()">Rechercher</button>
<button onclick="analyseReseau()">Analyse IA du réseau</button>

<div id="reponseIA">Pas de réponse</div>

</body>
</html>
