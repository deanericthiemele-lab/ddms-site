<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>2026</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: linear-gradient(135deg, #e6ecf3, #f9f9f9);
    min-height: 100vh;
}
h1 {
    margin: 20px 0 5px 0;
    text-decoration: underline;
    font-weight: normal;
    color: #003366;
}
h3 {
    margin: 0 0 20px 0;
    font-weight: normal;
    font-style: italic;
    color: #444;
}
.main-container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 80px;
    margin-top: 20px;
    width: 90%;
    position: relative;
}

/* BLOCS MEME TAILLE */
.column {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);

    width: 260px;
    height: 320px;

    position: relative;
    z-index: 1;
}

button {
    margin: 5px;
    padding: 12px 20px;
    font-weight: bold;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
}
button:hover { opacity: 0.85; }

.mission-text {
    margin-top: 10px;
    font-weight: bold;
    text-align: center;
    color: #003366;
}
.arrow-down {
    font-size: 28px;
    color: #003366;
    margin-top: 5px;
}

.footer {
    margin: 40px 0 20px 0;
    font-size: 16px;
    color: #555;
    text-align: center;
}

.btn-2025{
  position: fixed;
  top: 12px;
  right: 14px;
  background:#003366;
  color:#fff;
  padding:6px 12px;
  border-radius:14px;
  font-size:13px;
  font-weight:bold;
  text-decoration:none;
  z-index:1001;
}
.btn-2025:hover{opacity:0.85}
</style>

<script>
function checkPassword(mdpCorrect, page) {
    const mdp = prompt("Entrez le mot de passe pour accéder à cette section :");
    if (mdp === mdpCorrect) window.location.href = page;
    else if (mdp !== null) alert("Mot de passe incorrect !");
}
</script>

</head>

<body>

<a class="btn-2025" href="monsite2025/index.html">2025</a>

<h1>2026</h1>
<h3>Nous accompagnons chaque étape du cycle de vie du service</h3>

<div class="main-container">

    <!-- PRODUCTION -->
    <div class="column">
        <h2>Production</h2>

        <button onclick="location.href='ao.html'" style="background:#8B0000;color:white;">Appel d’offre</button>

        <button onclick="checkPassword('prod','suivi_dossiers.html')" style="background:#1E90FF;color:white;">Production</button>
        <button onclick="checkPassword('trans','transfert.html')" style="background:#003366;color:white;">Modification / Transfert</button>
        <button onclick="checkPassword('resi','resi_final_.html')" style="background:#228B22;color:white;">Résiliation</button>

        <div class="arrow-down">⬇</div>
        <div class="mission-text">Livrer le service</div>
    </div>

    <!-- INGENIERIE -->
    <div class="column">
        <h2>Ingénierie</h2>
        <button onclick="checkPassword('sav','ingenierie.html')" style="background:#FF7F50;color:white;">SAV</button>
        <button onclick="checkPassword('parc','parc.html')" style="background:#6A5ACD;color:white;">Parc</button>
        <div class="arrow-down">⬇</div>
        <div class="mission-text">Optimiser le service</div>
    </div>

    <!-- ASM -->
    <div class="column">
        <h2>ASM</h2>
        <button onclick="checkPassword('synt','synthese_client.html')" style="background:darkblue;color:white;">Synthèse</button>
        <button onclick="checkPassword('parc','PARC.html')" style="background:#4682B4;color:white;">Parc Client</button>
        <div class="arrow-down">⬇</div>
        <div class="mission-text">Assurer un suivi personnalisé</div>
    </div>

</div>

<div class="footer">Département Delivery et Management de Service - 2026</div>

</body>
</html>
