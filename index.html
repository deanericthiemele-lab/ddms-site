<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>2026</title>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:40px;background:#f5f5f5;text-align:center;}
input{width:60%;padding:10px;font-size:16px}
button{padding:10px 20px;margin:10px;font-size:16px;cursor:pointer}
#reponseIA{margin-top:20px;font-weight:bold}
</style>
<script>
async function askIA(){

 const question=document.getElementById("questionIA").value;

 if(!question){
   alert("Pose une question");
   return;
 }

 document.getElementById("reponseIA").innerHTML="Analyse en cours...";

 const response=await fetch("/.netlify/functions/ia-ddms",{
  method:"POST",
  headers:{
   "Content-Type":"application/json"
  },
  body:JSON.stringify({question:question})
 });

 const data=await response.json();

 document.getElementById("reponseIA").innerHTML=data.answer || "Pas de réponse";
}
</script>
</head>
<body>

<h1>Assistant IA DDMS</h1>

<input id="questionIA" placeholder="Pose une question sur le réseau...">

<br>

<button onclick="askIA()">Interroger l'IA</button>

<div id="reponseIA"></div>

</body>
</html>
