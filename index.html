<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Accueil</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    min-height: 100vh;
    background: linear-gradient(135deg, #e6ecf3, #f9f9f9);
}

.main-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 80px;
}

.column {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    gap: 10px;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    width: 260px;
    height: 320px;
}

button {
    margin: 5px;
    padding: 12px 20px;
    font-weight: bold;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
}
button:hover { opacity: 0.85; }

.mission-text {
    font-weight: bold;
    text-align: center;
    color: #003366;
}

.footer {
    margin-top: 30px;
    font-size: 16px;
    color: #555;
    text-align: center;
}

.btn-2025{
  position: fixed;
  top: 12px;
  right: 14px;
  background:#003366;
  color:#fff;
  padding:6px 12px;
  border-radius:14px;
  font-size:13px;
  font-weight:bold;
  text-decoration:none;
}
</style>

<script>
function checkPassword(mdpCorrect, page) {
    const mdp = prompt("Entrez le mot de passe pour accéder à cette section :");
    if (mdp === mdpCorrect) window.location.href = page;
    else if (mdp !== null) alert("Mot de passe incorrect !");
}
</script>

</head>

<body>

<a class="btn-2025" href="monsite2025/index.html">2025</a>

<div class="main-container">

    <!-- PRODUCTION -->
    <div class="column">
        <h2>Production</h2>
        <div class="mission-text">Livrer le service</div>

        <button onclick="location.href='ao.html'" style="background:#8B0000;color:white;">Appel d’offre</button>
        <button onclick="checkPassword('prod','suivi_dossiers.html')" style="background:#1E90FF;color:white;">Production</button>
        <button onclick="checkPassword('trans','transfert.html')" style="background:#003366;color:white;">Modification / Transfert</button>
        <button onclick="checkPassword('resi','resi_final_.html')" style="background:#228B22;color:white;">Résiliation</button>
    </div>

    <!-- INGENIERIE -->
    <div class="column">
        <h2>Ingénierie</h2>
        <div class="mission-text">Optimiser le service</div>

        <button onclick="checkPassword('sav','ingenierie.html')" style="background:#FF7F50;color:white;">SAV</button>
    </div>

    <!-- ASM -->
    <div class="column">
        <h2>ASM</h2>
        <div class="mission-text">Assurer un suivi personnalisé</div>

        <button onclick="checkPassword('synt','synthese_client.html')" style="background:darkblue;color:white;">Synthèse</button>
        <button onclick="checkPassword('parc','PARC.html')" style="background:#4682B4;color:white;">Parc Client</button>
        <button onclick="location.href='top50.html'" style="background:#2F4F4F;color:white;">Sites critiques Top 50</button>
    </div>

</div>

<div class="footer">
    Département Delivery et Management de Service
    <br>
    <span style="font-style: italic;">
        Nous accompagnons chaque étape du cycle de vie du service
    </span>
</div>

</body>
</html>
