<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>2026</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: linear-gradient(135deg, #e6ecf3, #f9f9f9);
    min-height: 100vh;
}
h1 { margin:20px 0 5px 0;text-decoration:underline;font-weight:normal;color:#003366;}
h3 { margin:0 0 20px 0;font-weight:normal;font-style:italic;color:#444;}
.main-container {display:flex;justify-content:center;gap:80px;margin-top:20px;width:90%;position:relative;}
.column {display:flex;flex-direction:column;align-items:center;gap:10px;background:white;padding:20px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.15);min-width:250px;}
button {margin:5px;padding:12px 20px;font-weight:bold;font-size:18px;border:none;border-radius:8px;cursor:pointer;width:100%;}
button:hover{opacity:0.85;}
.footer {margin:40px 0 20px 0;font-size:16px;color:#555;text-align:center;}
</style>

<script>
async function askIA(){

const question = document.getElementById("questionIA").value;

document.getElementById("reponseIA").innerHTML="Analyse en cours...";

const response = await fetch("/.netlify/functions/ia-ddms",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({question})
});

const data = await response.json();

document.getElementById("reponseIA").innerText = data.answer;

}

async function analyseReseau(){

document.getElementById("reponseIA").innerHTML="Analyse automatique du réseau...";

const response = await fetch("/.netlify/functions/ia-ddms",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({question:"Analyse complète du réseau DDMS et des KPI"})
});

const data = await response.json();

document.getElementById("reponseIA").innerText = data.answer;

}
</script>
</head>

<body>

<h1>2026</h1>
<h3>Nous accompagnons chaque étape du cycle de vie du service</h3>

<div class="main-container">

<div class="column">
<h2>Avant-vente</h2>
<button style="background:#8B0000;color:white;">Appel d’offre</button>
</div>

<div class="column">
<h2>Production</h2>
<button style="background:#1E90FF;color:white;">Production</button>
<button style="background:#003366;color:white;">Modification / Transfert</button>
<button style="background:#228B22;color:white;">Résiliation</button>
</div>

<div class="column">
<h2>Ingénierie</h2>
<button style="background:#FF7F50;color:white;">SAV</button>
<button style="background:#00994C;color:white;">QoS Service</button>
<button style="background:#6A5ACD;color:white;">Parc</button>
</div>

<div class="column">
<h2>ASM</h2>
<button style="background:darkblue;color:white;">Synthèse</button>
<button style="background:#4682B4;color:white;">Parc Client</button>
<button style="background:#2F4F4F;color:white;">Référence PE</button>
</div>

</div>

<!-- IA BLOCK -->

<div style="margin-top:50px;background:white;padding:25px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.15);width:70%;text-align:center;">

<h2 style="color:#003366">Assistant IA DDMS</h2>

<input id="questionIA" placeholder="Pose une question sur les données du site"
style="width:70%;padding:10px;font-size:16px">

<br><br>

<button onclick="askIA()" style="background:#003366;color:white;width:200px;">Rechercher</button>

<button onclick="analyseReseau()" style="background:#8B0000;color:white;width:200px;">Analyse IA du réseau</button>

<div id="reponseIA" style="margin-top:20px;font-weight:bold;"></div>

</div>

<div class="footer">Département Delivery et Management de Service - 2026</div>

</body>
</html>
