<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Assistant IA DDMS</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:80px">

<h1>Assistant IA DDMS</h1>

<input id="question" style="width:400px;height:35px;font-size:16px" placeholder="Pose une question...">

<br><br>

<button onclick="ask()" style="padding:10px 20px;font-size:16px">
Interroger l'IA
</button>

<p id="reponse">Pas de réponse</p>

<script>

async function ask(){

const question = document.getElementById("question").value;

const r = await fetch("/.netlify/functions/ia-ddms",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({question})
});

const data = await r.json();

document.getElementById("reponse").innerText = data.answer;

}

</script>

</body>
</html>
