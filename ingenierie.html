<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Analyse des incidents</title>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>

<style>
body { font-family: Arial; margin:20px; }
button { padding:8px; cursor:pointer; }

#popup {
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.card {
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:900px;
  position:relative;
}
</style>
</head>

<body>

<h2>Analyse des incidents</h2>
<button onclick="afficherGraphiqueHebdo()">📊 Incidents / semaine</button>

<div id="popup">
  <div class="card">
    <button onclick="document.getElementById('popup').style.display='none'">X</button>
    <canvas id="chart"></canvas>
  </div>
</div>

<script>

// ===== PARSE DATE =====
function parseDate(val){
  if (!val) return null;

  if (typeof val === "number") {
    return new Date((val - 25569) * 86400 * 1000);
  }

  if (typeof val === "string" && val.includes("/")) {
    const [d,m,y] = val.split("/");
    return new Date(y, m-1, d);
  }

  const d = new Date(val);
  return isNaN(d) ? null : d;
}

// ===== ISO WEEK =====
function getISOWeek(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

// ===== DATA =====
let tableauActuel = [];

fetch("pipe.xlsx")
.then(r=>r.arrayBuffer())
.then(data=>{
  const wb = XLSX.read(data,{type:"array"});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(ws,{defval:""});

  tableauActuel = json.map(r=>({
    nd: r["ND"],
    date: r["DATE DE CREATION DOSSIER"]
  }));

  console.log("DATA OK", tableauActuel.length);
});

// ===== GRAPH =====
function afficherGraphiqueHebdo(){

  const incidents = {};
  const ndMap = {};

  tableauActuel.forEach(item=>{
    const d = parseDate(item.date);
    if (!d) return;

    const s = "S"+getISOWeek(d);

    incidents[s] = (incidents[s]||0)+1;

    if(!ndMap[s]) ndMap[s]={};
    ndMap[s][item.nd]=(ndMap[s][item.nd]||0)+1;
  });

  window.ndMap = ndMap;

  const currentWeek = getISOWeek(new Date());
  const weeks = [];

  for(let i=1;i<=currentWeek;i++) weeks.push("S"+i);

  const dataInc = weeks.map(w=>incidents[w]||0);
  const dataND = weeks.map(w=>{
    if(!ndMap[w]) return 0;
    return Object.values(ndMap[w]).filter(v=>v>=2).length;
  });

  document.getElementById("popup").style.display="flex";

  const ctx=document.getElementById("chart").getContext("2d");
  if(window.chart) window.chart.destroy();

  window.chart=new Chart(ctx,{
    type:"bar",
    data:{
      labels:weeks,
      datasets:[
        {label:"Incidents",data:dataInc},
        {label:"ND ≥2",data:dataND}
      ]
    },
    options:{
      plugins:{
        tooltip:{
          callbacks:{
            label:function(ctx){
              if(ctx.dataset.label!=="ND ≥2"){
                return ctx.raw;
              }
              const s=ctx.label;
              const list=Object.entries(window.ndMap[s]||{})
              .filter(([nd,c])=>c>=2)
              .map(([nd,c])=>nd+" ("+c+")");

              return list.join("\n")||"Aucun";
            }
          }
        }
      }
    }
  });
}

</script>

</body>
</html>
