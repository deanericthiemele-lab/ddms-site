<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Analyse des incidents - CLEAN</title>

<!-- Libs -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

<style>
  body{font-family:Arial;margin:20px}
  button{padding:8px 12px;margin:6px;cursor:pointer}
  #popup-semaine{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:9999}
  #popup-semaine .card{background:#fff;border-radius:10px;padding:16px;max-width:900px;width:90%;position:relative}
  #popup-semaine .close{position:absolute;right:10px;top:10px}
</style>
</head>

<body>

<h2>Analyse des incidents (version CLEAN)</h2>

<button onclick="afficherGraphiqueHebdo()">📊 Incidents / semaine</button>

<div id="popup-semaine">
  <div class="card">
    <button class="close" onclick="document.getElementById('popup-semaine').style.display='none'">X</button>
    <h3 id="titre-semaine" style="text-align:center"></h3>
    <canvas id="chart-semaine" height="260"></canvas>
  </div>
</div>

<script>
// ================= ISO WEEK =================
function getISOWeek(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

// ================= AUTO LOAD =================
window.tableauActuel = [];
window.addEventListener("DOMContentLoaded", function(){
  fetch("pipe.xlsx")
    .then(r => r.arrayBuffer())
    .then(buf => {
      const wb = XLSX.read(buf, {type:"array"});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, {defval:""});

      // mapping minimal attendu
      window.tableauActuel = json.map(r => ({
        nd: r["ND"] || r["Nd"] || "",
        datesCreation: r["DATE DE CREATION DOSSIER"] ? [new Date(r["DATE DE CREATION DOSSIER"])] : []
      }));

      console.log("Excel chargé:", tableauActuel.length);
    })
    .catch(e => console.error("Erreur chargement Excel:", e));
});

// ================= GRAPH =================
function afficherGraphiqueHebdo(){

  if (!window.tableauActuel || !tableauActuel.length){
    alert("Aucune donnée chargée");
    return;
  }

  const dataIncidents = {};
  const dataND = {};

  tableauActuel.forEach(item=>{
    (item.datesCreation||[]).forEach(date=>{
      const d = new Date(date);
      if (isNaN(d)) return;

      const s = "S"+getISOWeek(d);

      dataIncidents[s] = (dataIncidents[s]||0) + 1;

      if (!dataND[s]) dataND[s] = {};
      dataND[s][item.nd] = (dataND[s][item.nd]||0) + 1;
    });
  });

  // rendre accessible au tooltip
  window.dataND = dataND;

  const semaines = Object.keys(dataIncidents)
    .sort((a,b)=>parseInt(a.slice(1)) - parseInt(b.slice(1)));

  const incidents = semaines.map(s => dataIncidents[s] || 0);
  const nd_ge2 = semaines.map(s => {
    const m = dataND[s] || {};
    return Object.values(m).filter(v => v>=2).length;
  });

  document.getElementById("popup-semaine").style.display = "flex";
  document.getElementById("titre-semaine").textContent =
    "📊 Incidents par semaine (S" + getISOWeek(new Date()) + ")";

  const ctx = document.getElementById("chart-semaine").getContext("2d");
  if (window.chartHebdo) window.chartHebdo.destroy();

  window.chartHebdo = new Chart(ctx, {
    type: "bar",
    data: {
      labels: semaines,
      datasets: [
        { label: "Incidents", data: incidents },
        { label: "ND ≥2", data: nd_ge2 }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: "top" },

        tooltip: {
          mode: "index",
          intersect: false,
          callbacks: {
            label: function(ctx){
              // dataset ND >=2 => afficher liste détaillée
              if (ctx.dataset.label !== "ND ≥2"){
                return ctx.dataset.label + " : " + ctx.raw;
              }

              const semaine = ctx.label;
              const map = window.dataND?.[semaine] || {};

              const list = Object.entries(map)
                .filter(([nd,c]) => c>=2)
                .sort((a,b)=>b[1]-a[1])
                .slice(0, 20) // limite affichage
                .map(([nd,c]) => nd + " ("+c+")");

              return list.length ? list.join("\n") : "Aucun ND ≥2";
            }
          }
        }
      },
      scales: { y: { beginAtZero: true } }
    },
    plugins: [ChartDataLabels]
  });
}
</script>

</body>
</html>
