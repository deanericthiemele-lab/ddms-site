<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Analyse des incidents - FIX FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;margin:20px}
button{padding:8px 12px;margin:6px;cursor:pointer}
#popup{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.card{background:#fff;padding:15px;border-radius:10px;width:90%;max-width:900px;position:relative}
.close{position:absolute;right:10px;top:10px}
</style>
</head>

<body>

<h2>Analyse des incidents</h2>
<button onclick="afficherGraphiqueHebdo()">📊 Incidents / semaine</button>

<div id="popup">
<div class="card">
<button class="close" onclick="document.getElementById('popup').style.display='none'">X</button>
<canvas id="chart"></canvas>
</div>
</div>

<script>

// ===== ISO WEEK =====
function getISOWeek(date){
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

// ===== DATE PARSER ROBUST =====
function parseDate(date){
  if (!date) return null;

  if (typeof date === "number") {
    return new Date((date - 25569) * 86400 * 1000);
  }

  if (typeof date === "string") {
    if (date.includes("/")) {
      const [d,m,y] = date.split("/");
      return new Date(y, m-1, d);
    }
  }

  const d = new Date(date);
  return isNaN(d) ? null : d;
}

// ===== AUTO LOAD =====
let tableauActuel = [];

fetch("pipe.xlsx")
.then(r=>r.arrayBuffer())
.then(data=>{
  const wb = XLSX.read(data,{type:"array"});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const json = XLSX.utils.sheet_to_json(ws,{defval:""});

  tableauActuel = json.map(r=>({
    nd: r["ND"] || "",
    datesCreation: [r["DATE DE CREATION DOSSIER"]]
  }));

  console.log("DATA OK", tableauActuel.length);
});

// ===== GRAPH =====
function afficherGraphiqueHebdo(){

  const dataIncidents = {};
  const dataND = {};

  tableauActuel.forEach(item=>{
    item.datesCreation.forEach(date=>{
      const d = parseDate(date);
      if (!d) return;

      const s = "S"+getISOWeek(d);

      dataIncidents[s] = (dataIncidents[s]||0)+1;

      if(!dataND[s]) dataND[s]={};
      dataND[s][item.nd]=(dataND[s][item.nd]||0)+1;
    });
  });

  window.dataND = dataND;

  const currentWeek = getISOWeek(new Date());
  const weeks = [];
  for(let i=1;i<=currentWeek;i++){weeks.push("S"+i)}

  const incidents = weeks.map(w=>dataIncidents[w]||0);
  const nd = weeks.map(w=>{
    if(!dataND[w]) return 0;
    return Object.values(dataND[w]).filter(v=>v>=2).length;
  });

  document.getElementById("popup").style.display="flex";

  const ctx=document.getElementById("chart").getContext("2d");
  if(window.chart) window.chart.destroy();

  window.chart=new Chart(ctx,{
    type:"bar",
    data:{
      labels:weeks,
      datasets:[
        {label:"Incidents",data:incidents},
        {label:"ND ≥2",data:nd}
      ]
    },
    options:{
      plugins:{
        tooltip:{
          callbacks:{
            label:function(ctx){
              if(ctx.dataset.label!=="ND ≥2"){
                return ctx.dataset.label+" : "+ctx.raw;
              }
              const s=ctx.label;
              const list=Object.entries(window.dataND[s]||{})
              .filter(([nd,c])=>c>=2)
              .sort((a,b)=>b[1]-a[1])
              .map(([nd,c])=>nd+" ("+c+")");
              return list.join("\n")||"Aucun ND ≥2";
            }
          }
        }
      }
    }
  });
}

</script>
</body>
</html>
