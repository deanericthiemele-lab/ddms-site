  // Marges et échelle
  const margin = {left: 40, right: 10, top: 10, bottom: 40};
  const plotW = W - margin.left - margin.right;
  const plotH = H - margin.top - margin.bottom;

  const maxVal = Math.max(1, ...dataVolume, ...dataDistincts);
  const n = labels.length;
  const groupW = plotW / n;
  const barW = Math.max(4, Math.floor(groupW * 0.35));

  // Axes
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  // Axe Y
  ctx.beginPath();
  ctx.moveTo(margin.left, margin.top);
  ctx.lineTo(margin.left, margin.top + plotH);
  ctx.lineTo(margin.left + plotW, margin.top + plotH);
  ctx.stroke();

  // Graduation Y simple: 4 repères
  ctx.fillStyle = '#333';
  ctx.font = '10px Arial';
  for (let i = 0; i <= 4; i++) {
    const v = Math.round((maxVal * i) / 4);
    const y = margin.top + plotH - (v / maxVal) * plotH;
    ctx.fillText(String(v), 4, y + 3);
    ctx.strokeStyle = '#eee';
    ctx.beginPath();
    ctx.moveTo(margin.left, y);
    ctx.lineTo(margin.left + plotW, y);
    ctx.stroke();
  }

  // Légende
  ctx.fillStyle = '#000';
  ctx.font = '11px Arial';
  ctx.fillText('Bleu: ND distincts sur 2 mois', margin.left, 12);
  ctx.fillText('Rouge: volume incidents', margin.left + 160, 12);
  ctx.fillText('Vert: ND total', margin.left + 160, 12);

  // Dessin des barres
  for (let i = 0; i < n; i++) {
    const gx = margin.left + i * groupW + (groupW - 2*barW) / 2;
    const h1 = (dataVolume[i] / maxVal) * plotH;
    const h2 = (dataDistincts[i] / maxVal) * plotH;

    // Bleu
    ctx.fillStyle = 'blue';
    ctx.fillRect(gx, margin.top + plotH - h1, barW, h1);
    // Valeur
    if (h1 > 12) {
      ctx.fillStyle = '#000';
      ctx.font = '10px Arial';
      ctx.fillText(String(dataVolume[i]), gx, margin.top + plotH - h1 - 2);
    }

    // Vert
    ctx.fillStyle = 'green';
    ctx.fillRect(gx + barW + 4, margin.top + plotH - h2, barW, h2);
    if (h2 > 12) {
      ctx.fillStyle = '#000';
      ctx.font = '10px Arial';
      ctx.fillText(String(dataDistincts[i]), gx + barW + 4, margin.top + plotH - h2 - 2);
    }
  }
}

function exporterZoneExcel() {
  if (!tableauActuel || !tableauActuel.length) return;

  // Récupère les bornes de date depuis le popup
  const d1 = document.getElementById("zone-date-debut").value;
  const d2 = document.getElementById("zone-date-fin").value;
  let debut = d1 ? new Date(d1+"T00:00:00") : null;
  let fin = d2 ? new Date(d2+"T23:59:59") : null;

  // Filtrer selon la période
  const dataFiltree = tableauActuel.filter(item => {
    if (!item.datesCreation || !item.datesCreation.length) return false;
    return item.datesCreation.some(dt => {
      if (debut && dt < debut) return false;
      if (fin && dt > fin) return false;
      return true;
    });
  });

  if (!dataFiltree.length) return;

  const wb = XLSX.utils.book_new();
  const regroupement = {};

  // Regrouper par zone
  dataFiltree.forEach(item => {
    let loc = item.localisation || "Inconnue";

    // Normalisation zone
    loc = loc.toLowerCase()
             .normalize("NFD").replace(/[̀-ͯ]/g, "")
             .replace(/[^a-z0-9 ]/g, " ")
             .replace(/\s+/g, " ")
             .trim();

    if (loc.includes("cocody")) loc = "Cocody";
    if (loc.includes("plateau")) loc = "Plateau";
    if (loc.includes("yopougon")) loc = "Yopougon";
    if (loc.includes("abobo")) loc = "Abobo";

    if (!regroupement[loc]) regroupement[loc] = [];
    regroupement[loc].push(item);
  });

  // Construire les onglets avec colonnes spécifiques
  for (const [zone, data] of Object.entries(regroupement)) {
    const parND = {};

    data.forEach(d => {
      const nd = d.nd || "ND Inconnu";
      if (!parND[nd]) {
        parND[nd] = {
          "ND": nd,
          "RAISON SOCIALE": d.raisonSociale || "",
          "DATE DE SIGNALISATION": d.datesCreation ? d.datesCreation[0] : "",
          "CAUSE RÉELLE": d.causeReelle || "",
          "LOCALISATION CLIENT": zone,
          "Volume (calculé)": 0
        };
      }
      parND[nd]["Volume (calculé)"]++;
    });

    const tableauFinal = Object.values(parND);
    const ws = XLSX.utils.json_to_sheet(tableauFinal);
    XLSX.utils.book_append_sheet(wb, ws, zone.substring(0,31));
  }

  XLSX.writeFile(wb, "Signalisations_par_zone.xlsx");
}


document.addEventListener("DOMContentLoaded", function() {
  const btnExport = document.querySelector("#popup-zone button[onclick='exporterZoneExcel()']");
  if (btnExport) {
    btnExport.addEventListener("click", exporterZoneExcel);
  }
});
