<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Projet de connectivité – Suivi</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
body { font-family: Arial; padding: 20px; background:#f4f6f9; }
h2 { color:#003366; margin-top:10px; }
#search { padding:10px; width:300px; margin:15px 0; border:1px solid #ccc; border-radius:5px; }
.return-btn { padding:10px 20px; background:#003366; color:white; border:none; border-radius:6px; cursor:pointer; }
.return-btn:hover { opacity:0.85; }
.table-container { max-height: 70vh; overflow-y: auto; border:1px solid #ccc; background:white; border-radius:6px; }
table { width:100%; border-collapse: collapse; }
th, td { padding:8px 10px; border-bottom:1px solid #ddd; white-space:nowrap; }
th { background:#003366; color:white; cursor:pointer; position:sticky; top:0; z-index:2; }
tr:nth-child(even) { background:#f7f7f7; }
tr:hover { background:#e6f0ff; }
</style>
</head>

<body>

<button class="return-btn" onclick="location.href='index.html'">⟵ Retour</button>

<h2>Projet de connectivité – Suivi</h2>

<input type="text" id="search" placeholder="Recherche...">

<div class="table-container">
    <table id="table"></table>
</div>

<script>
let currentData = [];

function formatValue(v) {
    if (typeof v === "number" && v > 30000 && v < 60000) {
        const date = XLSX.SSF.parse_date_code(v);
        const jj = String(date.d).padStart(2, "0");
        const mm = String(date.m).padStart(2, "0");
        const aa = date.y;
        return `${jj}/${mm}/${aa}`;
    }
    return v;
}

async function loadExcel() {
    const response = await fetch("Fichier Intervention.xlsx");
    const data = await response.arrayBuffer();
    const wb = XLSX.read(data, { type: "array" });

    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

    currentData = rows;
    renderTable(rows);
}

function renderTable(rows) {
    const table = document.getElementById("table");
    table.innerHTML = "";

    rows.forEach((row, i) => {
        const tr = document.createElement("tr");

        row.forEach((col, j) => {
            const cell = document.createElement(i === 0 ? "th" : "td");
            cell.textContent = formatValue(col);
            if (i === 0) cell.onclick = () => sortColumn(j);
            tr.appendChild(cell);
        });

        table.appendChild(tr);
    });
}

function sortColumn(index) {
    const header = currentData[0];
    const body = currentData.slice(1);

    body.sort((a, b) => formatValue(a[index]).toString().localeCompare(formatValue(b[index]).toString()));

    currentData = [header, ...body];
    renderTable(currentData);
}

document.getElementById("search").onkeyup = function () {
    const q = this.value.toLowerCase();
    const filtered = currentData.filter(r =>
        r === currentData[0] || r.join(" ").toLowerCase().includes(q)
    );
    renderTable(filtered);
};

loadExcel();
</script>

</body>
</html>
