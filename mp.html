<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Menu Data</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #e6ecf3, #f9f9f9);
}

.container {
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    text-align: center;
    width: 500px;
}

h2 {
    margin-bottom: 20px;
    color: #003366;
}

.buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

button {
    padding: 12px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #003366;
    color: white;
}

button:hover {
    transform: scale(1.05);
    background: #0055aa;
}

#status {
    margin-top: 20px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

<h2>Menu Data</h2>

<div class="buttons">
    <button id="btnSRO">SRO GLOBAL</button>
    <button id="btnSROcorrige">SRO corrigé</button>
    <button onclick="window.location.href='degradation.html'">Dégradation câble</button>
    <button onclick="window.location.href='prediction.html'">Prévision de coupures</button>
    <button onclick="window.location.href='planification.html'">Suivi des productions</button>
</div>

<div id="status">Chargement des données...</div>

</div>

<script>
let DATA_ROWS = [];
let PLANNING_ROWS = [];

async function loadExcelFile(url) {
    const response = await fetch(url);
    const arrayBuffer = await response.arrayBuffer();
    const data = new Uint8Array(arrayBuffer);
    return XLSX.read(data, { type: 'array' });
}

async function init() {
    try {
        const dataWb = await loadExcelFile('data.xlsx');
        const planningWb = await loadExcelFile('Planning.xlsx');

        const dataSheet = dataWb.Sheets[dataWb.SheetNames[0]];
        DATA_ROWS = XLSX.utils.sheet_to_json(dataSheet);

        const planningSheet = planningWb.Sheets["Fusion unique"];
        PLANNING_ROWS = XLSX.utils.sheet_to_json(planningSheet);

        document.getElementById("status").innerText =
            "✅ Données chargées : " + DATA_ROWS.length + " DATA / " + PLANNING_ROWS.length + " PLANNING";

    } catch (e) {
        console.error(e);
        document.getElementById("status").innerText = "❌ Erreur chargement données";
    }
}

init();


// ==========================
// MEME LOGIQUE QUE PLANNING
// ==========================

document.addEventListener("DOMContentLoaded", () => {

    document.getElementById("btnSRO").addEventListener("click", () => {
        const popup = document.createElement("div");
        popup.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;z-index:9999;";
        popup.innerHTML = `
            <div style="background:white;padding:20px;border-radius:10px;width:400px;text-align:center;">
                <h3>📊 SRO GLOBAL</h3>
                <p>Données chargées : ${DATA_ROWS.length}</p>
                <button onclick="this.closest('div').parentElement.remove()">Fermer</button>
            </div>
        `;
        document.body.appendChild(popup);
    });

    document.getElementById("btnSROcorrige").addEventListener("click", () => {
        const popup = document.createElement("div");
        popup.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;z-index:9999;";
        popup.innerHTML = `
            <div style="background:white;padding:20px;border-radius:10px;width:400px;text-align:center;">
                <h3>📊 SRO corrigé</h3>
                <p>Planning chargé : ${PLANNING_ROWS.length}</p>
                <button onclick="this.closest('div').parentElement.remove()">Fermer</button>
            </div>
        `;
        document.body.appendChild(popup);
    });

});
</script>

</body>
</html>
