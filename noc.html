<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparaison ND</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#fff;
    padding:20px;
}

.title{
    font-size:40px;
    font-weight:bold;
    margin-bottom:20px;
}

.imports{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.search{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-bottom:20px;
}

.counter{
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
}

th{
    background:#f3f4f6;
}

.red{
    color:red;
    font-weight:bold;
}

.green{
    color:green;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="title">
ND présents dans les 2 fichiers
</div>

<div class="imports">
<input type="file" id="file1" accept=".xlsx,.xls">
<input type="file" id="file2" accept=".xlsx,.xls">
</div>

<input type="text" id="search" class="search" placeholder="Recherche ND">

<div class="counter">
Total ND communs :
<span id="count">0</span>
</div>

<table>
<thead>
<tr>
<th>ND</th>
</tr>
</thead>

<tbody id="tbody">
<tr>
<td class="red">Chargez 2 fichiers Excel</td>
</tr>
</tbody>
</table>

<script>

let commonND = [];

const tbody = document.getElementById("tbody");
const count = document.getElementById("count");

function normalize(v){

    return String(v || "")
    .trim()
    .toUpperCase()
    .replace(/\s+/g,'');

}

async function readExcel(file){

    const buffer = await file.arrayBuffer();

    const workbook = XLSX.read(buffer,{type:"array"});

    let ndValues = [];

    workbook.SheetNames.forEach(sheetName=>{

        const sheet = workbook.Sheets[sheetName];

        const rows = XLSX.utils.sheet_to_json(sheet,{
            header:1,
            defval:""
        });

        if(rows.length === 0){
            return;
        }

        let ndIndex = -1;

        const headers = rows[0];

        headers.forEach((h,index)=>{

            if(normalize(h) === "ND"){
                ndIndex = index;
            }

        });

        if(ndIndex === -1){
            return;
        }

        for(let i=1;i<rows.length;i++){

            const value = normalize(rows[i][ndIndex]);

            if(value){
                ndValues.push(value);
            }

        }

    });

    return ndValues;

}

function render(data){

    tbody.innerHTML = "";

    if(data.length === 0){

        tbody.innerHTML = `
        <tr>
            <td class="red">Aucun ND commun trouvé</td>
        </tr>
        `;

        count.textContent = 0;

        return;
    }

    data.forEach(nd=>{

        const tr = document.createElement("tr");

        tr.innerHTML = `<td class="green">${nd}</td>`;

        tbody.appendChild(tr);

    });

    count.textContent = data.length;

}

async function compareFiles(){

    const file1 = document.getElementById("file1").files[0];
    const file2 = document.getElementById("file2").files[0];

    if(!file1 || !file2){
        return;
    }

    try{

        const nd1 = await readExcel(file1);
        const nd2 = await readExcel(file2);

        const set2 = new Set(nd2);

        commonND = [...new Set(
            nd1.filter(nd => set2.has(nd))
        )];

        render(commonND);

        console.log("Fichier1 :", nd1);
        console.log("Fichier2 :", nd2);
        console.log("Communs :", commonND);

    }catch(e){

        console.error(e);

        tbody.innerHTML = `
        <tr>
            <td class="red">Erreur lecture fichiers</td>
        </tr>
        `;
    }

}

document.getElementById("file1")
.addEventListener("change",compareFiles);

document.getElementById("file2")
.addEventListener("change",compareFiles);

document.getElementById("search")
.addEventListener("input",function(){

    const value = this.value.toLowerCase();

    const filtered = commonND.filter(nd =>
        nd.toLowerCase().includes(value)
    );

    render(filtered);

});

</script>

</body>
</html>
