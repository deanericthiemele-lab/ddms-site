<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOC B2B</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#fff;
    color:#111827;
    margin:0;
    padding:20px;
}

.topbar{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
}

.btn{
    background:#2563eb;
    color:#fff;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    text-decoration:none;
    font-weight:bold;
}

.search{
    flex:1;
    padding:12px;
    border-radius:8px;
    border:1px solid #d1d5db;
    font-size:14px;
}

.counter{
    font-size:18px;
    font-weight:bold;
}

.title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:15px;
}

.table-container{
    overflow:auto;
    border-radius:12px;
    border:1px solid #d1d5db;
    max-height:75vh;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
}

th{
    background:#f1f5f9;
    color:#0f172a;
    padding:12px;
    text-align:left;
    position:sticky;
    top:0;
}

td{
    padding:10px;
    border-top:1px solid #e5e7eb;
    white-space:nowrap;
}

tr:hover{
    background:#f9fafb;
}

.loading{
    padding:20px;
    font-weight:bold;
    color:#2563eb;
}
</style>
</head>

<body>

<div class="topbar">

    <a href="index.html" class="btn">⬅ Retour</a>

    <input type="text"
           id="searchInput"
           class="search"
           placeholder="Rechercher sur tous les champs...">

    <div class="counter">
        Total : <span id="count">0</span>
    </div>

</div>

<div class="title">
ND présents dans les 2 fichiers
</div>

<div id="loading" class="loading">
Chargement des fichiers...
</div>

<div class="table-container">

<table id="dataTable">

<thead id="thead"></thead>

<tbody></tbody>

</table>

</div>

<script>

const FILE_1 = "data.xlsx";
const FILE_2 = "Top50(2).xlsx";

let data = [];

const tbody = document.querySelector("#dataTable tbody");
const thead = document.getElementById("thead");
const count = document.getElementById("count");
const searchInput = document.getElementById("searchInput");
const loading = document.getElementById("loading");

async function loadExcel(fileName){

    const response = await fetch(fileName);

    if(!response.ok){
        throw new Error("Impossible de charger : " + fileName);
    }

    const buffer = await response.arrayBuffer();

    const workbook = XLSX.read(buffer,{type:"array"});

    const sheetName = workbook.SheetNames[0];

    const sheet = workbook.Sheets[sheetName];

    return XLSX.utils.sheet_to_json(sheet,{defval:""});
}

function normalize(value){

    return String(value)
        .trim()
        .toUpperCase()
        .replace(/\s+/g,'');

}

function detectNDColumn(row){

    return Object.keys(row).find(k =>
        k.toUpperCase().includes("ND")
    );

}

function createHeaders(headers){

    thead.innerHTML = "";

    const tr = document.createElement("tr");

    headers.forEach(h=>{

        const th = document.createElement("th");

        th.textContent = h;

        tr.appendChild(th);

    });

    thead.appendChild(tr);
}

function renderTable(rows){

    tbody.innerHTML = "";

    if(rows.length === 0){

        tbody.innerHTML = `
        <tr>
            <td colspan="100%"
                style="padding:20px;
                       color:red;
                       font-weight:bold;">
                Aucun ND commun trouvé
            </td>
        </tr>
        `;

        count.textContent = 0;

        return;
    }

    rows.forEach(row=>{

        const tr = document.createElement("tr");

        Object.values(row).forEach(value=>{

            const td = document.createElement("td");

            td.textContent = value;

            tr.appendChild(td);

        });

        tbody.appendChild(tr);

    });

    count.textContent = rows.length;
}

function filterData(){

    const value = searchInput.value.toLowerCase();

    const filtered = data.filter(row=>

        Object.values(row).some(v=>

            String(v)
            .toLowerCase()
            .includes(value)

        )

    );

    renderTable(filtered);
}

async function init(){

    try{

        const rows1 = await loadExcel(FILE_1);
        const rows2 = await loadExcel(FILE_2);

        if(rows1.length === 0 || rows2.length === 0){

            loading.innerHTML = "Fichier vide";

            return;
        }

        const headers = Object.keys(rows1[0]);

        createHeaders(headers);

        const ndColumn1 = detectNDColumn(rows1[0]);
        const ndColumn2 = detectNDColumn(rows2[0]);

        console.log("ND fichier 1 :", ndColumn1);
        console.log("ND fichier 2 :", ndColumn2);

        const ndSet = new Set();

        rows2.forEach(r=>{

            if(r[ndColumn2] !== undefined){

                ndSet.add(
                    normalize(r[ndColumn2])
                );

            }

        });

        data = rows1.filter(r=>{

            if(r[ndColumn1] === undefined){

                return false;
            }

            return ndSet.has(

                normalize(r[ndColumn1])

            );

        });

        renderTable(data);

        loading.style.display = "none";

    }catch(e){

        console.error(e);

        loading.innerHTML = `
        Erreur chargement fichiers.
        <br><br>
        Vérifie que :
        <br>
        - data.xlsx existe
        <br>
        - Top50(2).xlsx existe
        <br>
        - les fichiers sont dans le même dossier
        `;
    }
}

searchInput.addEventListener("input",filterData);

init();

</script>

</body>
</html>
