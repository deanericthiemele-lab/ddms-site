<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Comparaison ND</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
    font-family:Arial,sans-serif;
    background:#ffffff;
    margin:0;
    padding:20px;
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:20px;
}

.imports{
    display:flex;
    gap:15px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

input[type=file]{
    padding:10px;
    border:1px solid #d1d5db;
    border-radius:8px;
    background:#f8fafc;
}

.search{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #d1d5db;
    margin-bottom:20px;
}

.counter{
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#f1f5f9;
    padding:14px;
    text-align:left;
    border:1px solid #d1d5db;
}

td{
    padding:12px;
    border:1px solid #e5e7eb;
}

.red{
    color:red;
    font-weight:bold;
}

.green{
    color:green;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="title">
ND présents dans les 2 fichiers
</div>

<div class="imports">

<input type="file" id="file1" accept=".xlsx,.xls">

<input type="file" id="file2" accept=".xlsx,.xls">

</div>

<input type="text"
       id="search"
       class="search"
       placeholder="Rechercher un ND...">

<div class="counter">
Total ND communs :
<span id="count">0</span>
</div>

<table>

<thead>
<tr>
<th>ND</th>
</tr>
</thead>

<tbody id="tbody">

<tr>
<td class="red">
Chargez les 2 fichiers Excel
</td>
</tr>

</tbody>

</table>

<script>

let commonND = [];

const tbody = document.getElementById("tbody");
const count = document.getElementById("count");
const search = document.getElementById("search");

function normalize(value){

    return String(value || "")
        .trim()
        .toUpperCase()
        .replace(/\s+/g,'');

}

function detectNDColumn(headers){

    return headers.find(h =>
        normalize(h).includes("ND")
    );

}

async function readExcel(file){

    const buffer = await file.arrayBuffer();

    const workbook = XLSX.read(buffer,{type:"array"});

    let rows = [];

    workbook.SheetNames.forEach(sheetName=>{

        const sheet = workbook.Sheets[sheetName];

        const data = XLSX.utils.sheet_to_json(sheet,{defval:""});

        rows = rows.concat(data);

    });

    return rows;

}

function render(data){

    tbody.innerHTML = "";

    if(data.length === 0){

        tbody.innerHTML = `
        <tr>
            <td class="red">
                Aucun ND commun trouvé
            </td>
        </tr>
        `;

        count.textContent = 0;

        return;

    }

    data.forEach(nd=>{

        const tr = document.createElement("tr");

        tr.innerHTML = `
        <td class="green">${nd}</td>
        `;

        tbody.appendChild(tr);

    });

    count.textContent = data.length;

}

async function compareFiles(){

    const fileA = document.getElementById("file1").files[0];
    const fileB = document.getElementById("file2").files[0];

    if(!fileA || !fileB){
        return;
    }

    try{

        const rows1 = await readExcel(fileA);
        const rows2 = await readExcel(fileB);

        const headers1 = Object.keys(rows1[0] || {});
        const headers2 = Object.keys(rows2[0] || {});

        const ndCol1 = detectNDColumn(headers1);
        const ndCol2 = detectNDColumn(headers2);

        if(!ndCol1 || !ndCol2){

            tbody.innerHTML = `
            <tr>
                <td class="red">
                    Colonne ND introuvable
                </td>
            </tr>
            `;

            return;
        }

        const set2 = new Set();

        rows2.forEach(r=>{

            const nd = normalize(r[ndCol2]);

            if(nd){
                set2.add(nd);
            }

        });

        commonND = rows1
            .map(r => normalize(r[ndCol1]))
            .filter(nd => nd && set2.has(nd));

        commonND = [...new Set(commonND)];

        render(commonND);

    }catch(error){

        console.error(error);

        tbody.innerHTML = `
        <tr>
            <td class="red">
                Erreur lecture fichiers
            </td>
        </tr>
        `;
    }

}

function filterND(){

    const value = search.value.toLowerCase();

    const filtered = commonND.filter(nd =>
        nd.toLowerCase().includes(value)
    );

    render(filtered);

}

document.getElementById("file1")
.addEventListener("change",compareFiles);

document.getElementById("file2")
.addEventListener("change",compareFiles);

search.addEventListener("input",filterND);

</script>

</body>
</html>
