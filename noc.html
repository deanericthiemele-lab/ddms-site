<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ND Communs</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family:Arial,sans-serif;
    background:#ffffff;
    margin:0;
    padding:20px;
}

.topbar{
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:20px;
}

.btn{
    background:#2563eb;
    color:white;
    text-decoration:none;
    padding:10px 16px;
    border-radius:8px;
    font-weight:bold;
}

.search{
    flex:1;
    padding:12px;
    border-radius:8px;
    border:1px solid #d1d5db;
}

.counter{
    font-size:20px;
    font-weight:bold;
}

.title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#f1f5f9;
    padding:14px;
    text-align:left;
    border:1px solid #d1d5db;
}

td{
    padding:12px;
    border:1px solid #e5e7eb;
}

.red{
    color:red;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">

<a href="index.html" class="btn">⬅ Retour</a>

<input type="text"
       id="search"
       class="search"
       placeholder="Rechercher ND...">

<div class="counter">
Total : <span id="count">0</span>
</div>

</div>

<div class="title">
ND présents dans les 2 fichiers
</div>

<table>

<thead>
<tr>
<th>ND</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script>

const FILE_1 = "data.xlsx";
const FILE_2 = "datac.xlsx";

let data = [];

const tbody = document.getElementById("tbody");
const count = document.getElementById("count");
const search = document.getElementById("search");

function normalize(v){

    return String(v || "")
        .trim()
        .toUpperCase()
        .replace(/\s+/g,'');

}

function detectNDColumn(headers){

    return headers.find(h =>
        normalize(h).includes("ND")
    );

}

async function loadExcel(file){

    const response = await fetch(file);

    const buffer = await response.arrayBuffer();

    const workbook = XLSX.read(buffer,{type:"array"});

    let allRows = [];

    workbook.SheetNames.forEach(sheetName=>{

        const sheet = workbook.Sheets[sheetName];

        const rows = XLSX.utils.sheet_to_json(sheet,{defval:""});

        allRows = allRows.concat(rows);

    });

    return allRows;
}

function render(rows){

    tbody.innerHTML = "";

    if(rows.length === 0){

        tbody.innerHTML = `
        <tr>
            <td class="red">
                Aucun ND commun trouvé
            </td>
        </tr>
        `;

        count.textContent = 0;

        return;
    }

    rows.forEach(nd=>{

        const tr = document.createElement("tr");

        tr.innerHTML = `<td>${nd}</td>`;

        tbody.appendChild(tr);

    });

    count.textContent = rows.length;
}

function filter(){

    const value = search.value.toLowerCase();

    const filtered = data.filter(nd =>
        nd.toLowerCase().includes(value)
    );

    render(filtered);
}

async function init(){

    try{

        const rows1 = await loadExcel(FILE_1);
        const rows2 = await loadExcel(FILE_2);

        const headers1 = Object.keys(rows1[0]);
        const headers2 = Object.keys(rows2[0]);

        const ndCol1 = detectNDColumn(headers1);
        const ndCol2 = detectNDColumn(headers2);

        const set2 = new Set();

        rows2.forEach(r=>{

            const nd = normalize(r[ndCol2]);

            if(nd){
                set2.add(nd);
            }

        });

        data = rows1
            .map(r => normalize(r[ndCol1]))
            .filter(nd => nd && set2.has(nd));

        data = [...new Set(data)];

        render(data);

    }catch(e){

        console.error(e);

        tbody.innerHTML = `
        <tr>
            <td class="red">
                Erreur chargement fichiers
            </td>
        </tr>
        `;
    }
}

search.addEventListener("input",filter);

init();

</script>

</body>
</html>
