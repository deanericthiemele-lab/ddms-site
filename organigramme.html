<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Organigramme DDMS B2B</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#E8700A; --blue:#3B82C4; --green:#3A8C60;
  --lblue:#7BAFD4; --lgrey:#C8C8C8; --yellow:#E8C83A;
  --bg:#f4f6f9;
}
body{font-family:'DM Sans',Arial,sans-serif;background:var(--bg);min-height:100vh;padding:1.5rem;color:#111}

/* ── HEADER ── */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #dde2ea}
.page-header-left{display:flex;align-items:center;gap:12px}
.back-btn{font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;background:#003366;color:#fff;border:none;cursor:pointer;text-decoration:none;transition:opacity .15s}
.back-btn:hover{opacity:.8}
.page-title{font-size:15px;font-weight:700;color:#111}
.page-sub{font-size:11px;color:#888;margin-top:2px}
.edit-bar{display:flex;gap:8px;align-items:center}
.btn{font-size:12px;font-weight:600;padding:6px 16px;border-radius:20px;border:none;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.8}
.btn-edit{border:1.5px solid #003366;background:#fff;color:#003366}
.btn-edit.active{background:#003366;color:#fff}
.btn-save{background:#3A8C60;color:#fff;display:none}
.btn-pptx{background:var(--orange);color:#fff}
.btn-print{background:#555;color:#fff}
.btn-excel{background:#1D6F42;color:#fff}

/* ── LAYOUT ── */
.main-grid{display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start}
.org-panel{background:#fff;border:1px solid #dde2ea;border-radius:12px;padding:1.5rem;overflow-x:auto}
.org-header-block{display:flex;align-items:flex-start;gap:12px;margin-bottom:1rem}
.orange-arrow{background:var(--orange);color:#fff;font-size:22px;line-height:1;padding:4px 8px;border-radius:4px;font-weight:700;flex-shrink:0;margin-top:2px}
.org-dept-title{font-size:16px;font-weight:700;color:#111;margin-bottom:4px}
.org-dept-subtitle{font-size:12px;color:#555;line-height:1.5}
.org-section-label{font-size:13px;font-weight:600;color:#111;margin-bottom:12px}

/* ── TREE ── */
.tree-root{display:flex;flex-direction:column;align-items:center;width:100%;min-width:700px}
.top-level{display:flex;align-items:center;width:100%;gap:0;position:relative}
.side-node-area{display:flex;flex-direction:column;align-items:center;width:130px;flex-shrink:0}
.side-node-box{background:var(--lgrey);border-radius:5px;padding:6px 8px;font-size:10px;font-weight:600;color:#333;text-align:center;width:120px}
.side-node-name{font-size:11px;color:#555;margin-top:4px;text-align:center}
.side-h-line{height:2px;background:#bbb;width:20px;flex-shrink:0}
.center-area{display:flex;flex-direction:column;align-items:center;flex:1}
.dept-stats-row{display:flex;align-items:center;gap:10px;justify-content:center}
.dept-box{background:var(--blue);color:#fff;border-radius:6px;padding:9px 20px;font-size:13px;font-weight:700;text-align:center;position:relative;min-width:220px}
.count-badge{position:absolute;left:-14px;top:50%;transform:translateY(-50%);background:var(--orange);color:#fff;font-size:12px;font-weight:700;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.stats-box{background:var(--orange);color:#fff;border-radius:6px;padding:8px 14px;font-size:11px;font-weight:600;line-height:1.7}
.director-row{font-size:14px;font-weight:600;color:#111;margin-top:5px;text-align:center}
.v-line{background:#bbb;width:2px}
.h-line{background:#bbb;height:2px}
.services-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;width:100%}
.svc-col{display:flex;flex-direction:column;align-items:stretch}
.svc-box{border-radius:6px;padding:8px 10px;font-size:12px;font-weight:700;color:#fff;text-align:center;position:relative;width:100%}
.svc-box.green{background:var(--green)}
.svc-box.orange{background:var(--orange)}
.svc-count{position:absolute;left:-12px;top:50%;transform:translateY(-50%);color:#fff;font-size:11px;font-weight:700;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.svc-box.green .svc-count{background:#2A6B48}
.svc-box.orange .svc-count{background:#C05E08}
.svc-head{font-size:12px;font-weight:500;color:#222;padding:4px 2px;text-align:left}
.poles-area{margin-top:6px;display:flex;flex-direction:column;gap:4px;padding-left:6px}
.pole-box{border-radius:5px;padding:5px 8px;font-size:11px;font-weight:700;color:#111;text-align:center;position:relative;margin-top:6px}
.pole-box.yellow{background:var(--yellow)}
.pole-box.lblue{background:var(--lblue);color:#fff}
.pole-box.lgrey{background:var(--lgrey)}
.pole-count{position:absolute;left:-12px;top:50%;transform:translateY(-50%);color:#fff;font-size:10px;font-weight:700;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.pole-box.yellow .pole-count{background:#A88A00}
.pole-box.lblue .pole-count{background:#1A5276}
.pole-box.lgrey .pole-count{background:#666}
.person{font-size:11px;padding:1px 4px;display:flex;align-items:center;gap:4px}
.person-name{flex:1}
.person.cdi .person-name{color:#2A6B48;font-weight:500}
.person.cdd .person-name{color:#C05E08;font-weight:500}
.person.none .person-name{color:#333}
/* badge CDI/CDD affiché en vue normale */
.person-type-badge{font-size:9px;font-weight:700;border-radius:3px;padding:1px 5px;flex-shrink:0}
.person.cdi .person-type-badge{background:#e8f5ee;color:#2A6B48}
.person.cdd .person-type-badge{background:#fff3eb;color:#C05E08}
/* toggle CDI/CDD en mode édition */
.type-toggle{display:none}
.edit-mode .type-toggle{display:flex;gap:3px;flex-shrink:0}
.tt-btn{font-size:9px;font-weight:700;border:1.5px solid #ddd;border-radius:4px;padding:2px 6px;cursor:pointer;background:#f7f7f7;color:#888;transition:all .12s;line-height:1.2}
.tt-btn.active-cdi{background:#e8f5ee;border-color:#3A8C60;color:#2A6B48}
.tt-btn.active-cdd{background:#fff3eb;border-color:#E8700A;color:#C05E08}
/* ── ÉDITION INLINE DES PERSONNES ── */
.person-edit-row{display:flex;align-items:center;gap:4px;padding:1px 4px}
.person-inline-input{
  flex:1;font-family:'DM Sans',Arial,sans-serif;font-size:11px;
  border:1px solid #dde2ea;border-radius:5px;padding:3px 7px;
  color:#111;outline:none;min-width:0;transition:border-color .15s
}
.person-inline-input:focus{border-color:#3B82C4;background:#f0f7ff}
.person-inline-del{
  background:none;border:none;cursor:pointer;color:#ccc;
  font-size:14px;line-height:1;padding:2px 3px;flex-shrink:0;
  transition:color .15s;border-radius:3px
}
.person-inline-del:hover{color:#e03;background:#fff0f0}
.person-inline-add{
  font-size:11px;font-weight:600;color:var(--green);
  background:none;border:1px dashed var(--green);
  border-radius:5px;padding:4px 8px;cursor:pointer;
  width:calc(100% - 8px);margin:4px 4px 2px;
  transition:all .15s;text-align:center
}
.person-inline-add:hover{background:#f0faf4}

/* ── RIGHT PANEL ── */
.right-panel{display:flex;flex-direction:column;gap:16px}
.legend-card,.coverage-card{background:#fff;border:1px solid #dde2ea;border-radius:12px;padding:1.25rem}
.card-title{font-size:13px;font-weight:700;color:#111;margin-bottom:12px}
.legend-items{display:flex;flex-direction:column;gap:7px}
.legend-item{display:flex;align-items:center;gap:10px;font-size:12px;color:#333}
.legend-dot{width:16px;height:16px;border-radius:3px;flex-shrink:0}
.cov-table{width:100%;border-collapse:collapse}
.cov-table th{background:var(--green);color:#fff;font-size:11px;font-weight:600;padding:7px 10px;text-align:left;border:1px solid #bbb}
.cov-dept{background:var(--green);color:#fff;font-weight:700;font-size:11px;padding:7px 10px;border:1px solid #bbb;vertical-align:middle;width:100px}
.cov-td{font-size:11px;padding:7px 10px;border:1px solid #dde2ea;vertical-align:top;line-height:1.5}
.cov-table tr:nth-child(even) .cov-td{background:#f7f9fb}

/* ══════════════════════════════════════
   MODAL D'ÉDITION
══════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;width:520px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #eee}
.modal-title{font-size:14px;font-weight:700;color:#111}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#888;line-height:1}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 20px;border-top:1px solid #eee;display:flex;justify-content:flex-end;gap:8px}

/* Sections dans le modal */
.edit-section{margin-bottom:18px}
.edit-section-title{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.edit-field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.edit-field label{font-size:11px;font-weight:600;color:#444}
.edit-field input,.edit-field textarea{
  font-family:'DM Sans',Arial,sans-serif;font-size:12px;
  border:1px solid #dde2ea;border-radius:6px;padding:6px 10px;
  color:#111;width:100%;outline:none;transition:border-color .15s
}
.edit-field input:focus,.edit-field textarea:focus{border-color:#3B82C4}
.edit-field textarea{resize:vertical;min-height:60px}

/* Liste de personnes éditable */
.persons-list{display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.person-row{display:flex;align-items:center;gap:6px}
.person-row input{flex:1;font-family:'DM Sans',Arial,sans-serif;font-size:12px;border:1px solid #dde2ea;border-radius:6px;padding:5px 9px;color:#111;outline:none;transition:border-color .15s}
.person-row input:focus{border-color:#3B82C4}
.person-del{background:none;border:none;cursor:pointer;color:#bbb;font-size:16px;line-height:1;padding:2px 4px;transition:color .15s;flex-shrink:0}
.person-del:hover{color:#e03}
.add-person-btn{font-size:11px;font-weight:600;color:var(--green);background:none;border:1px dashed var(--green);border-radius:6px;padding:5px 10px;cursor:pointer;width:100%;transition:all .15s}
.add-person-btn:hover{background:#f0faf4}

/* Bouton éditer sur chaque bloc */
.edit-mode .editable-block{position:relative;cursor:pointer}
.edit-mode .editable-block::after{
  content:'✏️';position:absolute;top:3px;right:3px;
  font-size:11px;opacity:0;transition:opacity .15s;
  background:rgba(255,255,255,.8);border-radius:4px;padding:1px 3px;
}
.edit-mode .editable-block:hover::after{opacity:1}
.edit-mode .editable-block:hover{outline:2px dashed #3B82C4;outline-offset:2px;border-radius:4px}

@media print{.page-header{display:none}body{background:#fff;padding:0}}
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header-left">
    <a class="back-btn" href="index.html">← Retour</a>
    <div>
      <div class="page-title">Organigramme DDMS B2B</div>
      <div class="page-sub">Delivery &amp; Management des Services B2B — Organisation cible</div>
    </div>
  </div>
  <div class="edit-bar">
    <button class="btn btn-edit" id="editToggle" onclick="toggleEdit()">✏️ Modifier</button>
    <button class="btn btn-save" id="saveBtn" onclick="saveData()">💾 Enregistrer</button>
    <button class="btn btn-excel" onclick="exportExcel()">📥 Exporter Excel</button>
    <button class="btn btn-pptx" onclick="exportPPTX()" id="pptxBtn">📊 Exporter PowerPoint</button>
    <button class="btn btn-print" onclick="window.print()">🖨️ Imprimer</button>
  </div>
</div>

<div class="main-grid">
  <!-- ORG PANEL — rendu par JS -->
  <div class="org-panel" id="orgPanel"></div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="coverage-card">
      <div class="card-title">Couverture Fonctionnelle</div>
      <div id="coverageTable"></div>
    </div>
  </div>
</div>

<!-- ══════════ MODAL D'ÉDITION ══════════ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Modifier</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn" style="background:#f0f0f0;color:#444" onclick="closeModal()">Annuler</button>
      <button class="btn btn-save" style="display:inline-block" onclick="applyModal()">✔ Appliquer</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// DONNÉES CENTRALES
// ══════════════════════════════════════════
const DEFAULT_DATA = {
  deptTitle: "Département « Delivery & Management des services B2B »",
  deptSubtitle: "Enjeux clés : Accélérer la transformation du CAS en CAF, Améliorer la résilience des réseaux, Assurer la satisfaction 100% des clients High Value",
  deptBoxTitle: "Delivery & Management des Services B2B",
  directorName: "Dean COFFI", directorType: "CDI",
  sideNode: "Gestion de stock et du budget",
  sideNodeName: "Annick ADON", sideNodeType: "CDI",
  services: [
    {
      id:"s1", title:"Qualité & Performance", color:"green", count:6,
      head:"Anotchi ASSEMIEN", headType:"CDI",
      poles:[
        {id:"p1a", title:"Amélioration continue (QOS)", color:"yellow", persons:[{name:"Bato KOUASSI",type:"CDI"},{name:"Christophe GUE",type:"CDI"}]},
        {id:"p1b", title:"Analyse & Traitement des Incidents répétitifs", color:"yellow", persons:[{name:"Fred-Alain TIAYA",type:"CDI"},{name:"Abdoul TOURE",type:"CDI"},{name:"Franck-Alain N'GUESSAN",type:"CDI"}]},
      ]
    },
    {
      id:"s2", title:"Centre de service client B2B", color:"green", count:9,
      head:"Karamoko TOURE", headType:"CDI",
      poles:[
        {id:"p2a", title:"Pôle ASM", color:"yellow", persons:[{name:"Naminata BAMBA",type:"CDI"},{name:"Phineas DAMBO",type:"CDI"},{name:"Jacques DJIGBENOU",type:"CDI"},{name:"Eric KOUASSI",type:"CDI"},{name:"Michelle KOYE",type:"CDI"},{name:"Arnaud N'DRAMAN",type:"CDI"},{name:"Marie-Claire ABO Epse KONE",type:"CDI"}]},
        {id:"p2b", title:"NOC", color:"yellow", persons:[{name:"Jean Jacques NOGBOU",type:"CDI"}]},
      ]
    },
    {
      id:"s3", title:"Production et plateforme", color:"orange", count:14,
      head:"Freddy N'GUESSAN", headType:"CDI",
      poles:[
        {id:"p3a", title:"Pilotage Production", color:"yellow", persons:[{name:"Edith BAH",type:"CDI"},{name:"Franck KOUAKOU",type:"CDI"},{name:"Innocent Avi N'DABIAN",type:"CDI"},{name:"Judicaël ADON",type:"CDI"},{name:"Anicette BOLI",type:"CDI"},{name:"Philomène MOUNOU",type:"CDI"}]},
        {id:"p3b", title:"Intégration B2B, ICT", color:"yellow", persons:[{name:"Cynthia BLASSONI",type:"CDI"},{name:"Gnagne GAUTHIER",type:"CDI"}]},
        {id:"p3c", title:"Avant-Vente", color:"yellow", persons:[{name:"Thierry BIESSAN",type:"CDI"},{name:"Michel KAN",type:"CDI"}]},
        {id:"p3d", title:"Plateforme de Service", color:"yellow", persons:[{name:"Hyppolite SIDIBE",type:"CDI"},{name:"Toussaint KOUADIO",type:"CDI"},{name:"Melaine SARAKA",type:"CDI"}]},
      ]
    }
  ],
  coverage: [
    { dept:"Qualité &\nPerformance", missions:[
      "Pilote les projets d'amélioration QOS",
      "Effectue une analyse à froid des incidents",
      "Elabore et assure le suivi des plans d'actions correctifs"
    ]},
    { dept:"Centre de service\nclient B2B", missions:[
      "Gestion de la relation client Premium sur les problématiques techniques et commerciales des clients TOP50",
      "Identification des nouveaux besoins des clients",
      "Saisie des opportunités afin d'accroître le portefeuille client",
      "Rôle d'écoute et d'alerte garantissant la satisfaction client en exploitation",
      "Gestion des problématiques de services des clients B2B",
      "Gestion et Supporte les clients internes OCI (Agences et franchises)"
    ]},
    { dept:"Production\net plateforme", missions:[
      "Livraison des produits et service de connectivités",
      "Intégration de service / Transfert de lignes",
      "Modification de commande / Migrations de lignes",
      "Mise en service / Résiliation / Suspension / rétablissement",
      "Plateformes / Support avant-vente aux commerciaux",
      "Appels d'offres / POC / Test de produit et Solutions B2B",
      "Veille technologique / Benchmarking fournisseurs / technologies"
    ]}
  ]
};

let D = JSON.parse(JSON.stringify(DEFAULT_DATA)); // copie profonde
let editMode = false;

// ── Chargement localStorage ──
function loadData() {
  const raw = localStorage.getItem('organigramme_v2');
  if (raw) try {
    D = JSON.parse(raw);
    // Migration: convertir strings en objets {name,type}
    if (!D.directorType) D.directorType = 'CDI';
    if (!D.sideNodeType) D.sideNodeType = 'CDI';
    D.services.forEach(s => {
      if (!s.headType) s.headType = 'CDI';
      s.poles.forEach(p => {
        p.persons = p.persons.map(x => typeof x==='string' ? {name:x,type:'CDI'} : x);
      });
    });
  } catch(e) {}
}

function saveData() {
  localStorage.setItem('organigramme_v2', JSON.stringify(D));
  const btn = document.getElementById('saveBtn');
  const orig = btn.textContent;
  btn.textContent = '✅ Enregistré';
  setTimeout(() => btn.textContent = orig, 1500);
}

// ══════════════════════════════════════════
// RENDU HTML
// ══════════════════════════════════════════
function render() {
  renderOrg();
  renderCoverage();
  updateCounts();
}

function renderOrg() {
  const panel = document.getElementById('orgPanel');
  const ed = editMode;

  let html = `
  <div class="org-header-block ${ed?'editable-block':''}" ${ed?`onclick="editBlock('header')" title="Cliquer pour modifier"`:''}> 
    <div class="orange-arrow">›</div>
    <div>
      <div class="org-dept-title">${esc(D.deptTitle)}</div>
      <div class="org-dept-subtitle">${esc(D.deptSubtitle)}</div>
    </div>
  </div>
  <div class="org-section-label">Organisation cible</div>
  <div class="tree-root">
    <!-- TOP LEVEL -->
    <div class="top-level">
      <div class="side-node-area">
        <div class="side-node-box ${ed?'editable-block':''}" ${ed?`onclick="editBlock('side')" title="Cliquer pour modifier"`:''}>${esc(D.sideNode)}</div>
        <div style="display:flex;align-items:center;gap:4px;margin-top:4px;justify-content:center;flex-wrap:wrap">
          <span class="side-node-name" style="${(D.sideNodeType||'CDI')==='CDI'?'color:#2A6B48;font-weight:600':'color:#C05E08;font-weight:600'}">${esc(D.sideNodeName)}</span>
          ${ed ? `<div style="display:flex;gap:3px">
            <button class="tt-btn ${(D.sideNodeType||'CDI')==='CDI'?'active-cdi':''}" onclick="setSideType('CDI')">CDI</button>
            <button class="tt-btn ${(D.sideNodeType||'CDI')==='CDD'?'active-cdd':''}" onclick="setSideType('CDD')">CDD</button>
          </div>` : `<span class="person-type-badge" style="${(D.sideNodeType||'CDI')==='CDI'?'background:#e8f5ee;color:#2A6B48':'background:#fff3eb;color:#C05E08'}">${esc(D.sideNodeType||'CDI')}</span>`}
        </div>
      </div>
      <div class="side-h-line"></div>
      <div class="center-area">
        <div class="dept-stats-row">
          <div class="dept-box ${ed?'editable-block':''}" ${ed?`onclick="editBlock('dept')" title="Cliquer pour modifier"`:''}> 
            ${esc(D.deptBoxTitle)}
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;margin-left:4px">
            <div style="background:#e8f5ee;border:1.5px solid #3A8C60;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;color:#2A6B48;white-space:nowrap">CDI : <span id="cdiCount">${countType('CDI')}</span></div>
            <div style="background:#fff3eb;border:1.5px solid #E8700A;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;color:#C05E08;white-space:nowrap">CDD : <span id="cddCount">${countType('CDD')}</span></div>
          </div>

        </div>
        <div class="director-row ${ed?'editable-block':''}" ${ed?`onclick="editBlock('director')" title="Cliquer pour modifier"`:''}> 
          ${esc(D.directorName)}
        </div>
        <div class="v-line" style="height:18px;margin-top:4px"></div>
      </div>
      <div style="width:150px;flex-shrink:0"></div>
    </div>

    <!-- BRANCHE -->
    <div style="width:100%;display:flex;justify-content:center">

function totalCount() {
  return D.services.reduce((t,s) => t + s.poles.reduce((t2,p) => t2+p.persons.length, 0), 0) + 1;
}
function svcCount(si) {
  return D.services[si].poles.reduce((t,p) => t+p.persons.length, 0);
}
function countType(type) {
  let n = 0;
  // Directeur
  if ((D.directorType||'CDI') === type) n++;
  // Nœud latéral
  if (D.sideNodeName && D.sideNodeName.trim() && (D.sideNodeType||'CDI') === type) n++;
  // Chefs de service
  D.services.forEach(s => {
    if ((s.headType||'CDI') === type) n++;
    // Membres des pôles
    s.poles.forEach(p => p.persons.forEach(per => {
      const t = typeof per==='object' ? (per.type||'CDI') : 'CDI';
      if (t === type) n++;
    }));
  });
  return n;
}
function updateCounts() {
  const cdi = document.getElementById('cdiCount');
  const cdd = document.getElementById('cddCount');
  if (cdi) cdi.textContent = countType('CDI');
  if (cdd) cdd.textContent = countType('CDD');
}
function setSideType(type) {
  D.sideNodeType = type;
  saveData();
  updateCounts();
  render();
}

function setType(si, pi, pei, type) {
  D.services[si].poles[pi].persons[pei].type = type;
  saveData();
  render();
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleEdit() {
  editMode = !editMode;
  const btn = document.getElementById('editToggle');
  const saveBtn = document.getElementById('saveBtn');
  if (editMode) {
    document.body.classList.add('edit-mode');
    btn.textContent = '✏️ Mode édition (ON)';
    btn.classList.add('active');
    saveBtn.style.display = 'inline-block';
  } else {
    document.body.classList.remove('edit-mode');
    btn.textContent = '✏️ Modifier';
    btn.classList.remove('active');
    saveBtn.style.display = 'none';
    saveData();
  }
  render();
}

let currentEdit = null;

function editBlock(type, ...args) {
  if (!editMode) return;
  currentEdit = { type, args };
  const overlay = document.getElementById('modalOverlay');
  const body = document.getElementById('modalBody');
  const title = document.getElementById('modalTitle');

  let html = '';

  if (type === 'header') {
    title.textContent = 'Modifier l\'en-tête du département';
    html = `
      <div class="edit-field"><label>Titre du département</label>
        <input id="ef_deptTitle" value="${esc(D.deptTitle)}"></div>
      <div class="edit-field"><label>Sous-titre / Enjeux</label>
        <textarea id="ef_deptSubtitle" rows="3">${esc(D.deptSubtitle)}</textarea></div>`;
  }
  else if (type === 'dept') {
    title.textContent = 'Modifier le bloc Département';
    html = `<div class="edit-field"><label>Texte du bloc département</label>
      <input id="ef_deptBoxTitle" value="${esc(D.deptBoxTitle)}"></div>`;
  }

  else if (type === 'director') {
    title.textContent = 'Modifier le directeur';
    html = `<div class="edit-field"><label>Nom du directeur</label>
      <input id="ef_directorName" value="${esc(D.directorName)}"></div>`;
  }
  else if (type === 'side') {
    title.textContent = 'Modifier le nœud latéral';
    html = `
      <div class="edit-field"><label>Intitulé du poste</label>
        <input id="ef_sideNode" value="${esc(D.sideNode)}"></div>
      <div class="edit-field"><label>Nom de la personne</label>
        <input id="ef_sideNodeName" value="${esc(D.sideNodeName)}"></div>`;
  }
  else if (type === 'svc') {
    const si = args[0];
    const svc = D.services[si];
    title.textContent = `Modifier le service : ${svc.title}`;
    html = `
      <div class="edit-section">
        <div class="edit-section-title">Service</div>
        <div class="edit-field"><label>Titre du service</label>
          <input id="ef_svcTitle" value="${esc(svc.title)}"></div>
        <div class="edit-field"><label>Responsable</label>
          <input id="ef_svcHead" value="${esc(svc.head)}"></div>

  }
  else if (type === 'pole') {

    title.textContent = `Modifier le pôle : ${pole.title}`;
    html = `
      <div class="edit-section">
        <div class="edit-section-title">Pôle</div>
        <div class="edit-field"><label>Titre du pôle</label>

        <div class="edit-section-title">Membres (ajouter / supprimer / modifier)</div>

          ${pole.persons.map((p,i) => `
            <div class="person-row" data-idx="${i}">
              <input value="${esc(p)}" placeholder="Nom Prénom" oninput="updatePersonInput(${i},this.value)">
              <button class="person-del" onclick="delPerson(${i})" title="Supprimer">×</button>
            </div>`).join('')}
        </div>
        <button class="add-person-btn" onclick="addPerson()">+ Ajouter un membre</button>
      </div>`;
  }
  else if (type === 'coverage') {
    const ri = args[0];
    const row = D.coverage[ri];
    title.textContent = `Modifier la couverture : ${row.dept.replace(/\n/g,' ')}`;
    html = `

// ── Gestion de la liste de personnes/missions dans le modal ──
let tempPersons = null;

function initTempPersons() {
  const { type, args } = currentEdit;
  if (type === 'pole') {
    const [si, pi] = args;
    tempPersons = [...D.services[si].poles[pi].persons];
  } else if (type === 'coverage') {
    tempPersons = [...D.coverage[args[0]].missions];
  }
}

// Appelé à l'ouverture du modal pour initialiser tempPersons
document.getElementById('modalOverlay').addEventListener('transitionend', () => {});

// Re-render la liste dans le modal
function refreshPersonsList() {
  const list = document.getElementById('personsList');
  if (!list || !tempPersons) return;
  const { type, args } = currentEdit;
  const isPersons = type === 'pole';
  list.innerHTML = tempPersons.map((p, i) => `
    <div class="person-row" data-idx="${i}">
      <input value="${esc(p)}" placeholder="${isPersons?'Nom Prénom':'Mission...'}" oninput="tempPersons[${i}]=this.value">
      <button class="person-del" onclick="delPerson(${i})" title="Supprimer">×</button>
    </div>`).join('');
}

function updatePersonInput(i, val) {
  if (!tempPersons) initTempPersons();
  tempPersons[i] = val;
}

function addPerson() {
  if (!tempPersons) initTempPersons();
  tempPersons.push('');
  refreshPersonsList();
  // Focus le dernier champ
  setTimeout(() => {
    const inputs = document.querySelectorAll('#personsList input');
    if (inputs.length) inputs[inputs.length-1].focus();
  }, 50);
}

function delPerson(i) {
  if (!tempPersons) initTempPersons();
  tempPersons.splice(i, 1);
  refreshPersonsList();
}

// Intercepter les inputs pour synchroniser tempPersons au moment de l'ouverture
const origEditBlock = editBlock;
window.editBlock = function(type, ...args) {
  tempPersons = null;
  origEditBlock(type, ...args);
  if (type === 'pole' || type === 'coverage') {
    initTempPersons();
  }
};

// ── Appliquer les modifications ──
function applyModal() {
  const { type, args } = currentEdit;
  const v = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };

  if (type === 'header') {
    D.deptTitle = v('ef_deptTitle');
    D.deptSubtitle = v('ef_deptSubtitle');
  } else if (type === 'dept') {
    D.deptBoxTitle = v('ef_deptBoxTitle');
  } else if (type === 'director') {
    D.directorName = v('ef_directorName');
  } else if (type === 'side') {
    D.sideNode = v('ef_sideNode');
    D.sideNodeName = v('ef_sideNodeName');
    D.sideNodeType = document.getElementById('ef_sideNodeType')?.value || 'CDI';
  } else if (type === 'svc') {
    const si = args[0];
    D.services[si].title = v('ef_svcTitle');
    D.services[si].head  = v('ef_svcHead');
  } else if (type === 'pole') {
    const [si, pi] = args;
    // Lire les valeurs courantes des inputs
    const inputs = document.querySelectorAll('#personsList input');
    tempPersons = Array.from(inputs).map(inp => inp.value.trim()).filter(p => p);
    D.services[si].poles[pi].title   = v('ef_poleTitle');
    D.services[si].poles[pi].persons = tempPersons;
  } else if (type === 'coverage') {
    const ri = args[0];
    const inputs = document.querySelectorAll('#personsList input');
    tempPersons = Array.from(inputs).map(inp => inp.value.trim()).filter(p => p);
    D.coverage[ri].dept     = v('ef_covDept');
    D.coverage[ri].missions = tempPersons;
  }

  closeModal();
  render();
  saveData();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  tempPersons = null;
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// EXPORT EXCEL
// ══════════════════════════════════════════
function exportExcel() {
  // Construire les lignes : Nom | Département/Service | Pôle | Type contrat
  const rows = [
    ["Nom", "Département / Service", "Pôle", "Type contrat"]
  ];

  // 1. Chef de département
  rows.push([
    D.directorName,
    D.deptBoxTitle,
    "Direction",
    D.directorType || "CDI"
  ]);

  // 2. Nœud latéral (Gestion stock)
  if (D.sideNodeName && D.sideNodeName.trim()) {
    rows.push([
      D.sideNodeName,
      D.deptBoxTitle,
      D.sideNode,
      D.sideNodeType || "CDI"
    ]);
  }

  // 3. Chefs de service + membres des pôles
  D.services.forEach(svc => {
    // Chef de service
    rows.push([
      svc.head,
      svc.title,
      "Responsable de service",
      svc.headType || "CDI"
    ]);
    // Membres
    svc.poles.forEach(pole => {
      pole.persons.forEach(per => {
        const name = typeof per === 'object' ? per.name : per;
        const type = typeof per === 'object' ? (per.type || 'CDI') : 'CDI';
        if (name && name.trim()) {
          rows.push([name, svc.title, pole.title, type]);
        }
      });
    });
  });

  // Créer le workbook
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Style colonne widths
  ws['!cols'] = [
    { wch: 32 },  // Nom
    { wch: 36 },  // Service
    { wch: 38 },  // Pôle
    { wch: 14 },  // Type
  ];

  // Figer la première ligne (en-tête)
  ws['!freeze'] = { xSplit: 0, ySplit: 1 };

  XLSX.utils.book_append_sheet(wb, ws, "Personnel DDMS B2B");

  // Feuille récapitulatif CDI/CDD
  const nCDI = countType('CDI');
  const nCDD = countType('CDD');
  const recap = [
    ["Type contrat", "Effectif"],
    ["CDI", nCDI],
    ["CDD / Intérim", nCDD],
    ["Total", nCDI + nCDD],
  ];
  const ws2 = XLSX.utils.aoa_to_sheet(recap);
  ws2['!cols'] = [{ wch: 18 }, { wch: 12 }];
  XLSX.utils.book_append_sheet(wb, ws2, "Récapitulatif");

  // Téléchargement
  XLSX.writeFile(wb, "Personnel_DDMS_B2B.xlsx");
}

      let py=SVC_Y+0.4+0.22+0.05;
      svc.poles.forEach(pole=>{
        const pc=POLE_C[pole.color]||C.yellow;
        const tc=POLE_TC[pole.color]||C.dark;
        const bc=POLE_BC[pole.color]||"666666";
        slide.addShape(pres.shapes.RECTANGLE,{x:lx,y:py,w:pw,h:0.32,fill:{color:pc},line:{color:pc}});
        slide.addText(pole.title,{x:lx,y:py,w:pw,h:0.32,fontSize:8,bold:true,color:tc,align:"center",valign:"middle",margin:2});
        py+=0.32;
        pole.persons.forEach(p=>{
          const pname=typeof p==='object'?p.name:p;
          const ptype=typeof p==='object'?(p.type||'CDI'):'CDI';
          const pcol=ptype==='CDD'?'C05E08':ptype==='CDI'?'2A6B48':'333333';
          slide.addText(pname,{x:lx+0.08,y:py,w:pw-0.08,h:0.2,fontSize:7.5,color:pcol,align:"left",valign:"middle",margin:1});
          py+=0.2;
        });
        py+=0.05;
      });
    });

    // COUVERTURE FONCTIONNELLE
    const TX=7.25; const TW_L=1.25; const TW_R=4.75; const TH=0.3;
    slide.addText("Couverture Fonctionnelle",{x:TX,y:0.82,w:TW_L+TW_R,h:0.26,fontSize:10,color:C.dark,align:"left",valign:"middle",margin:0});
    slide.addShape(pres.shapes.RECTANGLE,{x:TX,y:1.1,w:TW_L,h:TH,fill:{color:C.green},line:{color:"888888",width:0.5}});
    slide.addText("Entité",{x:TX,y:1.1,w:TW_L,h:TH,fontSize:8.5,bold:true,color:C.white,align:"center",valign:"middle",margin:2});
    slide.addShape(pres.shapes.RECTANGLE,{x:TX+TW_L,y:1.1,w:TW_R,h:TH,fill:{color:C.green},line:{color:"888888",width:0.5}});
    slide.addText("Missions",{x:TX+TW_L,y:1.1,w:TW_R,h:TH,fontSize:8.5,bold:true,color:C.white,align:"center",valign:"middle",margin:2});
    const ROW_H=[0.85,1.5,1.95];
    let ry=1.1+TH;
    D.coverage.forEach((row,ri)=>{
      const bg=ri%2===0?"FFFFFF":"F5F5F5";
      slide.addShape(pres.shapes.RECTANGLE,{x:TX,y:ry,w:TW_L,h:ROW_H[ri],fill:{color:C.green},line:{color:"888888",width:0.5}});
      slide.addText(row.dept,{x:TX,y:ry,w:TW_L,h:ROW_H[ri],fontSize:8,bold:true,color:C.white,align:"center",valign:"middle",margin:3});
      slide.addShape(pres.shapes.RECTANGLE,{x:TX+TW_L,y:ry,w:TW_R,h:ROW_H[ri],fill:{color:bg},line:{color:"888888",width:0.5}});
      const runs=row.missions.map((m,mi)=>({text:m,options:{bullet:true,fontSize:8,color:"222222",breakLine:mi<row.missions.length-1}}));
      if(runs.length) slide.addText(runs,{x:TX+TW_L+0.06,y:ry,w:TW_R-0.12,h:ROW_H[ri],valign:"middle",margin:3});
      ry+=ROW_H[ri];
    });

    slide.addText("1",{x:0.15,y:7.25,w:0.4,h:0.22,fontSize:9,color:"888888",align:"center"});
    await pres.writeFile({fileName:"Organigramme_DDMS_B2B.pptx"});
    btn.textContent='✅ Téléchargé !';
    setTimeout(()=>{btn.textContent='📊 Exporter PowerPoint';btn.disabled=false;},2000);
  } catch(e) {
    console.error(e);
    btn.textContent='❌ Erreur';
    btn.disabled=false;
  }
}


// ── ÉDITION INLINE: ajouter / supprimer un membre directement ──
function addPersonInline(si, pi) {
  D.services[si].poles[pi].persons.push({name:'',type:'CDI'});
  render();
  saveData();
  // Focus le dernier input du pôle concerné
  setTimeout(() => {
    const rows = document.querySelectorAll('.person-edit-row');
    // Trouver le dernier input de ce pôle
    const allInputs = document.querySelectorAll('.person-inline-input');
    if (allInputs.length) {
      const last = allInputs[allInputs.length - 1];
      last.focus();
      last.select();
    }
  }, 50);
}

function delPersonInline(si, pi, pei) {
  D.services[si].poles[pi].persons.splice(pei, 1);
  render();
  saveData();
}
