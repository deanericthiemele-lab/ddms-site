<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>PDA – Plan d'Actions</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f6f9; --surface: #ffffff; --border: #dde2ea; --border-hover: #b0bac8;
  --text-primary: #111; --text-secondary: #555; --text-muted: #999;
  --accent: #003366; --accent-light: #E6F1FB;
  --green: #2e7d32; --green-bg: #e8f5e9;
  --orange: #e65100; --orange-bg: #fff3e0;
  --red: #c62828; --red-bg: #ffebee;
  --blue: #185FA5; --blue-bg: #E6F1FB;
  --gray: #607d8b; --gray-bg: #eceff1;
  --radius: 10px;
}
body { font-family: 'DM Sans', Arial, sans-serif; background: var(--bg); min-height: 100vh; color: var(--text-primary); padding: 2rem 1rem; }
.page-wrap { max-width: 1200px; margin: 0 auto; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
.header-left { display: flex; align-items: center; gap: 14px; }
.header-icon { width: 40px; height: 40px; background: var(--accent-light); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
.header-title { font-size: 15px; font-weight: 600; color: #111; letter-spacing: .04em; }
.header-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.back-btn { font-size: 12px; font-weight: 600; color: var(--accent); text-decoration: none; padding: 6px 14px; border: 1px solid #b3c6de; border-radius: 20px; background: #fff; transition: background .15s; letter-spacing: .04em; }
.back-btn:hover { background: var(--accent-light); }
.error-banner { background: #ffebee; border: 1px solid #ffcdd2; color: #c62828; padding: 10px 14px; border-radius: 8px; font-size: 12px; margin-bottom: 1rem; display: none; }
.comite-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.comite-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); letter-spacing: .05em; text-transform: uppercase; }
.comite-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: #fff; color: var(--text-secondary); cursor: pointer; transition: all .15s; white-space: nowrap; }
.chip.active, .chip:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.chip-add { font-size: 18px; line-height: 1; padding: 3px 12px; border-radius: 20px; border: 1px dashed #b0bac8; background: transparent; color: var(--text-muted); cursor: pointer; transition: all .15s; }
.chip-add:hover { border-color: var(--accent); color: var(--accent); }
.toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 10px; flex-wrap: wrap; }
.toolbar-left { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.filter-select { font-family: 'DM Sans', Arial, sans-serif; font-size: 12px; font-weight: 500; padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); background: #fff; color: var(--text-primary); cursor: pointer; outline: none; }
.search-box { display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; }
.search-box input { font-family: 'DM Sans', Arial, sans-serif; font-size: 12px; border: none; outline: none; background: transparent; width: 160px; color: var(--text-primary); }
.btn-primary { font-family: 'DM Sans', Arial, sans-serif; font-size: 12px; font-weight: 600; padding: 7px 16px; border-radius: 8px; border: none; background: var(--accent); color: #fff; cursor: pointer; transition: opacity .15s; letter-spacing: .03em; display: flex; align-items: center; gap: 6px; }
.btn-primary:hover { opacity: .85; }
.btn-secondary { font-family: 'DM Sans', Arial, sans-serif; font-size: 12px; font-weight: 500; padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border); background: #fff; color: var(--text-primary); cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 6px; }
.btn-secondary:hover { border-color: var(--border-hover); background: #f7f9fb; }
.stats-strip { display: flex; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.stat-pill { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid transparent; }
.stat-pill .count { font-weight: 700; font-size: 13px; }
.sp-total { background: #f0f2f5; color: #444; border-color: #dde2ea; }
.sp-done  { background: var(--green-bg); color: var(--green); border-color: #c8e6c9; }
.sp-prog  { background: var(--blue-bg); color: var(--blue); border-color: #bbdefb; }
.sp-late  { background: var(--red-bg); color: var(--red); border-color: #ffcdd2; }
.sp-pend  { background: var(--gray-bg); color: var(--gray); border-color: #cfd8dc; }
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead { background: #f7f9fb; }
th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase; padding: 10px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
th:hover { color: var(--accent); }
tbody tr { border-bottom: 1px solid #f0f2f5; transition: background .1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #fafbfd; }
td { padding: 11px 14px; font-size: 13px; vertical-align: top; }
.td-action { max-width: 280px; }
.action-text { font-weight: 500; color: #111; line-height: 1.4; }
.action-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.date-cell { white-space: nowrap; font-size: 12px; }
.date-overdue { color: var(--red); font-weight: 600; }
.date-soon { color: var(--orange); font-weight: 600; }
.date-ok { color: var(--text-secondary); }
.porteur-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; padding: 3px 9px; border-radius: 20px; background: #f0f2f5; color: #444; white-space: nowrap; }
.porteur-avatar { width: 18px; height: 18px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
.status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; letter-spacing: .03em; }
.status-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; }
.s-done { background: var(--green-bg); color: var(--green); } .s-done::before { background: var(--green); }
.s-prog { background: var(--blue-bg); color: var(--blue); } .s-prog::before { background: var(--blue); }
.s-late { background: var(--red-bg); color: var(--red); } .s-late::before { background: var(--red); }
.s-pend { background: var(--gray-bg); color: var(--gray); } .s-pend::before { background: var(--gray); }
.s-blocked { background: var(--orange-bg); color: var(--orange); } .s-blocked::before { background: var(--orange); }
.comment-cell { font-size: 12px; color: var(--text-secondary); max-width: 200px; line-height: 1.4; }
.row-actions { display: flex; gap: 4px; }
tbody tr.row-important { background: var(--red-bg); }
tbody tr.row-important:hover { background: #ffe0e0; }
.important-check { width: 16px; height: 16px; cursor: pointer; accent-color: var(--red); }
.important-cell { text-align: center; }
.icon-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid transparent; background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; color: var(--text-muted); }
.icon-btn:hover { background: #f0f2f5; border-color: var(--border); color: #333; }
.icon-btn.del:hover { background: var(--red-bg); border-color: #ffcdd2; color: var(--red); }
.empty-row td { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 13px; }
.done-section { margin-top: 1.5rem; }
.done-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; margin-bottom: 10px; padding: 8px 14px; background: #eef0f3; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted); font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; transition: background .15s; }
.done-toggle:hover { background: #e5e8ec; }
.done-toggle .chevron { transition: transform .2s; display: inline-flex; }
.done-toggle.collapsed .chevron { transform: rotate(-90deg); }
.table-wrap-done { background: #eef0f3; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; opacity: .72; filter: grayscale(35%); transition: opacity .15s, filter .15s; }
.table-wrap-done:hover { opacity: .92; filter: grayscale(10%); }
.table-wrap-done.hidden { display: none; }
.table-wrap-done thead { background: #e6e9ed; }
.table-wrap-done tbody tr:hover { background: #e6e9ed; }
.table-wrap-done .action-text { color: #444; }
.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.35); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal { background: #fff; border-radius: 14px; padding: 1.75rem; width: 100%; max-width: 560px; box-shadow: 0 12px 40px rgba(0,0,0,.18); transform: translateY(10px); transition: transform .2s; max-height: 90vh; overflow-y: auto; }
.modal-backdrop.open .modal { transform: translateY(0); }
.modal-title { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-field { display: flex; flex-direction: column; gap: 5px; }
.form-field.full { grid-column: 1 / -1; }
.form-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: .05em; text-transform: uppercase; }
.form-input, .form-select, .form-textarea { font-family: 'DM Sans', Arial, sans-serif; font-size: 13px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); background: #fff; outline: none; transition: border-color .15s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 70px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; }
.btn-cancel { font-family: 'DM Sans', Arial, sans-serif; font-size: 12px; font-weight: 500; padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border); background: #fff; cursor: pointer; color: var(--text-primary); }
.btn-cancel:hover { background: #f7f9fb; }
.progress-wrap { margin-bottom: 1.25rem; }
.objectifs-strip { display: flex; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.objectif-card { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: var(--radius); padding: 12px 20px; min-width: 150px; }
.objectif-card .oc-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: .05em; text-transform: uppercase; }
.objectif-card .oc-value { font-size: 24px; font-weight: 700; color: var(--accent); line-height: 1.3; margin-top: 2px; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.progress-bar { height: 4px; background: #e4e8ef; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .4s; }
.page-footer { margin-top: 2rem; padding-top: 1.25rem; border-top: 1px solid var(--border); text-align: center; font-size: 11px; color: var(--text-muted); }
@keyframes spin { to { transform: rotate(360deg); } }
.sync-dot { width:8px; height:8px; border-radius:50%; background:var(--blue); display:inline-block; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
</style>
</head>
<body>
<div class="page-wrap">

  <div class="page-header">
    <div class="header-left">
      <div class="header-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      </div>
      <div>
        <div class="header-title">Plan d'Actions (PDA) – Comités</div>
        <div class="header-sub">Suivi des actions décidées en comité</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="syncIndicator" style="opacity:0;font-size:11px;color:#185FA5;display:flex;align-items:center;gap:5px;transition:opacity .3s;">
        <span class="sync-dot"></span> Sync…
      </span>
      <a class="back-btn" href="index.html">← Accueil</a>
    </div>
  </div>

  <div id="errorBanner" class="error-banner"></div>

  <div class="comite-bar">
    <span class="comite-label">Comité :</span>
    <div class="comite-chips" id="comiteChips"></div>
    <button class="chip-add" id="btnAddComite" title="Nouveau comité">+</button>
  </div>

  <div id="objectifsStrip" class="objectifs-strip"></div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressLabel">Avancement</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="stats-strip" id="statsStrip"></div>

  <div class="toolbar">
    <div class="toolbar-left">
      <div class="search-box">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Rechercher…">
      </div>
      <select class="filter-select" id="filterStatus">
        <option value="">Tous les statuts</option>
        <option value="En cours">En cours</option>
        <option value="Terminé">Terminé</option>
        <option value="En retard">En retard</option>
        <option value="En attente">En attente</option>
        <option value="Bloqué">Bloqué</option>
      </select>
      <select class="filter-select" id="filterPorteur">
        <option value="">Tous les porteurs</option>
      </select>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn-secondary" id="btnExport">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exporter
      </button>
      <button class="btn-primary" id="btnNewAction">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nouvelle action
      </button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-col="action">Action ↕</th>
          <th data-col="date">Date cible ↕</th>
          <th data-col="porteur">Porteur ↕</th>
          <th data-col="status">Statut ↕</th>
          <th>Commentaire</th>
          <th style="width:40px;" title="Important">⚑</th>
          <th style="width:72px;"></th>
        </tr>
      </thead>
      <tbody id="actionsTbody"></tbody>
    </table>
  </div>

  <div class="done-section" id="doneSection" style="display:none;">
    <div class="done-toggle" id="doneToggle">
      <span class="chevron">▾</span>
      <span id="doneToggleLabel">Actions terminées (0)</span>
    </div>
    <div class="table-wrap-done" id="doneTableWrap">
      <table>
        <thead>
          <tr>
            <th>Action</th>
            <th>Date cible</th>
            <th>Porteur</th>
            <th>Statut</th>
            <th>Commentaire</th>
            <th style="width:40px;" title="Important">⚑</th>
            <th style="width:72px;"></th>
          </tr>
        </thead>
        <tbody id="doneTbody"></tbody>
      </table>
    </div>
  </div>

  <div class="page-footer">Département Delivery et Management de Service</div>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span id="modalTitleText">Nouvelle action</span>
    </div>
    <div class="form-grid">
      <div class="form-field full">
        <label class="form-label">Action / Description *</label>
        <textarea class="form-textarea" id="fAction" placeholder="Décrire l'action à réaliser…" rows="3"></textarea>
      </div>
      <div class="form-field">
        <label class="form-label">Objectif / Livrable</label>
        <input class="form-input" id="fObjectif" type="text" placeholder="Résultat attendu">
      </div>
      <div class="form-field">
        <label class="form-label">Date de réalisation</label>
        <input class="form-input" id="fDate" type="date">
      </div>
      <div class="form-field">
        <label class="form-label">Porteur *</label>
        <select class="form-select" id="fPorteur">
          <option value="">— Sélectionner —</option>
          <option value="ASSEMIEN">ASSEMIEN</option>
          <option value="KARAMOKO">KARAMOKO</option>
          <option value="FREDDY">FREDDY</option>
          <option value="ANNICK">ANNICK</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-label">Statut</label>
        <select class="form-select" id="fStatus">
          <option value="En attente">En attente</option>
          <option value="En cours">En cours</option>
          <option value="Terminé">Terminé</option>
          <option value="En retard">En retard</option>
          <option value="Bloqué">Bloqué</option>
        </select>
      </div>
      <div class="form-field full">
        <label class="form-label">Commentaire</label>
        <textarea class="form-textarea" id="fComment" placeholder="Observations, points de blocage…" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" id="btnCancel">Annuler</button>
      <button class="btn-primary" id="btnSave">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ── FIREBASE INIT ──────────────────────────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyDHbiAC8mfdg2ToiqytMgPUxWGEYNYf5RU",
  authDomain: "ddms-architectures.firebaseapp.com",
  projectId: "ddms-architectures",
  storageBucket: "ddms-architectures.firebasestorage.app",
  messagingSenderId: "767552965189",
  appId: "1:767552965189:web:5b0c5ab6cd5bf97a5fb12c"
});
var db = firebase.firestore();

// ── STATE ──────────────────────────────────────────────────────────────────
var activeComite = '';
var actions = [];
var editingId = null;
var sortCol = 'date';
var sortAsc = true;
var unsubActions = null;

// ── HELPERS ────────────────────────────────────────────────────────────────
function setSyncing(on) {
  document.getElementById('syncIndicator').style.opacity = on ? '1' : '0';
}

function showError(msg) {
  var el = document.getElementById('errorBanner');
  el.innerHTML = '⚠️ ' + msg;
  el.style.display = 'block';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtDate(d) {
  if (!d) return '—';
  var dt = new Date(d);
  return dt.toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' });
}

function dateClass(d) {
  if (!d) return '';
  var dt = new Date(d), now = new Date(); now.setHours(0,0,0,0);
  var diff = (dt - now) / 86400000;
  return diff < 0 ? 'date-overdue' : diff <= 7 ? 'date-soon' : 'date-ok';
}

function statusClass(s) {
  var m = { 'Terminé':'s-done','En cours':'s-prog','En retard':'s-late','En attente':'s-pend','Bloqué':'s-blocked' };
  return m[s] || 's-pend';
}

function initials(name) {
  return String(name).trim().split(/\s+/).map(function(w){ return w[0]; }).join('').toUpperCase().slice(0,2);
}

// ── COMITÉS ────────────────────────────────────────────────────────────────
var COMITE_LABELS = {
  'Comité de crise':'QoS et Perf',
  'Comité mensuel':'Production',
  'Comité trimestriel':'ASM'
};

var OBJECTIFS = {
  'Production': [
    { label: 'DMR', value: '40 jours' },
    { label: 'Volume', value: '65/Mois' }
  ],
  'QoS et Perf': [
    { label: 'Taux de disponibilité', value: '99%' },
    { label: 'IR', value: '10%' }
  ],
  'ASM': [
    { label: 'Satisfaction Client', value: '9/10' },
    { label: 'Opportunité', value: '1' },
    { label: 'Comex', value: '100%' }
  ]
};

function labelFor(name) {
  return COMITE_LABELS[name] || name;
}

function renderObjectifs(activeName) {
  var strip = document.getElementById('objectifsStrip');
  var objs = OBJECTIFS[labelFor(activeName)];
  if (!objs) { strip.innerHTML = ''; return; }
  strip.innerHTML = objs.map(function(o) {
    return '<div class="objectif-card"><div class="oc-label">'+esc(o.label)+'</div><div class="oc-value">'+esc(o.value)+'</div></div>';
  }).join('');
}

function loadComites() {
  setSyncing(true);
  db.collection('pda_comites').get().then(function(snap) {
    var names = snap.docs.map(function(d){ return d.data().name; })
      .filter(function(n){ return n !== 'Comité hebdo'; })
      .sort();
    if (names.indexOf('Annick') === -1) {
      db.collection('pda_comites').add({ name: 'Annick' }).then(function() {
        loadComites();
      });
      return;
    }
    if (names.length === 0) {
      renderComites([]);
      activeComite = '';
      subscribeActions();
      setSyncing(false);
    } else {
      var preferred = names.filter(function(n){ return labelFor(n) === 'QoS et Perf'; })[0];
      activeComite = preferred || names[0];
      renderComites(names);
      subscribeActions();
      setSyncing(false);
    }
  }).catch(function(e) {
    showError('Erreur Firebase : ' + e.message + ' — Vérifiez les règles Firestore.');
    setSyncing(false);
    renderComites([]);
    activeComite = '';
  });
}

function renderComites(names) {
  var container = document.getElementById('comiteChips');
  container.innerHTML = '';
  names.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'chip' + (c === activeComite ? ' active' : '');
    btn.textContent = labelFor(c);
    btn.onclick = function() {
      activeComite = c;
      renderComites(names);
      subscribeActions();
    };
    btn.oncontextmenu = function(e) {
      e.preventDefault();
      if (confirm('Supprimer le comité « ' + c + ' » et toutes ses actions ?')) {
        deleteComite(c, names);
      }
    };
    container.appendChild(btn);
  });
  renderObjectifs(activeComite);
}

function deleteComite(name, names) {
  db.collection('pda_comites').where('name','==',name).get().then(function(snap) {
    snap.docs.forEach(function(d){ d.ref.delete(); });
  });
  db.collection('pda_actions').where('comite','==',name).get().then(function(snap) {
    snap.docs.forEach(function(d){ d.ref.delete(); });
  });
  var newNames = names.filter(function(n){ return n !== name; });
  activeComite = newNames[0] || '';
  renderComites(newNames);
  subscribeActions();
}

document.getElementById('btnAddComite').onclick = function() {
  var name = prompt('Nom du nouveau comité :');
  if (!name || !name.trim()) return;
  db.collection('pda_comites').add({ name: name.trim() }).then(function() {
    loadComites();
  }).catch(function(e) {
    showError('Erreur ajout comité : ' + e.message);
  });
};

// ── ACTIONS ────────────────────────────────────────────────────────────────
function subscribeActions() {
  if (unsubActions) unsubActions();
  if (!activeComite) { actions = []; renderTable(); renderStats([]); return; }
  setSyncing(true);
  unsubActions = db.collection('pda_actions')
    .where('comite','==', activeComite)
    .onSnapshot(function(snap) {
      actions = snap.docs.map(function(d){ return Object.assign({ _id: d.id }, d.data()); });
      setSyncing(false);
      renderTable();
      renderStats(actions);
    }, function(e) {
      showError('Erreur lecture : ' + e.message);
      setSyncing(false);
    });
}

// ── STATS ──────────────────────────────────────────────────────────────────
function renderStats(all) {
  var done=0, prog=0, late=0, pend=0;
  all.forEach(function(a) {
    if (a.status==='Terminé') done++;
    else if (a.status==='En cours') prog++;
    else if (a.status==='En retard') late++;
    else pend++;
  });
  var pct = all.length ? Math.round(done/all.length*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressLabel').textContent = 'Avancement – ' + (activeComite || '');
  document.getElementById('statsStrip').innerHTML =
    '<div class="stat-pill sp-total"><span class="count">'+all.length+'</span> Total</div>' +
    '<div class="stat-pill sp-done"><span class="count">'+done+'</span> Terminé</div>' +
    '<div class="stat-pill sp-prog"><span class="count">'+prog+'</span> En cours</div>' +
    '<div class="stat-pill sp-late"><span class="count">'+late+'</span> En retard</div>' +
    '<div class="stat-pill sp-pend"><span class="count">'+pend+'</span> En attente</div>';

  // Porteurs
  var porteurs = [];
  all.forEach(function(a){ if (a.porteur && porteurs.indexOf(a.porteur)===-1) porteurs.push(a.porteur); });
  porteurs.sort();
  var sel = document.getElementById('filterPorteur');
  var prev = sel.value;
  sel.innerHTML = '<option value="">Tous les porteurs</option>';
  porteurs.forEach(function(p) {
    var o = document.createElement('option');
    o.value = p; o.textContent = p;
    if (p === prev) o.selected = true;
    sel.appendChild(o);
  });
}

// ── TABLE ──────────────────────────────────────────────────────────────────
function renderTable() {
  var search = document.getElementById('searchInput').value.toLowerCase();
  var fStatus = document.getElementById('filterStatus').value;
  var fPorteur = document.getElementById('filterPorteur').value;

  var rows = actions.filter(function(a) {
    var ms = !search || (a.action||'').toLowerCase().indexOf(search)!==-1 || (a.porteur||'').toLowerCase().indexOf(search)!==-1;
    return ms && (!fStatus || a.status===fStatus) && (!fPorteur || a.porteur===fPorteur);
  });

  rows.sort(function(a,b) {
    var va = a[sortCol]||'', vb = b[sortCol]||'';
    if (sortCol==='date'){ va=va||'9999'; vb=vb||'9999'; }
    var c = va<vb?-1:va>vb?1:0;
    return sortAsc?c:-c;
  });

  var activeRows = rows.filter(function(a){ return a.status !== 'Terminé'; });
  var doneRows   = rows.filter(function(a){ return a.status === 'Terminé'; });

  var tbody = document.getElementById('actionsTbody');
  if (!activeRows.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="7">Aucune action.<br>Cliquez sur <strong>+ Nouvelle action</strong> pour commencer.</td></tr>';
  } else {
    tbody.innerHTML = activeRows.map(rowHtml).join('');
  }

  var doneSection = document.getElementById('doneSection');
  var doneTbody = document.getElementById('doneTbody');
  var doneLabel = document.getElementById('doneToggleLabel');
  if (!doneRows.length) {
    doneSection.style.display = 'none';
  } else {
    doneSection.style.display = '';
    doneLabel.textContent = 'Actions terminées (' + doneRows.length + ')';
    doneTbody.innerHTML = doneRows.map(rowHtml).join('');
  }
}

function rowHtml(a) {
  return '<tr class="'+(a.important?'row-important':'')+'">' +
    '<td class="td-action"><div class="action-text">'+esc(a.action)+'</div>'+(a.objectif?'<div class="action-meta">🎯 '+esc(a.objectif)+'</div>':'')+'</td>' +
    '<td class="date-cell '+dateClass(a.date)+'">'+fmtDate(a.date)+'</td>' +
    '<td>'+(a.porteur?'<span class="porteur-badge"><span class="porteur-avatar">'+esc(initials(a.porteur))+'</span>'+esc(a.porteur)+'</span>':'<span style="color:#ccc">—</span>')+'</td>' +
    '<td><span class="status-badge '+statusClass(a.status)+'">'+esc(a.status)+'</span></td>' +
    '<td class="comment-cell">'+(a.comment?esc(a.comment):'<span style="color:#ccc">—</span>')+'</td>' +
    '<td class="important-cell"><input type="checkbox" class="important-check" title="Marquer comme important" '+(a.important?'checked':'')+' onchange="toggleImportant(\''+a._id+'\', this.checked)"></td>' +
    '<td><div class="row-actions">' +
      '<button class="icon-btn" onclick="openEdit(\''+a._id+'\')" title="Modifier"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' +
      '<button class="icon-btn del" onclick="deleteAction(\''+a._id+'\')" title="Supprimer"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></button>' +
    '</div></td>' +
  '</tr>';
}

// ── DONE SECTION TOGGLE ───────────────────────────────────────────────────
document.getElementById('doneToggle').addEventListener('click', function() {
  this.classList.toggle('collapsed');
  document.getElementById('doneTableWrap').classList.toggle('hidden');
});

// ── SORT ───────────────────────────────────────────────────────────────────
document.querySelectorAll('th[data-col]').forEach(function(th) {
  th.addEventListener('click', function() {
    var col = this.dataset.col;
    if (sortCol===col) sortAsc=!sortAsc; else { sortCol=col; sortAsc=true; }
    renderTable();
  });
});

// ── MODAL ──────────────────────────────────────────────────────────────────
function openModal(title) {
  document.getElementById('modalTitleText').textContent = title;
  document.getElementById('modalBackdrop').classList.add('open');
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
  editingId = null;
  document.getElementById('fAction').value = '';
  document.getElementById('fObjectif').value = '';
  document.getElementById('fDate').value = '';
  document.getElementById('fPorteur').value = '';
  document.getElementById('fStatus').value = 'En attente';
  document.getElementById('fComment').value = '';
}

document.getElementById('btnNewAction').onclick = function() {
  editingId = null;
  openModal('Nouvelle action');
};

document.getElementById('btnCancel').onclick = closeModal;

document.getElementById('modalBackdrop').onclick = function(e) {
  if (e.target === this) closeModal();
};

function openEdit(id) {
  var a = null;
  for (var i=0; i<actions.length; i++) { if (actions[i]._id===id) { a=actions[i]; break; } }
  if (!a) return;
  editingId = id;
  document.getElementById('fAction').value   = a.action   || '';
  document.getElementById('fObjectif').value = a.objectif || '';
  document.getElementById('fDate').value     = a.date     || '';
  document.getElementById('fPorteur').value  = a.porteur  || '';
  document.getElementById('fStatus').value   = a.status   || 'En attente';
  document.getElementById('fComment').value  = a.comment  || '';
  openModal('Modifier l\'action');
}

function deleteAction(id) {
  if (!confirm('Supprimer cette action ?')) return;
  setSyncing(true);
  db.collection('pda_actions').doc(id).delete().then(function() {
    setSyncing(false);
  }).catch(function(e) {
    showError('Erreur suppression : ' + e.message);
    setSyncing(false);
  });
}

function toggleImportant(id, checked) {
  setSyncing(true);
  db.collection('pda_actions').doc(id).update({ important: checked }).then(function() {
    setSyncing(false);
  }).catch(function(e) {
    showError('Erreur mise à jour : ' + e.message);
    setSyncing(false);
  });
}

document.getElementById('btnSave').onclick = function() {
  var action  = document.getElementById('fAction').value.trim();
  var porteur = document.getElementById('fPorteur').value.trim();
  if (!action) { alert('Le champ Action est requis.'); return; }

  var data = {
    action:   action,
    objectif: document.getElementById('fObjectif').value.trim(),
    date:     document.getElementById('fDate').value,
    porteur:  porteur,
    status:   document.getElementById('fStatus').value,
    comment:  document.getElementById('fComment').value.trim()
  };

  setSyncing(true);
  var promise;
  if (editingId) {
    promise = db.collection('pda_actions').doc(editingId).update(data);
  } else {
    data.comite = activeComite;
    data.createdAt = Date.now();
    promise = db.collection('pda_actions').add(data);
  }

  promise.then(function() {
    setSyncing(false);
    closeModal();
  }).catch(function(e) {
    setSyncing(false);
    showError('Erreur enregistrement : ' + e.message);
  });
};

// ── SEARCH / FILTER ────────────────────────────────────────────────────────
document.getElementById('searchInput').oninput = renderTable;
document.getElementById('filterStatus').onchange = renderTable;
document.getElementById('filterPorteur').onchange = renderTable;

// ── EXPORT ─────────────────────────────────────────────────────────────────
document.getElementById('btnExport').onclick = function() {
  if (!actions.length) { alert('Aucune donnée à exporter.'); return; }
  var rows = actions.map(function(a) {
    return { 'Comité':a.comite,'Action':a.action,'Objectif':a.objectif,'Date':a.date,'Porteur':a.porteur,'Statut':a.status,'Commentaire':a.comment,'Important':a.important?'Oui':'Non' };
  });
  var ws = XLSX.utils.json_to_sheet(rows);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'PDA');
  XLSX.writeFile(wb, 'PDA_' + activeComite.replace(/\s+/g,'_') + '_' + new Date().toISOString().slice(0,10) + '.xlsx');
};

// ── INIT ───────────────────────────────────────────────────────────────────
loadComites();
</script>

</html>
