<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projets — DDMS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHbiAC8mfdg2ToiqytMgPUxWGEYNYf5RU",
  authDomain: "ddms-architectures.firebaseapp.com",
  projectId: "ddms-architectures",
  storageBucket: "ddms-architectures.firebasestorage.app",
  messagingSenderId: "767552965189",
  appId: "1:767552965189:web:5b0c5ab6cd5bf97a5fb12c"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const storage = getStorage(app);
const COL = 'projets';

let projets = [];
let currentProjetId = null;
let editTacheIdx = null;

const SC = {
  'En cours': { bg:'rgba(37,99,235,.1)',  text:'#2563eb', border:'rgba(37,99,235,.2)' },
  'Planifié': { bg:'rgba(124,58,237,.1)', text:'#7c3aed', border:'rgba(124,58,237,.2)' },
  'Terminé':  { bg:'rgba(22,163,74,.1)',  text:'#16a34a', border:'rgba(22,163,74,.2)'  },
  'En pause': { bg:'rgba(217,119,6,.1)',  text:'#d97706', border:'rgba(217,119,6,.2)'  },
  'Annulé':   { bg:'rgba(220,38,38,.1)',  text:'#dc2626', border:'rgba(220,38,38,.2)'  },
};
const PC = { 'Haute':'#dc2626','Moyenne':'#d97706','Faible':'#16a34a' };
const COLS = ['#2563eb','#7c3aed','#16a34a','#d97706','#dc2626','#db2777','#0891b2','#65a30d'];

const col  = p => COLS[projets.indexOf(p) >= 0 ? projets.indexOf(p) % COLS.length : 0];
const proj = () => projets.find(p => p.id === currentProjetId);

function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='error'?'#dc2626':type==='success'?'#16a34a':'#2563eb';
  el.style.opacity='1'; el.style.transform='translateY(0)';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(10px)'; },2800);
}

async function fsAll()  { const s=await getDocs(collection(db,COL)); return s.docs.map(d=>({id:d.id,...d.data()})); }
async function fsSave(p){ const{id,...data}=p; await setDoc(doc(db,COL,id),data); }
async function fsDel(id){ await deleteDoc(doc(db,COL,id)); }

async function init() {
  document.getElementById('loading-overlay').style.display='flex';
  try { projets = await fsAll(); projets.sort((a,b)=>(a.nom||'').localeCompare(b.nom||'')); }
  catch(e){ toast('Erreur : '+e.message,'error'); }
  document.getElementById('loading-overlay').style.display='none';
  renderSidebar();
}

// ── SIDEBAR ──
function renderSidebar() {
  const q = document.getElementById('search-proj').value.toLowerCase();
  const list = document.getElementById('proj-list');
  list.innerHTML = '';
  projets.filter(p=>(p.nom||'').toLowerCase().includes(q)).forEach(p => {
    const c = col(p), sc = SC[p.statut]||SC['En cours'];
    const initials = (p.nom||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    const pct = progPct(p);
    const div = document.createElement('div');
    div.className = 'proj-item'+(p.id===currentProjetId?' active':'');
    div.onclick = ()=>selectProjet(p.id);
    div.innerHTML = `
      <div class="proj-av" style="background:${c}18;color:${c}">${initials}</div>
      <div class="proj-info">
        <div class="proj-name">${p.nom||'Sans nom'}</div>
        <div class="proj-meta">${p.chefProjet||''}</div>
        <div class="prog-mini-wrap"><div class="prog-mini" style="width:${pct}%;background:${c}"></div></div>
      </div>
      <div class="s-dot" style="background:${sc.text}"></div>`;
    list.appendChild(div);
  });
  document.getElementById('sidebar-count').textContent=`${projets.length} projet${projets.length>1?'s':''}`;
}
window.filterProjets=()=>renderSidebar();

function progPct(p) {
  const t=p.taches||[]; if(!t.length) return 0;
  return Math.round(t.filter(x=>x.statut==='Terminé').length/t.length*100);
}

// ── SELECT ──
function selectProjet(id) {
  currentProjetId=id; renderSidebar();
  const p=proj(); if(!p) return;
  document.getElementById('no-projet').style.display='none';
  document.getElementById('projet-view').style.display='flex';
  renderProjet();
}

function renderProjet() {
  const p=proj(); if(!p) return;
  const c=col(p), sc=SC[p.statut]||SC['En cours'], pct=progPct(p);
  const taches=p.taches||[];
  const initials=(p.nom||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();

  document.getElementById('v-av').style.cssText=`background:${c}18;color:${c}`;
  document.getElementById('v-av').textContent=initials;
  document.getElementById('v-nom').textContent=p.nom||'';
  document.getElementById('v-chef').textContent=p.chefProjet?'👤 '+p.chefProjet:'';
  const b=document.getElementById('v-statut');
  b.textContent=p.statut||'En cours';
  b.style.cssText=`background:${sc.bg};color:${sc.text};border:1px solid ${sc.border};padding:3px 12px;border-radius:20px;font-size:11px;font-family:'DM Mono',monospace;font-weight:600;`;

  // FICHE SIMPLIFIÉE
  const parts = [];
  if (p.dateDebut||p.dateFin) parts.push(`<div class="meta-row"><span class="meta-label">📅 Période</span><span class="meta-val">${p.dateDebut?formatDate(p.dateDebut):'?'} → ${p.dateFin?formatDate(p.dateFin):'?'}</span></div>`);
  if (p.priorite)  parts.push(`<div class="meta-row"><span class="meta-label">⚡ Priorité</span><span class="meta-val" style="color:${PC[p.priorite]||'var(--text2)'};font-weight:600">${p.priorite}</span></div>`);
  if (p.budget)    parts.push(`<div class="meta-row"><span class="meta-label">💰 Budget</span><span class="meta-val">${p.budget}</span></div>`);
  if (p.membres&&p.membres.length) parts.push(`<div class="meta-row"><span class="meta-label">👥 Équipe</span><span class="meta-val">${p.membres.join(', ')}</span></div>`);

  let ficheHtml = parts.length ? `<div class="fiche-box">${parts.join('')}</div>` : '';



  document.getElementById('v-fiche').innerHTML = ficheHtml;

  // PROGRESS
  const done=taches.filter(t=>t.statut==='Terminé').length;
  document.getElementById('v-prog').innerHTML = taches.length ? `
    <div class="prog-row">
      <span style="font-size:13px;font-weight:600;color:var(--text2)">Avancement</span>
      <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:${c}">${pct}%</span>
      <span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${done}/${taches.length} tâches</span>
    </div>
    <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%;background:${c}"></div></div>` : '';

  renderTaches();
}

function renderTaches() {
  const p=proj(); if(!p) return;
  const taches=p.taches||[];
  const el=document.getElementById('taches-list');
  if(!taches.length){ el.innerHTML=emptyState('Aucune tâche — cliquez "+ Ajouter une tâche"'); return; }

  const groups={'À faire':[],'En cours':[],'Bloqué':[],'Terminé':[]};
  taches.forEach((t,i)=>{ (groups[t.statut]||groups['À faire']).push({...t,_i:i}); });
  const gcol={'À faire':'var(--text3)','En cours':'var(--accent)','Bloqué':'var(--red)','Terminé':'var(--green)'};
  const gicon={'À faire':'○','En cours':'◑','Bloqué':'✕','Terminé':'●'};

  let html=`<div class="t-table-wrap">
    <table class="t-table">
      <thead><tr>
        <th style="width:32px"></th>
        <th>Nom de la tâche</th>
        <th class="hide-mobile">Objectif</th>
        <th class="hide-mobile col-volume">Volume</th>
        <th class="hide-mobile col-volume">Réalisé</th>
        <th class="hide-mobile col-volume">Reste à faire</th>
        <th class="hide-mobile">Porteur</th>
        <th>Début</th>
        <th>Fin</th>
        <th>Statut</th>
        <th class="hide-mobile">Commentaire</th>
        <th class="hide-mobile col-pj">Pièces jointes</th>
        <th style="width:64px"></th>
      </tr></thead>
      <tbody>`;

  Object.entries(groups).forEach(([grp,items])=>{
    if(!items.length) return;
    html+=`<tr class="t-group-row"><td colspan="13" style="color:${gcol[grp]};font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;padding:10px 12px 5px">${gicon[grp]} ${grp} <span style="opacity:.5">(${items.length})</span></td></tr>`;
    items.forEach(t=>{
      const i=t._i;
      const sc=gcol[t.statut]||'var(--text3)';
      html+=`<tr class="t-row ${t.statut==='Terminé'?'t-row-done':''}">
        <td class="t-cell-chk"><div class="t-chk ${t.statut==='Terminé'?'checked':''}" onclick="toggleTache(${i})"></div></td>
        <td class="t-cell-nom"><span class="${t.statut==='Terminé'?'struck':''}">${t.titre}</span></td>
        <td class="t-cell-obj hide-mobile">${t.objectif||'—'}</td>
        <td class="t-cell-vol hide-mobile">${t.volume!==undefined&&t.volume!==''?t.volume:'—'}</td>
        <td class="t-cell-vol hide-mobile">${t.realise!==undefined&&t.realise!==''?t.realise:'—'}</td>
        <td class="t-cell-vol hide-mobile t-cell-reste">${(t.volume!==undefined&&t.volume!==''&&t.realise!==undefined&&t.realise!=='')?Math.max(0,Number(t.volume)-Number(t.realise)):'—'}</td>
        <td class="t-cell-obj hide-mobile">${t.porteur||'—'}</td>
        <td class="t-cell-date">${t.dateDebut?formatDate(t.dateDebut):'—'}</td>
        <td class="t-cell-date">${t.dateFin?formatDate(t.dateFin):'—'}</td>
        <td class="t-cell-statut"><span class="t-statut-badge" style="color:${sc};background:${sc}14;border:1px solid ${sc}33">${t.statut}</span></td>
        <td class="t-cell-comment hide-mobile">${t.description||'—'}</td>
        <td class="t-cell-pj hide-mobile">
          <div class="pj-wrap">
            ${(t.fichiers||[]).map((f,fi)=>`<a class="pj-chip" href="${f.url}" target="_blank" title="${f.nom}"><span class="pj-icon">${pjIcon(f.nom)}</span><span class="pj-name">${f.nom.length>16?f.nom.substring(0,14)+'…':f.nom}</span><button class="pj-del" onclick="deleteFichier(event,${i},${fi})" title="Supprimer">✕</button></a>`).join('')}
            <label class="pj-add" title="Ajouter un fichier"><input type="file" style="display:none" multiple onchange="uploadFichiers(event,${i})">＋</label>
          </div>
        </td>
        <td class="t-cell-actions">
          <button class="btn-icon" onclick="editTache(${i})" title="Modifier">✏️</button>
          <button class="btn-icon del" onclick="deleteTache(${i})" title="Supprimer">✕</button>
        </td>
      </tr>`;
    });
  });

  html+=`</tbody></table></div>`;
  el.innerHTML=html;
}

window.toggleTache=async function(i){
  const p=proj(); if(!p) return;
  const t=p.taches[i];
  t.statut=t.statut==='Terminé'?'À faire':'Terminé';
  try{ await fsSave(p); renderProjet(); toast(t.statut==='Terminé'?'Tâche terminée ✓':'Tâche réouverte','success'); }
  catch(e){ toast('Erreur : '+e.message,'error'); }
};

window.editTache=function(i){
  const p=proj(); const t=p.taches[i]; editTacheIdx=i;
  document.getElementById('t-titre').value=t.titre||'';
  document.getElementById('t-objectif').value=t.objectif||'';
  document.getElementById('t-volume').value=t.volume||'';
  document.getElementById('t-realise').value=t.realise||'';
  document.getElementById('t-porteur').value=t.porteur||'';
  document.getElementById('t-dateDebut').value=t.dateDebut||'';
  document.getElementById('t-dateFin').value=t.dateFin||'';
  document.getElementById('t-statut').value=t.statut||'À faire';
  document.getElementById('t-desc').value=t.description||'';
  document.getElementById('tache-modal-title').innerHTML='Modifier la tâche <button class="modal-close" onclick="closeModal(\'modal-tache\')">✕</button>';
  document.getElementById('modal-tache').style.display='flex';
};

window.openAddTache=function(){
  editTacheIdx=null;
  ['t-titre','t-objectif','t-volume','t-realise','t-porteur','t-dateDebut','t-dateFin','t-desc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('t-statut').value='À faire';
  document.getElementById('tache-modal-title').innerHTML='Nouvelle tâche <button class="modal-close" onclick="closeModal(\'modal-tache\')">✕</button>';
  document.getElementById('modal-tache').style.display='flex';
};

window.saveTache=async function(){
  const p=proj(); if(!p) return;
  const titre=document.getElementById('t-titre').value.trim(); if(!titre) return;
  const obj={
    titre,
    objectif: document.getElementById('t-objectif').value,
    volume:   document.getElementById('t-volume').value,
    realise:  document.getElementById('t-realise').value,
    porteur:  document.getElementById('t-porteur').value,
    dateDebut: document.getElementById('t-dateDebut').value,
    dateFin:   document.getElementById('t-dateFin').value,
    statut:   document.getElementById('t-statut').value,
    description: document.getElementById('t-desc').value
  };
  if(!p.taches) p.taches=[];
  if(editTacheIdx!==null) p.taches[editTacheIdx]=obj; else p.taches.push(obj);
  try{ toast('Enregistrement…'); await fsSave(p); closeModal('modal-tache'); renderProjet(); toast('Tâche enregistrée ✓','success'); }
  catch(e){ toast('Erreur : '+e.message,'error'); }
};

window.deleteTache=async function(i){
  if(!confirm('Supprimer cette tâche ?')) return;
  const p=proj(); if(!p) return;
  p.taches.splice(i,1);
  try{ await fsSave(p); renderProjet(); renderSidebar(); toast('Supprimée','success'); }
  catch(e){ toast('Erreur : '+e.message,'error'); }
};

window.openAddProjet=function(){
  document.getElementById('proj-modal-title').innerHTML='Nouveau projet <button class="modal-close" onclick="closeModal(\'modal-projet\')">✕</button>';
  document.getElementById('proj-modal-btn').textContent='Créer';
  ['p-nom','p-chef','p-budget','p-dateDebut','p-dateFin','p-problematique','p-objectifs','p-description','p-membres'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('p-statut').value='En cours';
  document.getElementById('p-priorite').value='Moyenne';
  document.getElementById('p-edit-id').value='';
  document.getElementById('modal-projet').style.display='flex';
};

window.openEditProjet=function(){
  const p=proj(); if(!p) return;
  document.getElementById('proj-modal-title').innerHTML='Modifier le projet <button class="modal-close" onclick="closeModal(\'modal-projet\')">✕</button>';
  document.getElementById('proj-modal-btn').textContent='Enregistrer';
  document.getElementById('p-nom').value=p.nom||'';
  document.getElementById('p-chef').value=p.chefProjet||'';
  document.getElementById('p-budget').value=p.budget||'';
  document.getElementById('p-dateDebut').value=p.dateDebut||'';
  document.getElementById('p-dateFin').value=p.dateFin||'';
  document.getElementById('p-problematique').value=p.problematique||'';
  document.getElementById('p-objectifs').value=p.objectifs||'';
  document.getElementById('p-description').value=p.description||'';
  document.getElementById('p-membres').value=(p.membres||[]).join(', ');
  document.getElementById('p-statut').value=p.statut||'En cours';
  document.getElementById('p-priorite').value=p.priorite||'Moyenne';
  document.getElementById('p-edit-id').value=p.id;
  document.getElementById('modal-projet').style.display='flex';
};

window.saveProjet=async function(){
  const nom=document.getElementById('p-nom').value.trim(); if(!nom) return;
  const editId=document.getElementById('p-edit-id').value;
  const membres=document.getElementById('p-membres').value.split(',').map(m=>m.trim()).filter(Boolean);
  const fields={nom,chefProjet:document.getElementById('p-chef').value,budget:document.getElementById('p-budget').value,dateDebut:document.getElementById('p-dateDebut').value,dateFin:document.getElementById('p-dateFin').value,problematique:document.getElementById('p-problematique').value,objectifs:document.getElementById('p-objectifs').value,description:document.getElementById('p-description').value,membres,statut:document.getElementById('p-statut').value,priorite:document.getElementById('p-priorite').value};
  if(editId){
    const p=projets.find(x=>x.id===editId); if(!p) return;
    Object.assign(p,fields);
    try{ toast('Enregistrement…'); await fsSave(p); closeModal('modal-projet'); renderSidebar(); renderProjet(); toast('Projet mis à jour ✓','success'); }
    catch(e){ toast('Erreur : '+e.message,'error'); }
  } else {
    const p={id:Date.now().toString(),...fields,taches:[]};
    try{ toast('Enregistrement…'); await fsSave(p); projets.push(p); projets.sort((a,b)=>(a.nom||'').localeCompare(b.nom||'')); closeModal('modal-projet'); renderSidebar(); selectProjet(p.id); toast('Projet créé ✓','success'); }
    catch(e){ toast('Erreur : '+e.message,'error'); }
  }
};

window.deleteProjet=async function(){
  const p=proj(); if(!p) return;
  if(!confirm(`Supprimer "${p.nom}" ?`)) return;
  try{
    await fsDel(p.id); projets=projets.filter(x=>x.id!==p.id); currentProjetId=null;
    document.getElementById('projet-view').style.display='none';
    document.getElementById('no-projet').style.display='flex';
    renderSidebar(); toast('Projet supprimé','success');
  } catch(e){ toast('Erreur : '+e.message,'error'); }
};

window.openModal=id=>document.getElementById(id).style.display='flex';
window.closeModal=id=>document.getElementById(id).style.display='none';
window.closeModalOutside=(e,id)=>{ if(e.target.id===id) window.closeModal(id); };

function emptyState(msg){ return `<div class="empty-state"><p>${msg}</p></div>`; }
function formatDate(s){
  if(!s) return '';
  try{ return new Date(s+'T00:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); }
  catch(e){ return s; }
}

function pjIcon(nom){
  const ext=(nom.split('.').pop()||'').toLowerCase();
  if(['xlsx','xls','csv'].includes(ext)) return '📊';
  if(['pdf'].includes(ext)) return '📄';
  if(['ppt','pptx'].includes(ext)) return '📑';
  if(['doc','docx'].includes(ext)) return '📝';
  if(['png','jpg','jpeg','gif','webp'].includes(ext)) return '🖼️';
  if(['zip','rar','7z'].includes(ext)) return '🗜️';
  return '📎';
}

window.uploadFichiers=async function(e,i){
  const p=proj(); if(!p) return;
  const files=Array.from(e.target.files); if(!files.length) return;
  if(!p.taches[i].fichiers) p.taches[i].fichiers=[];
  toast('Upload en cours…');
  try{
    for(const file of files){
      const path=`projets/${p.id}/taches/${i}/${Date.now()}_${file.name}`;
      const storageRef=ref(storage,path);
      await uploadBytes(storageRef,file);
      const url=await getDownloadURL(storageRef);
      p.taches[i].fichiers.push({nom:file.name,url,path});
    }
    await fsSave(p);
    renderTaches();
    toast(`${files.length} fichier(s) ajouté(s) ✓`,'success');
  }catch(err){ toast('Erreur upload : '+err.message,'error'); }
  e.target.value='';
};

window.deleteFichier=async function(e,i,fi){
  e.preventDefault(); e.stopPropagation();
  const p=proj(); if(!p) return;
  if(!confirm('Supprimer ce fichier ?')) return;
  const f=p.taches[i].fichiers[fi];
  try{
    if(f.path){ try{ await deleteObject(ref(storage,f.path)); }catch(_){} }
    p.taches[i].fichiers.splice(fi,1);
    await fsSave(p);
    renderTaches();
    toast('Fichier supprimé','success');
  }catch(err){ toast('Erreur : '+err.message,'error'); }
};

init();

// Calcul temps réel "Reste à faire" dans la modal
document.addEventListener('input', function(e){
  if(e.target.id==='t-volume'||e.target.id==='t-realise'){
    const v=parseFloat(document.getElementById('t-volume').value);
    const r=parseFloat(document.getElementById('t-realise').value);
    const el=document.getElementById('t-reste-display');
    if(!isNaN(v)&&!isNaN(r)){
      const reste=Math.max(0,v-r);
      el.textContent=reste;
      el.style.color=reste===0?'var(--green)':reste<v/2?'var(--orange)':'var(--accent)';
    } else { el.textContent='—'; el.style.color='var(--accent)'; }
  }
});
</script>

<style>
  :root{
    --bg:#f5f6fa;--surface:#fff;--surface2:#f0f2f7;
    --border:#e2e6ef;--accent:#2563eb;--accent2:#7c3aed;
    --green:#16a34a;--orange:#d97706;--red:#dc2626;
    --text:#1a1d27;--text2:#4b5368;--text3:#9ba3b8;
    --sw:260px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:12px;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;}

  #loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);}
  #toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:10px;color:#fff;font-family:'DM Mono',monospace;font-size:13px;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;z-index:9998;pointer-events:none;}

  /* ── SIDEBAR ── */
  #sidebar{width:var(--sw);min-width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  .sh{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
  .sh-home{display:flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:14px;}
  .sh-back{width:26px;height:26px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
  .sh-back:hover{background:var(--border);}
  .sh-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:var(--accent);letter-spacing:.07em;text-transform:uppercase;}
  .sh-brand span{color:var(--text2);font-weight:400;}
  .search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;margin-bottom:10px;}
  .search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;width:100%;}
  .search-box input::placeholder{color:var(--text3);}
  .btn-new{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;padding:8px;cursor:pointer;transition:opacity .2s;}
  .btn-new:hover{opacity:.85;}
  .proj-list{flex:1;overflow-y:auto;padding:8px;}
  .proj-list::-webkit-scrollbar{width:4px;}
  .proj-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .proj-item{display:flex;align-items:flex-start;gap:9px;padding:9px 10px;border-radius:9px;cursor:pointer;transition:background .15s;margin-bottom:2px;position:relative;}
  .proj-item:hover{background:var(--surface2);}
  .proj-item.active{background:rgba(37,99,235,.08);}
  .proj-item.active::before{content:'';position:absolute;left:0;top:15%;bottom:15%;width:3px;background:var(--accent);border-radius:0 3px 3px 0;}
  .proj-av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px;flex-shrink:0;margin-top:1px;}
  .proj-info{flex:1;min-width:0;}
  .proj-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .proj-item.active .proj-name{color:var(--accent);}
  .proj-meta{font-size:11px;color:var(--text3);margin-top:1px;}
  .prog-mini-wrap{height:3px;background:var(--surface2);border-radius:3px;margin-top:6px;overflow:hidden;}
  .prog-mini{height:100%;border-radius:3px;transition:width .4s;}
  .s-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:6px;}
  .sf{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}

  /* ── MAIN ── */
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
  #no-projet{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:12px;}
  #no-projet .big-icon{font-size:52px;opacity:.2;}
  #no-projet p{font-family:'DM Mono',monospace;font-size:13px;}
  #projet-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}

  /* TOPBAR */
  .topbar{padding:14px 24px 12px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:12px;}
  .v-av{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;flex-shrink:0;}
  .v-nom{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;}
  .v-chef{font-size:12px;color:var(--text2);margin-top:2px;font-family:'DM Mono',monospace;}
  .tb-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
  .btn-edit{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--accent);font-family:'DM Mono',monospace;font-size:11px;padding:6px 12px;cursor:pointer;transition:all .15s;}
  .btn-edit:hover{background:rgba(37,99,235,.06);}
  .btn-del{background:none;border:1px solid rgba(220,38,38,.2);border-radius:8px;color:var(--red);font-family:'DM Mono',monospace;font-size:11px;padding:6px 12px;cursor:pointer;transition:all .15s;}
  .btn-del:hover{background:rgba(220,38,38,.06);}

  /* CONTENT */
  #proj-content{flex:1;overflow-y:auto;padding:20px 24px;}
  #proj-content::-webkit-scrollbar{width:5px;}
  #proj-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  /* FICHE SIMPLIFIÉE */
  .fiche-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:14px;display:flex;flex-direction:column;gap:8px;}
  .meta-row{display:flex;align-items:baseline;gap:10px;}
  .meta-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);min-width:90px;flex-shrink:0;}
  .meta-val{font-size:13px;font-weight:500;color:var(--text);}

  /* BLOCS TEXTE */
  .bloc-section{margin-bottom:12px;}
  .bloc-label{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:6px;}
  .bloc-content{font-size:13px;color:var(--text2);line-height:1.65;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
  .prob-box{background:rgba(220,38,38,.04);border-color:rgba(220,38,38,.2);color:var(--text);}

  /* PROGRESS */
  .prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .prog-bar-wrap{height:7px;background:var(--surface2);border-radius:7px;overflow:hidden;margin-bottom:18px;}
  .prog-bar-fill{height:100%;border-radius:7px;transition:width .5s ease;}

  /* TACHES TABLE */
  .th-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .th-lbl{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);}
  .btn-add-t{background:var(--surface2);border:1px solid var(--border);color:var(--accent);border-radius:8px;padding:6px 14px;font-size:12px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;transition:background .2s;}
  .btn-add-t:hover{background:rgba(37,99,235,.08);}
  .t-table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:var(--surface);margin-bottom:20px;}
  .t-table{width:100%;border-collapse:collapse;font-size:12px;}
  .t-table thead tr{border-bottom:2px solid var(--border);}
  .t-table th{padding:10px 12px;text-align:left;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);white-space:nowrap;}
  .t-group-row td{background:var(--surface2);}
  .t-row{border-bottom:1px solid var(--border);transition:background .12s;}
  .t-row:last-child{border-bottom:none;}
  .t-row:hover{background:rgba(37,99,235,.03);}
  .t-row-done{}
  .t-cell-chk{padding:10px 8px 10px 14px;vertical-align:middle;}
  .t-cell-nom{padding:10px 12px;font-weight:500;vertical-align:middle;min-width:130px;}
  .t-cell-obj{padding:10px 12px;color:var(--accent2);font-size:12px;font-style:italic;vertical-align:middle;max-width:160px;}
  .t-cell-date{padding:10px 12px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);white-space:nowrap;vertical-align:middle;}
  .t-cell-statut{padding:10px 12px;vertical-align:middle;white-space:nowrap;}
  .t-statut-badge{font-size:11px;font-family:'DM Mono',monospace;padding:3px 9px;border-radius:20px;font-weight:600;}
  .t-cell-comment{padding:10px 12px;color:var(--text2);font-size:12px;vertical-align:middle;max-width:180px;}
  .t-cell-vol{padding:10px 12px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);text-align:right;vertical-align:middle;white-space:nowrap;}
  .col-volume{text-align:right;}
  .t-cell-reste{font-weight:700;color:var(--accent);}
  .t-cell-actions{padding:10px 10px;vertical-align:middle;white-space:nowrap;text-align:right;}
  .t-chk{width:17px;height:17px;border-radius:50%;border:2px solid var(--border);display:inline-block;cursor:pointer;transition:all .15s;background:var(--surface2);}
  .t-chk:hover{border-color:var(--accent);}
  .t-chk.checked{background:var(--green);border-color:var(--green);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6.5 11.5L3 8l1-1 2.5 2.5 5-5 1 1z'/%3E%3C/svg%3E");background-size:cover;}
  .struck{color:var(--text3);}
  .btn-icon{background:none;border:none;cursor:pointer;font-size:12px;padding:3px 5px;border-radius:5px;transition:background .15s;}
  .btn-icon:hover{background:var(--surface2);}
  .btn-icon.del:hover{background:rgba(220,38,38,.08);}

  /* ── RESPONSIVE MOBILE ── */
  @media (max-width:768px){
    body{flex-direction:column;overflow:auto;height:auto;min-height:100vh;}
    #sidebar{width:100%;min-width:unset;height:auto;border-right:none;border-bottom:1px solid var(--border);}
    .proj-list{max-height:180px;}
    #projet-view{height:auto;}
    #proj-content{overflow:visible;padding:14px;}
    .topbar{flex-wrap:wrap;gap:8px;padding:12px 14px 10px;}
    .v-nom{font-size:15px;}
    .tb-right{margin-left:0;width:100%;}
    .btn-edit,.btn-del{flex:1;text-align:center;}
    .info-grid{grid-template-columns:1fr;}
    .grid2{grid-template-columns:1fr;}
    .hide-mobile{display:none!important;}
    .modal{padding:16px;max-height:95vh;}
    .t-table th,.t-cell-chk{padding:8px 6px 8px 10px;}
    .t-cell-nom,.t-cell-date,.t-cell-statut,.t-cell-actions{padding:8px 8px;}
    .sh{padding:14px 12px 12px;}
  }

  /* FORM */
  .field{margin-bottom:11px;}
  .field label{display:block;font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
  .field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px;outline:none;transition:border-color .2s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
  .field textarea{resize:vertical;min-height:72px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .fsep{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin:14px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--border);}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:540px;max-width:96vw;max-height:90vh;overflow-y:auto;padding:24px;animation:slideUp .2s ease;}
  .modal-sm{width:440px;}
  @keyframes slideUp{from{transform:translateY(14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;}
  .modal-close{background:none;border:none;color:var(--text3);font-size:19px;cursor:pointer;}
  .modal-close:hover{color:var(--red);}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:14px;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;padding:9px 20px;cursor:pointer;transition:opacity .2s;}
  .btn-primary:hover{opacity:.85;}
  .btn-cancel{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 20px;cursor:pointer;}

  .empty-state{text-align:center;padding:32px 20px;color:var(--text3);font-size:12px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;}

  /* PIÈCES JOINTES */
  .col-pj{min-width:120px;}
  .t-cell-pj{padding:8px 10px;vertical-align:middle;}
  .pj-wrap{display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
  .pj-chip{display:inline-flex;align-items:center;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:2px 6px;text-decoration:none;color:var(--text2);font-size:11px;max-width:130px;transition:background .15s;cursor:pointer;}
  .pj-chip:hover{background:rgba(37,99,235,.08);border-color:var(--accent);}
  .pj-icon{font-size:11px;flex-shrink:0;}
  .pj-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
  .pj-del{background:none;border:none;color:var(--text3);font-size:10px;cursor:pointer;padding:0 0 0 3px;flex-shrink:0;line-height:1;}
  .pj-del:hover{color:var(--red);}
  .pj-add{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;border:1px dashed var(--border);color:var(--text3);font-size:14px;cursor:pointer;transition:all .15s;flex-shrink:0;line-height:1;}
  .pj-add:hover{border-color:var(--accent);color:var(--accent);background:rgba(37,99,235,.05);}
</style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div><div class="loading-text">Chargement des projets…</div></div>
<div id="toast"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sh">
    <a class="sh-home" href="index.html">
      <div class="sh-back">←</div>
      <div class="sh-brand">Projets <span>DDMS</span></div>
    </a>
    <div class="search-box">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--text3);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-proj" placeholder="Rechercher…" oninput="filterProjets()">
    </div>
    <button class="btn-new" onclick="openAddProjet()">+ Nouveau projet</button>
  </div>
  <div class="proj-list" id="proj-list"></div>
  <div class="sf" id="sidebar-count">Chargement…</div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="no-projet">
    <div class="big-icon">🗂️</div>
    <p>Sélectionnez un projet dans le panneau gauche</p>
  </div>

  <div id="projet-view" style="display:none;">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="v-av" id="v-av"></div>
      <div>
        <div class="v-nom" id="v-nom"></div>
        <div class="v-chef" id="v-chef"></div>
      </div>
      <span id="v-statut"></span>
      <div class="tb-right">
        <button class="btn-edit" onclick="openEditProjet()">✏️ Modifier</button>
        <button class="btn-del" onclick="deleteProjet()">🗑 Supprimer</button>
      </div>
    </div>

    <!-- CONTENT -->
    <div id="proj-content">
      <div id="v-fiche"></div>
      <div id="v-prog"></div>
      <div class="th-row">
        <span class="th-lbl">📌 Tâches</span>
        <button class="btn-add-t" onclick="openAddTache()">+ Ajouter une tâche</button>
      </div>
      <div id="taches-list"></div>
    </div>
  </div>
</div>

<!-- MODAL PROJET -->
<div id="modal-projet" class="modal-overlay" style="display:none" onclick="closeModalOutside(event,'modal-projet')">
  <div class="modal">
    <div class="modal-title" id="proj-modal-title">Nouveau projet <button class="modal-close" onclick="closeModal('modal-projet')">✕</button></div>
    <input type="hidden" id="p-edit-id">

    <div class="fsep">Informations générales</div>
    <div class="field"><label>Nom du projet *</label><input id="p-nom" placeholder="ex: Migration SD-WAN Abidjan"></div>
    <div class="grid2" style="margin-bottom:11px">
      <div class="field"><label>Chef de projet</label><input id="p-chef" placeholder="ex: Eric Thiémélé"></div>
      <div class="field"><label>Budget estimé</label><input id="p-budget" placeholder="ex: 120 000 € HT"></div>
    </div>
    <div class="grid2" style="margin-bottom:11px">
      <div class="field"><label>Statut</label>
        <select id="p-statut"><option>En cours</option><option>Planifié</option><option>Terminé</option><option>En pause</option><option>Annulé</option></select>
      </div>
      <div class="field"><label>Priorité</label>
        <select id="p-priorite"><option>Haute</option><option>Moyenne</option><option>Faible</option></select>
      </div>
    </div>
    <div class="grid2" style="margin-bottom:11px">
      <div class="field"><label>Date de début</label><input id="p-dateDebut" type="date"></div>
      <div class="field"><label>Date de fin prévue</label><input id="p-dateFin" type="date"></div>
    </div>
    <div class="field"><label>Membres de l'équipe</label><input id="p-membres" placeholder="Jean Dupont, Marie Fall… (séparés par des virgules)"></div>

    <div class="fsep">Contexte du projet</div>
    <div class="field"><label>🔴 Problématique adressée</label>
      <textarea id="p-problematique" placeholder="Quel problème ce projet résout-il ? Quelle douleur client ?"></textarea>
    </div>
    <div class="field"><label>🎯 Objectifs</label>
      <textarea id="p-objectifs" placeholder="Quels sont les résultats attendus ?"></textarea>
    </div>
    <div class="field"><label>📋 Description</label>
      <textarea id="p-description" placeholder="Contexte, périmètre, parties prenantes…"></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('modal-projet')">Annuler</button>
      <button class="btn-primary" id="proj-modal-btn" onclick="saveProjet()">Créer</button>
    </div>
  </div>
</div>

<!-- MODAL TACHE -->
<div id="modal-tache" class="modal-overlay" style="display:none" onclick="closeModalOutside(event,'modal-tache')">
  <div class="modal modal-sm">
    <div class="modal-title" id="tache-modal-title">Nouvelle tâche <button class="modal-close" onclick="closeModal('modal-tache')">✕</button></div>
    <div class="field"><label>Nom de la tâche *</label><input id="t-titre" placeholder="ex: Rédiger le cahier des charges"></div>
    <div class="field"><label>Objectif</label><input id="t-objectif" placeholder="ex: Définir le périmètre technique du projet"></div>
    <div class="grid2" style="margin-bottom:11px">
      <div class="field"><label>Volume</label><input id="t-volume" type="number" min="0" placeholder="ex: 100"></div>
      <div class="field"><label>Réalisé</label><input id="t-realise" type="number" min="0" placeholder="ex: 40"> </div>
    </div>
    <div class="field" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;">
      <span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;">Reste à faire</span>
      <span id="t-reste-display" style="font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--accent);">—</span>
      <span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;">(calculé automatiquement)</span>
    </div>
    <div class="field"><label>Porteur</label><input id="t-porteur" placeholder="ex: Jean Dupont"></div>
    <div class="grid2" style="margin-bottom:11px">
      <div class="field"><label>Date de début</label><input id="t-dateDebut" type="date"></div>
      <div class="field"><label>Date de fin</label><input id="t-dateFin" type="date"></div>
    </div>
    <div class="field"><label>Statut</label>
      <select id="t-statut"><option>À faire</option><option>En cours</option><option>Terminé</option><option>Bloqué</option></select>
    </div>
    <div class="field"><label>Commentaire</label><textarea id="t-desc" style="min-height:72px" placeholder="Notes, blocages, informations complémentaires…"></textarea></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('modal-tache')">Annuler</button>
      <button class="btn-primary" onclick="saveTache()">Enregistrer</button>
    </div>
  </div>
</div>

</body>
</html>
