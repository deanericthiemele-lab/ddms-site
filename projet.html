<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projets — DDMS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHbiAC8mfdg2ToiqytMgPUxWGEYNYf5RU",
  authDomain: "ddms-architectures.firebaseapp.com",
  projectId: "ddms-architectures",
  storageBucket: "ddms-architectures.firebasestorage.app",
  messagingSenderId: "767552965189",
  appId: "1:767552965189:web:5b0c5ab6cd5bf97a5fb12c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const COL = 'projets';

// ── STATE ──
let projets = [];
let currentProjetId = null;
let editTacheIdx = null;

const STATUT_COLORS = {
  'En cours':   { bg:'rgba(37,99,235,.1)',  text:'#2563eb', border:'rgba(37,99,235,.25)' },
  'Planifié':   { bg:'rgba(124,58,237,.1)', text:'#7c3aed', border:'rgba(124,58,237,.25)' },
  'Terminé':    { bg:'rgba(22,163,74,.1)',  text:'#16a34a', border:'rgba(22,163,74,.25)' },
  'En pause':   { bg:'rgba(217,119,6,.1)', text:'#d97706', border:'rgba(217,119,6,.25)' },
  'Annulé':     { bg:'rgba(220,38,38,.1)', text:'#dc2626', border:'rgba(220,38,38,.25)' },
};
const PRIO_COLORS = { 'Haute':'#dc2626','Moyenne':'#d97706','Faible':'#16a34a' };
const TACHE_STATUT = ['À faire','En cours','Terminé','Bloqué'];
const PROJ_COLORS = ['#2563eb','#7c3aed','#16a34a','#d97706','#dc2626','#db2777','#0891b2','#65a30d'];

function projColor(p) { const i = projets.indexOf(p); return PROJ_COLORS[i >= 0 ? i % PROJ_COLORS.length : 0]; }
function getProjet() { return projets.find(p => p.id === currentProjetId); }

// ── TOAST ──
function toast(msg, type='info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='error'?'#dc2626':type==='success'?'#16a34a':'#2563eb';
  el.style.opacity='1'; el.style.transform='translateY(0)';
  clearTimeout(el._t);
  el._t = setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateY(10px)'; }, 2800);
}

// ── FIRESTORE ──
async function fsGetAll() {
  const snap = await getDocs(collection(db, COL));
  return snap.docs.map(d => ({ id: d.id, ...d.data() }));
}
async function fsSave(p) {
  const { id, ...data } = p;
  await setDoc(doc(db, COL, id), data);
}
async function fsDelete(id) { await deleteDoc(doc(db, COL, id)); }

// ── INIT ──
async function init() {
  document.getElementById('loading-overlay').style.display = 'flex';
  try {
    projets = await fsGetAll();
    projets.sort((a,b) => (a.nom||'').localeCompare(b.nom||''));
  } catch(e) { toast('Erreur Firestore : '+e.message, 'error'); }
  document.getElementById('loading-overlay').style.display = 'none';
  renderSidebar();
}

// ── SIDEBAR ──
function renderSidebar() {
  const q = document.getElementById('search-proj').value.toLowerCase();
  const filtered = projets.filter(p => (p.nom||'').toLowerCase().includes(q));
  const list = document.getElementById('proj-list');
  list.innerHTML = '';
  filtered.forEach(p => {
    const col = projColor(p);
    const sc = STATUT_COLORS[p.statut] || STATUT_COLORS['En cours'];
    const initials = (p.nom||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    const pct = progressPct(p);
    const div = document.createElement('div');
    div.className = 'proj-item'+(p.id===currentProjetId?' active':'');
    div.onclick = () => selectProjet(p.id);
    div.innerHTML = `
      <div class="proj-avatar" style="background:${col}18;color:${col}">${initials}</div>
      <div class="proj-info">
        <div class="proj-name">${p.nom||'Sans nom'}</div>
        <div class="proj-meta">${p.chefProjet||'—'}</div>
        <div class="proj-prog-bar-wrap"><div class="proj-prog-bar" style="width:${pct}%;background:${col}"></div></div>
      </div>
      <div class="proj-statut-dot" style="background:${sc.text}"></div>`;
    list.appendChild(div);
  });
  document.getElementById('sidebar-count').textContent = `${projets.length} projet${projets.length>1?'s':''}`;
}
window.filterProjets = () => renderSidebar();

function progressPct(p) {
  const taches = p.taches||[];
  if (!taches.length) return 0;
  return Math.round(taches.filter(t=>t.statut==='Terminé').length / taches.length * 100);
}

// ── SELECT ──
function selectProjet(id) {
  currentProjetId = id;
  renderSidebar();
  const p = getProjet(); if (!p) return;
  document.getElementById('no-projet').style.display = 'none';
  document.getElementById('projet-view').style.display = 'flex';
  renderProjet();
}

function renderProjet() {
  const p = getProjet(); if (!p) return;
  const col = projColor(p);
  const sc = STATUT_COLORS[p.statut] || STATUT_COLORS['En cours'];
  const pct = progressPct(p);
  const taches = p.taches||[];
  const initials = (p.nom||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();

  // HEADER
  document.getElementById('view-avatar').style.cssText=`background:${col}18;color:${col}`;
  document.getElementById('view-avatar').textContent = initials;
  document.getElementById('view-nom').textContent = p.nom||'Sans nom';
  document.getElementById('view-chef').textContent = p.chefProjet ? '👤 '+p.chefProjet : '';

  const badge = document.getElementById('view-statut');
  badge.textContent = p.statut||'En cours';
  badge.style.cssText = `background:${sc.bg};color:${sc.text};border:1px solid ${sc.border};padding:4px 12px;border-radius:20px;font-size:11px;font-family:'DM Mono',monospace;font-weight:600;`;

  // INFOS
  const prioriteColor = PRIO_COLORS[p.priorite]||'var(--text2)';
  document.getElementById('view-infos').innerHTML = `
    <div class="info-grid">
      <div class="info-cell"><div class="info-label">Date début</div><div class="info-val">${p.dateDebut?formatDate(p.dateDebut):'—'}</div></div>
      <div class="info-cell"><div class="info-label">Date fin</div><div class="info-val">${p.dateFin?formatDate(p.dateFin):'—'}</div></div>
      <div class="info-cell"><div class="info-label">Priorité</div><div class="info-val" style="color:${prioriteColor};font-weight:600">${p.priorite||'—'}</div></div>
      <div class="info-cell"><div class="info-label">Budget</div><div class="info-val">${p.budget||'—'}</div></div>
    </div>
    ${p.objectifs?`<div class="section-label" style="margin-top:14px">🎯 Objectifs</div><div class="obj-box">${p.objectifs.replace(/\n/g,'<br>')}</div>`:''}
    ${p.description?`<div class="section-label" style="margin-top:10px">📋 Description</div><div class="desc-box">${p.description.replace(/\n/g,'<br>')}</div>`:''}
  `;

  // PROGRESS
  const doneCount = taches.filter(t=>t.statut==='Terminé').length;
  document.getElementById('view-progress').innerHTML = `
    <div class="prog-row">
      <span class="prog-label">Avancement</span>
      <span class="prog-pct" style="color:${col}">${pct}%</span>
      <span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${doneCount}/${taches.length} tâches</span>
    </div>
    <div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:${pct}%;background:${col}"></div></div>
  `;

  // TACHES
  renderTaches();
}

function renderTaches() {
  const p = getProjet(); if (!p) return;
  const taches = p.taches||[];
  const el = document.getElementById('taches-list');
  if (!taches.length) { el.innerHTML = emptyState('Aucune tâche enregistrée'); return; }

  const groups = { 'À faire':[], 'En cours':[], 'Bloqué':[], 'Terminé':[] };
  taches.forEach((t,i) => { (groups[t.statut]||groups['À faire']).push({...t,_i:i}); });

  const groupColors = {'À faire':'var(--text3)','En cours':'var(--accent)','Bloqué':'var(--red)','Terminé':'var(--green)'};
  const groupIcons  = {'À faire':'○','En cours':'◑','Bloqué':'✕','Terminé':'●'};

  let html = '';
  Object.entries(groups).forEach(([grp, items]) => {
    if (!items.length) return;
    html += `<div class="tache-group">
      <div class="tache-group-title" style="color:${groupColors[grp]}">${groupIcons[grp]} ${grp} <span style="font-size:10px;opacity:.6">(${items.length})</span></div>`;
    items.forEach(t => {
      const i = t._i;
      const pc = PRIO_COLORS[t.priorite]||'var(--text3)';
      html += `<div class="tache-card ${t.statut==='Terminé'?'tache-done':''}">
        <div class="tache-head">
          <div class="tache-check ${t.statut==='Terminé'?'checked':''}" onclick="toggleTache(${i})" title="Marquer terminé"></div>
          <span class="tache-titre ${t.statut==='Terminé'?'done-text':''}">${t.titre}</span>
          <div class="tache-actions">
            <button class="btn-icon" onclick="editTache(${i})" title="Modifier">✏️</button>
            <button class="btn-icon btn-icon-del" onclick="deleteTache(${i})" title="Supprimer">✕</button>
          </div>
        </div>
        ${t.description?`<div class="tache-desc">${t.description}</div>`:''}
        <div class="tache-meta">
          ${t.responsable?`<span class="tache-badge" style="background:rgba(37,99,235,.08);color:var(--accent)">👤 ${t.responsable}</span>`:''}
          ${t.echeance?`<span class="tache-badge" style="background:var(--surface2)">📅 ${formatDate(t.echeance)}</span>`:''}
          ${t.priorite?`<span class="tache-badge" style="color:${pc};background:${pc}18">● ${t.priorite}</span>`:''}
        </div>
      </div>`;
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

// ── TACHE TOGGLE ──
window.toggleTache = async function(i) {
  const p = getProjet(); if (!p) return;
  const t = p.taches[i];
  t.statut = t.statut === 'Terminé' ? 'À faire' : 'Terminé';
  try { await fsSave(p); renderProjet(); toast(t.statut==='Terminé'?'Tâche terminée ✓':'Tâche réouverte','success'); }
  catch(e) { toast('Erreur : '+e.message,'error'); }
};

// ── TACHE EDIT ──
window.editTache = function(i) {
  const p = getProjet(); const t = p.taches[i];
  editTacheIdx = i;
  document.getElementById('t-titre').value = t.titre||'';
  document.getElementById('t-responsable').value = t.responsable||'';
  document.getElementById('t-echeance').value = t.echeance||'';
  document.getElementById('t-priorite').value = t.priorite||'Moyenne';
  document.getElementById('t-statut').value = t.statut||'À faire';
  document.getElementById('t-desc').value = t.description||'';
  document.getElementById('tache-modal-title').innerHTML = 'Modifier la tâche <button class="modal-close" onclick="closeModal(\'modal-tache\')">✕</button>';
  document.getElementById('modal-tache').style.display='flex';
};

window.openAddTache = function() {
  editTacheIdx = null;
  ['t-titre','t-responsable','t-echeance','t-desc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('t-priorite').value='Moyenne';
  document.getElementById('t-statut').value='À faire';
  document.getElementById('tache-modal-title').innerHTML = 'Nouvelle tâche <button class="modal-close" onclick="closeModal(\'modal-tache\')">✕</button>';
  document.getElementById('modal-tache').style.display='flex';
};

window.saveTache = async function() {
  const p = getProjet(); if (!p) return;
  const titre = document.getElementById('t-titre').value.trim(); if (!titre) return;
  const obj = {
    titre,
    responsable: document.getElementById('t-responsable').value,
    echeance: document.getElementById('t-echeance').value,
    priorite: document.getElementById('t-priorite').value,
    statut: document.getElementById('t-statut').value,
    description: document.getElementById('t-desc').value,
  };
  if (!p.taches) p.taches = [];
  if (editTacheIdx !== null) p.taches[editTacheIdx] = obj;
  else p.taches.push(obj);
  try {
    toast('Enregistrement…');
    await fsSave(p);
    closeModal('modal-tache');
    renderProjet();
    toast('Tâche enregistrée ✓','success');
  } catch(e) { toast('Erreur : '+e.message,'error'); }
};

window.deleteTache = async function(i) {
  if (!confirm('Supprimer cette tâche ?')) return;
  const p = getProjet(); if (!p) return;
  p.taches.splice(i,1);
  try { await fsSave(p); renderProjet(); renderSidebar(); toast('Tâche supprimée','success'); }
  catch(e) { toast('Erreur : '+e.message,'error'); }
};

// ── ADD / EDIT PROJET ──
window.openAddProjet = function() {
  document.getElementById('proj-modal-title').innerHTML = 'Nouveau projet <button class="modal-close" onclick="closeModal(\'modal-projet\')">✕</button>';
  document.getElementById('proj-modal-btn').textContent = 'Créer';
  ['p-nom','p-chef','p-budget','p-dateDebut','p-dateFin','p-objectifs','p-description','p-membres'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('p-statut').value='En cours';
  document.getElementById('p-priorite').value='Moyenne';
  document.getElementById('p-edit-id').value='';
  document.getElementById('modal-projet').style.display='flex';
};

window.openEditProjet = function() {
  const p = getProjet(); if (!p) return;
  document.getElementById('proj-modal-title').innerHTML = 'Modifier le projet <button class="modal-close" onclick="closeModal(\'modal-projet\')">✕</button>';
  document.getElementById('proj-modal-btn').textContent = 'Enregistrer';
  document.getElementById('p-nom').value = p.nom||'';
  document.getElementById('p-chef').value = p.chefProjet||'';
  document.getElementById('p-budget').value = p.budget||'';
  document.getElementById('p-dateDebut').value = p.dateDebut||'';
  document.getElementById('p-dateFin').value = p.dateFin||'';
  document.getElementById('p-objectifs').value = p.objectifs||'';
  document.getElementById('p-description').value = p.description||'';
  document.getElementById('p-membres').value = (p.membres||[]).join(', ');
  document.getElementById('p-statut').value = p.statut||'En cours';
  document.getElementById('p-priorite').value = p.priorite||'Moyenne';
  document.getElementById('p-edit-id').value = p.id;
  document.getElementById('modal-projet').style.display='flex';
};

window.saveProjet = async function() {
  const nom = document.getElementById('p-nom').value.trim(); if (!nom) return;
  const editId = document.getElementById('p-edit-id').value;
  const membresRaw = document.getElementById('p-membres').value;
  const membres = membresRaw ? membresRaw.split(',').map(m=>m.trim()).filter(Boolean) : [];

  if (editId) {
    const p = projets.find(x=>x.id===editId);
    if (!p) return;
    Object.assign(p, { nom, chefProjet: document.getElementById('p-chef').value, budget: document.getElementById('p-budget').value, dateDebut: document.getElementById('p-dateDebut').value, dateFin: document.getElementById('p-dateFin').value, objectifs: document.getElementById('p-objectifs').value, description: document.getElementById('p-description').value, membres, statut: document.getElementById('p-statut').value, priorite: document.getElementById('p-priorite').value });
    try { toast('Enregistrement…'); await fsSave(p); closeModal('modal-projet'); renderSidebar(); renderProjet(); toast('Projet mis à jour ✓','success'); }
    catch(e) { toast('Erreur : '+e.message,'error'); }
  } else {
    const p = { id: Date.now().toString(), nom, chefProjet: document.getElementById('p-chef').value, budget: document.getElementById('p-budget').value, dateDebut: document.getElementById('p-dateDebut').value, dateFin: document.getElementById('p-dateFin').value, objectifs: document.getElementById('p-objectifs').value, description: document.getElementById('p-description').value, membres, statut: document.getElementById('p-statut').value, priorite: document.getElementById('p-priorite').value, taches: [] };
    try { toast('Enregistrement…'); await fsSave(p); projets.push(p); projets.sort((a,b)=>(a.nom||'').localeCompare(b.nom||'')); closeModal('modal-projet'); renderSidebar(); selectProjet(p.id); toast('Projet créé ✓','success'); }
    catch(e) { toast('Erreur : '+e.message,'error'); }
  }
};

// ── DELETE PROJET ──
window.deleteProjet = async function() {
  const p = getProjet(); if (!p) return;
  if (!confirm(`Supprimer définitivement "${p.nom}" et toutes ses tâches ?`)) return;
  try {
    await fsDelete(p.id);
    projets = projets.filter(x=>x.id!==p.id);
    currentProjetId = null;
    document.getElementById('projet-view').style.display='none';
    document.getElementById('no-projet').style.display='flex';
    renderSidebar();
    toast('Projet supprimé','success');
  } catch(e) { toast('Erreur : '+e.message,'error'); }
};

// ── MODAL HELPERS ──
window.openModal = id => document.getElementById(id).style.display='flex';
window.closeModal = id => document.getElementById(id).style.display='none';
window.closeModalOutside = (e,id) => { if(e.target.id===id) window.closeModal(id); };

// ── UTILS ──
function emptyState(msg) { return `<div class="empty-state"><div class="empty-icon">—</div><p>${msg}</p></div>`; }
function formatDate(s) {
  if (!s) return '';
  try { return new Date(s+'T00:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); }
  catch(e) { return s; }
}

init();
</script>

<style>
  :root {
    --bg:#f5f6fa; --surface:#fff; --surface2:#f0f2f7;
    --border:#e2e6ef; --accent:#2563eb; --accent2:#7c3aed;
    --green:#16a34a; --orange:#d97706; --red:#dc2626;
    --text:#1a1d27; --text2:#4b5368; --text3:#9ba3b8;
    --sidebar-w:260px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;}

  /* LOADING */
  #loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px;}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-family:'DM Mono',monospace;font-size:13px;color:var(--text3);}

  /* TOAST */
  #toast{position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:10px;color:#fff;font-family:'DM Mono',monospace;font-size:13px;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;z-index:9998;pointer-events:none;}

  /* SIDEBAR */
  #sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
  .sidebar-header{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
  .sidebar-home{display:flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:14px;}
  .home-icon{width:28px;height:28px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:background .15s;}
  .home-icon:hover{background:var(--border);}
  .sidebar-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;}
  .sidebar-brand span{color:var(--text2);font-weight:400;}
  .search-box{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;margin-bottom:10px;}
  .search-box input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;width:100%;}
  .search-box input::placeholder{color:var(--text3);}
  .btn-new-proj{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;padding:8px;cursor:pointer;letter-spacing:.05em;transition:opacity .2s;}
  .btn-new-proj:hover{opacity:.85;}
  .proj-list{flex:1;overflow-y:auto;padding:8px;}
  .proj-list::-webkit-scrollbar{width:4px;}
  .proj-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .proj-item{display:flex;align-items:flex-start;gap:10px;padding:10px;border-radius:10px;cursor:pointer;transition:background .15s;margin-bottom:3px;position:relative;}
  .proj-item:hover{background:var(--surface2);}
  .proj-item.active{background:rgba(37,99,235,.08);}
  .proj-item.active::before{content:'';position:absolute;left:0;top:15%;bottom:15%;width:3px;background:var(--accent);border-radius:0 3px 3px 0;}
  .proj-avatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;flex-shrink:0;margin-top:1px;}
  .proj-info{flex:1;min-width:0;}
  .proj-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
  .proj-item.active .proj-name{color:var(--accent);}
  .proj-meta{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .proj-prog-bar-wrap{height:3px;background:var(--surface2);border-radius:3px;margin-top:6px;overflow:hidden;}
  .proj-prog-bar{height:100%;border-radius:3px;transition:width .4s;}
  .proj-statut-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:6px;}
  .sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;}

  /* MAIN */
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
  #no-projet{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:12px;}
  #no-projet .big-icon{font-size:56px;opacity:.2;}
  #no-projet p{font-family:'DM Mono',monospace;font-size:13px;}

  #projet-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}

  /* TOPBAR */
  .topbar{padding:16px 26px 14px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:flex-start;gap:14px;}
  .view-avatar{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:17px;flex-shrink:0;}
  .view-title-wrap{flex:1;min-width:0;}
  .view-nom{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;line-height:1.2;}
  .view-chef{font-size:12px;color:var(--text2);margin-top:3px;font-family:'DM Mono',monospace;}
  .topbar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
  .btn-edit-proj{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--accent);font-family:'DM Mono',monospace;font-size:11px;padding:6px 12px;cursor:pointer;transition:all .15s;}
  .btn-edit-proj:hover{background:rgba(37,99,235,.06);}
  .btn-del-proj{background:none;border:1px solid rgba(220,38,38,.25);border-radius:8px;color:var(--red);font-family:'DM Mono',monospace;font-size:11px;padding:6px 12px;cursor:pointer;transition:all .15s;}
  .btn-del-proj:hover{background:rgba(220,38,38,.06);}

  /* CONTENT SCROLLABLE */
  #proj-content{flex:1;overflow-y:auto;padding:22px 26px;}
  #proj-content::-webkit-scrollbar{width:5px;}
  #proj-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  /* INFO GRID */
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px;}
  .info-cell{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;}
  .info-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
  .info-val{font-size:13px;font-weight:500;}
  .obj-box{background:rgba(37,99,235,.04);border:1px solid rgba(37,99,235,.15);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap;}
  .desc-box{font-size:13px;color:var(--text2);line-height:1.6;padding:2px 0;white-space:pre-wrap;}
  .section-label{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:8px;}

  /* PROGRESS */
  .prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .prog-label{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);}
  .prog-pct{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;}
  .prog-bar-wrap{height:8px;background:var(--surface2);border-radius:8px;overflow:hidden;margin-bottom:20px;}
  .prog-bar-fill{height:100%;border-radius:8px;transition:width .5s ease;}

  /* TACHES */
  .taches-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .btn-add-tache{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);color:var(--accent);border-radius:8px;padding:6px 14px;font-size:12px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;transition:background .2s;}
  .btn-add-tache:hover{background:rgba(37,99,235,.08);}
  .tache-group{margin-bottom:18px;}
  .tache-group-title{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
  .tache-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:7px;transition:border-color .2s;}
  .tache-card:hover{border-color:#a5b4fc;}
  .tache-done{opacity:.65;}
  .tache-head{display:flex;align-items:center;gap:10px;}
  .tache-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;transition:all .15s;background:var(--surface2);}
  .tache-check:hover{border-color:var(--accent);}
  .tache-check.checked{background:var(--green);border-color:var(--green);background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6.5 11.5L3 8l1-1 2.5 2.5 5-5 1 1z'/%3E%3C/svg%3E");background-size:cover;}
  .tache-titre{font-size:13px;font-weight:500;flex:1;min-width:0;}
  .done-text{text-decoration:line-through;color:var(--text3);}
  .tache-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;}
  .tache-card:hover .tache-actions{opacity:1;}
  .btn-icon{background:none;border:none;cursor:pointer;font-size:13px;padding:2px 5px;border-radius:5px;transition:background .15s;}
  .btn-icon:hover{background:var(--surface2);}
  .btn-icon-del:hover{background:rgba(220,38,38,.08);}
  .tache-desc{font-size:12px;color:var(--text2);margin:6px 0 4px 28px;line-height:1.5;}
  .tache-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;margin-left:28px;}
  .tache-badge{font-size:11px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:5px;}

  /* FORM */
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px;outline:none;transition:border-color .2s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
  .field textarea{resize:vertical;min-height:80px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:0;}
  .form-sep{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:560px;max-width:96vw;max-height:90vh;overflow-y:auto;padding:24px;animation:slideUp .2s ease;}
  .modal-sm{width:460px;}
  @keyframes slideUp{from{transform:translateY(16px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
  .modal-close{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;line-height:1;}
  .modal-close:hover{color:var(--red);}
  .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:16px;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:8px;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;padding:9px 20px;cursor:pointer;transition:opacity .2s;}
  .btn-primary:hover{opacity:.85;}
  .btn-cancel{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 20px;cursor:pointer;}
  .btn-cancel:hover{border-color:var(--text2);}

  /* EMPTY */
  .empty-state{text-align:center;padding:36px 20px;color:var(--text3);font-size:13px;font-family:'DM Mono',monospace;}
  .empty-icon{font-size:28px;margin-bottom:8px;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Chargement des projets…</div>
</div>
<div id="toast"></div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-header">
    <a class="sidebar-home" href="noctb.html" title="Retour accueil">
      <div class="home-icon">←</div>
      <div class="sidebar-brand">Projets <span>DDMS</span></div>
    </a>
    <div class="search-box">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--text3);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-proj" placeholder="Rechercher un projet…" oninput="filterProjets()">
    </div>
    <button class="btn-new-proj" onclick="openAddProjet()">+ Nouveau projet</button>
  </div>
  <div class="proj-list" id="proj-list"></div>
  <div class="sidebar-footer" id="sidebar-count">Chargement…</div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="no-projet">
    <div class="big-icon">🗂️</div>
    <p>Sélectionnez un projet dans le panneau gauche</p>
  </div>

  <div id="projet-view" style="display:none;">
    <div class="topbar">
      <div class="view-avatar" id="view-avatar"></div>
      <div class="view-title-wrap">
        <div class="view-nom" id="view-nom"></div>
        <div class="view-chef" id="view-chef"></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="view-statut"></span>
      </div>
      <div class="topbar-actions">
        <button class="btn-edit-proj" onclick="openEditProjet()">✏️ Modifier</button>
        <button class="btn-del-proj" onclick="deleteProjet()">🗑 Supprimer</button>
      </div>
    </div>

    <div id="proj-content">
      <!-- INFOS -->
      <div id="view-infos" style="margin-bottom:18px"></div>

      <!-- PROGRESS -->
      <div id="view-progress"></div>

      <!-- TACHES -->
      <div class="taches-header">
        <div class="section-label" style="margin:0">📌 Tâches</div>
        <button class="btn-add-tache" onclick="openAddTache()">+ Ajouter une tâche</button>
      </div>
      <div id="taches-list"></div>
    </div>
  </div>
</div>

<!-- MODAL PROJET -->
<div id="modal-projet" class="modal-overlay" style="display:none" onclick="closeModalOutside(event,'modal-projet')">
  <div class="modal">
    <div class="modal-title" id="proj-modal-title">Nouveau projet <button class="modal-close" onclick="closeModal('modal-projet')">✕</button></div>
    <input type="hidden" id="p-edit-id">

    <div class="form-sep">Informations générales</div>
    <div class="field"><label>Nom du projet *</label><input id="p-nom" placeholder="ex: Migration SD-WAN Abidjan"></div>
    <div class="grid2" style="margin-bottom:12px">
      <div class="field"><label>Chef de projet</label><input id="p-chef" placeholder="ex: Eric Thiémélé"></div>
      <div class="field"><label>Budget estimé</label><input id="p-budget" placeholder="ex: 120 000 € HT"></div>
    </div>
    <div class="grid2" style="margin-bottom:12px">
      <div class="field"><label>Statut</label>
        <select id="p-statut">
          <option>En cours</option><option>Planifié</option>
          <option>Terminé</option><option>En pause</option><option>Annulé</option>
        </select>
      </div>
      <div class="field"><label>Priorité</label>
        <select id="p-priorite"><option>Haute</option><option>Moyenne</option><option>Faible</option></select>
      </div>
    </div>
    <div class="grid2" style="margin-bottom:12px">
      <div class="field"><label>Date de début</label><input id="p-dateDebut" type="date"></div>
      <div class="field"><label>Date de fin prévue</label><input id="p-dateFin" type="date"></div>
    </div>

    <div class="form-sep">Contenu</div>
    <div class="field"><label>Objectifs</label>
      <textarea id="p-objectifs" placeholder="Quels sont les objectifs principaux de ce projet ?"></textarea>
    </div>
    <div class="field"><label>Description</label>
      <textarea id="p-description" placeholder="Contexte, périmètre, parties prenantes…"></textarea>
    </div>
    <div class="field"><label>Membres de l'équipe</label>
      <input id="p-membres" placeholder="ex: Jean Dupont, Marie Fall, Koffi Bah (séparés par des virgules)">
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('modal-projet')">Annuler</button>
      <button class="btn-primary" id="proj-modal-btn" onclick="saveProjet()">Créer</button>
    </div>
  </div>
</div>

<!-- MODAL TACHE -->
<div id="modal-tache" class="modal-overlay" style="display:none" onclick="closeModalOutside(event,'modal-tache')">
  <div class="modal modal-sm">
    <div class="modal-title" id="tache-modal-title">Nouvelle tâche <button class="modal-close" onclick="closeModal('modal-tache')">✕</button></div>

    <div class="field"><label>Titre de la tâche *</label><input id="t-titre" placeholder="ex: Rédiger le cahier des charges"></div>
    <div class="grid2" style="margin-bottom:12px">
      <div class="field"><label>Responsable</label><input id="t-responsable" placeholder="ex: Jean Dupont"></div>
      <div class="field"><label>Échéance</label><input id="t-echeance" type="date"></div>
    </div>
    <div class="grid2" style="margin-bottom:12px">
      <div class="field"><label>Priorité</label>
        <select id="t-priorite"><option>Haute</option><option>Moyenne</option><option>Faible</option></select>
      </div>
      <div class="field"><label>Statut</label>
        <select id="t-statut"><option>À faire</option><option>En cours</option><option>Terminé</option><option>Bloqué</option></select>
      </div>
    </div>
    <div class="field"><label>Description</label>
      <textarea id="t-desc" style="min-height:60px" placeholder="Détails de la tâche…"></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('modal-tache')">Annuler</button>
      <button class="btn-primary" onclick="saveTache()">Enregistrer</button>
    </div>
  </div>
</div>

</body>
</html>
