
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Bilan des productions B2B (LN)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
body { font-family: Arial; background:#f4f4f4; text-align:center; }
table { margin:40px auto; border-collapse: collapse; background:white; }
th, td { padding:10px 20px; border:1px solid #ccc; }
th { background:#eee; }
tfoot { font-weight:bold; background:#ddd; }
button { margin-top:20px; padding:8px 15px; cursor:pointer; }
</style>
</head>
<body>

<h2>Bilan des productions B2B (LN)</h2>
<input type="file" id="fileInput" accept=".xlsx">
<table>
<thead>
<tr>
<th>Mois</th>
<th>Nombre de lignes</th>
<th>Total mensuel</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
<tfoot>
<tr>
<td>TOTAL</td>
<td id="totalLignes">0</td>
<td id="totalMontant">0</td>
</tr>
</tfoot>
</table>

<script>
document.getElementById('fileInput').addEventListener('change', function(e){
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(evt){
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, {type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);

        let moisData = {};
        let totalGlobal = 0;
        let totalLignes = 0;

        json.forEach(row => {
            let excelDate = row["Date MES & MEF"];
            let total = Number(row["Total"]);
            if (isNaN(total)) total = 0;

            if (excelDate) {
                let jsDate;

                if (typeof excelDate === "number") {
                    jsDate = new Date(Date.UTC(1899, 11, 30) + excelDate * 86400000);
                } else {
                    jsDate = new Date(excelDate);
                }

                const key = `${jsDate.getUTCFullYear()}-${String(jsDate.getUTCMonth()+1).padStart(2,'0')}`;
                const label = jsDate.toLocaleString('fr-FR', { month:'long', year:'numeric' });

                if (!moisData[key]) {
                    moisData[key] = { label: label, lignes: 0, total: 0 };
                }

                moisData[key].lignes += 1;
                moisData[key].total += total;

                totalGlobal += total;
                totalLignes += 1;
            }
        });

        const moisTries = Object.keys(moisData).sort();
        const tbody = document.getElementById("tbody");
        tbody.innerHTML = "";

        moisTries.forEach(key => {
            const d = moisData[key];
            let tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${d.label}</td>
                <td>${d.lignes}</td>
                <td>${d.total.toLocaleString('fr-FR')}</td>
            `;
            tbody.appendChild(tr);
        });

        document.getElementById("totalLignes").innerText = totalLignes;
        document.getElementById("totalMontant").innerText = totalGlobal.toLocaleString('fr-FR');
    };

    reader.readAsArrayBuffer(file);
});
</script>

</body>
</html>
