
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Somme mensuelle - Total</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Arial,Helvetica,sans-serif;margin:40px;}
table{border-collapse:collapse;width:700px;margin:auto;}
th,td{border:1px solid #ccc;padding:12px 16px;text-align:center;}
th{background:#f2f2f2;}
tr.total-row td{font-weight:bold;background:#eaeaea;}
h1{text-align:center;margin-bottom:30px;}
</style>
</head>
<body>

<button onclick="location.href='suivi_dossiers.html'" 
style="margin-bottom:20px;padding:8px 14px;border:none;background:#d3d3d3;border-radius:6px;cursor:pointer;">
⬅ Retour
</button>

<h1>Bilan des productions B2B (LN)</h1>

<table id="resultTable">
<thead>
<tr>
<th>Mois</th>
<th>Nombre de lignes</th>
<th>Total mensuel</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
fetch('Input.xlsx')
.then(response => response.arrayBuffer())
.then(data => {
    const workbook = XLSX.read(data, {type: 'array'});
    const sheet = workbook.Sheets["MES"];
    const json = XLSX.utils.sheet_to_json(sheet, {raw:true});

    let moisData = {};
    let totalGlobal = 0;
    let totalLignes = 0;

    json.forEach(row => {

        let excelDate = row["Date MES & MEF"];
        let total = Number(row["Total"]) || 0;

        if(excelDate){

            let jsDate;

            if(typeof excelDate === "number"){
                jsDate = new Date((excelDate - 25569) * 86400 * 1000);
            } else {
                jsDate = new Date(excelDate);
            }

            let mois = jsDate.toLocaleString('fr-FR', { month: 'long', year: 'numeric' });

            if(!moisData[mois]){
                moisData[mois] = { lignes: 0, total: 0 };
            }

            // Exclure CAT = "Transfert" du nombre de lignes uniquement
            if(row["CAT"] !== "Transfert"){
                moisData[mois].lignes += 1;
                totalLignes += 1;
            }

            // Toujours ajouter au total mensuel
            moisData[mois].total += total;
            totalGlobal += total;
        }
    });

    const moisTries = Object.keys(moisData).sort((a,b)=>{
        return new Date("1 "+a) - new Date("1 "+b);
    });

    const tbody = document.querySelector("#resultTable tbody");

    moisTries.forEach(mois => {
        let tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${mois}</td>
            <td>${moisData[mois].lignes}</td>
            <td>${moisData[mois].total.toLocaleString('fr-FR')}</td>
        `;
        tbody.appendChild(tr);
    });

    let trTotal = document.createElement("tr");
    trTotal.classList.add("total-row");
    trTotal.innerHTML = `
        <td>TOTAL</td>
        <td>${totalLignes}</td>
        <td>${totalGlobal.toLocaleString('fr-FR')}</td>
    `;
    tbody.appendChild(trTotal);
});
</script>

</body>
</html>
