
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Somme mensuelle - Total</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Arial,Helvetica,sans-serif;margin:40px;}
table{border-collapse:collapse;width:850px;margin:auto;}
th,td{border:1px solid #ccc;padding:12px 16px;text-align:center;}
th{background:#f2f2f2;}
tr.total-row td{font-weight:bold;background:#eaeaea;}
td.cat-cell{text-align:left;white-space:normal;}
td.cat-cell div{padding:1px 0;}

.kpi-row{
  display:flex;
  gap:16px;
  justify-content:center;
  margin-bottom:30px;
  flex-wrap:wrap;
}
.kpi-card{
  background:#f7f9fb;
  border:1px solid #dde2ea;
  border-radius:10px;
  padding:14px 24px;
  text-align:center;
  min-width:120px;
}
.kpi-label{
  font-size:12px;
  color:#888;
  font-weight:600;
  letter-spacing:0.04em;
  text-transform:uppercase;
  margin-bottom:6px;
}
.kpi-value{
  font-size:26px;
  font-weight:bold;
  color:#222;
}
h1{text-align:center;margin-bottom:30px;}
</style>
</head>
<body>

<button onclick="location.href='suivi_dossiers.html'" 
style="margin-bottom:20px;padding:8px 14px;border:none;background:#d3d3d3;border-radius:6px;cursor:pointer;">
⬅ Retour
</button>

<h1>Bilan des productions B2B (LN)</h1>

<div class="kpi-row" id="kpiRow"></div>

<table id="resultTable">
<thead>
<tr>
<th>Mois</th>
<th>Nombre de lignes</th>
<th>LS / LSI / T0 / T2</th>
<th>Objectif volume</th>
<th>CA Mensuel</th>
<th>DMR Technique moyen (j. ouvrés)</th>
<th>DMR MES moyen (j. ouvrés)</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
fetch('Input.xlsx')
.then(response => response.arrayBuffer())
.then(data => {
    const workbook = XLSX.read(data, {type: 'array'});
    const sheet = workbook.Sheets["MES"];
    const json = XLSX.utils.sheet_to_json(sheet, {raw:true});

    let moisData = {};
    let totalGlobal = 0;
    let totalLignes = 0;
    let catGlobal = { LS: 0, LSI: 0, T0: 0, T2: 0 };

    json.forEach(row => {

        let excelDate = row["Date MES & MEF"];
        let total = Number(row["Total"]) || 0;

        if(excelDate){

            let jsDate;

            if(typeof excelDate === "number"){
                jsDate = new Date((excelDate - 25569) * 86400 * 1000);
            } else {
                jsDate = new Date(excelDate);
            }

            let mois = jsDate.toLocaleString('fr-FR', { month: 'long', year: 'numeric' });

            if(!moisData[mois]){
                moisData[mois] = { lignes: 0, total: 0, dmrSomme: 0, dmrCount: 0, dmrMesSomme: 0, dmrMesCount: 0, cat: { LS: 0, LSI: 0, T0: 0, T2: 0 } };
            }

            // Exclure CAT = "Transfert" du nombre de lignes uniquement
            if(row["CAT"] !== "Transfert"){
                moisData[mois].lignes += 1;
                totalLignes += 1;
            }

            // Comptage par catégorie (LS, LSI, T0, T2) — basé sur "Libéllé Produit", en excluant les Transfert (comme pour le nombre de lignes)
            if(row["CAT"] !== "Transfert"){
                let normalize = s => s.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ").trim().toLowerCase();
                let libelleKey = Object.keys(row).find(k => normalize(k) === "libelle produit");
                let libelleValue = (libelleKey ? row[libelleKey] : "").toString().trim().toUpperCase();
                let catValue = "";
                if(libelleValue === "LS" || libelleValue === "LSI" || libelleValue === "T0" || libelleValue === "T2"){
                    catValue = libelleValue;
                }
                if(catValue){
                    moisData[mois].cat[catValue] += 1;
                    catGlobal[catValue] += 1;
                }
            }

            // Toujours ajouter au total mensuel
            moisData[mois].total += total;
            totalGlobal += total;

            // DMR TECHNIQUE : colonne déjà calculée dans le fichier Excel (jours ouvrés)
            let dmrTechnique = Number(row["DMR TECHNIQUE"]);
            if(!isNaN(dmrTechnique) && row["DMR TECHNIQUE"] !== "" && row["DMR TECHNIQUE"] !== null){
                moisData[mois].dmrSomme += dmrTechnique;
                moisData[mois].dmrCount += 1;
            }

            // DMR MES : colonne déjà calculée dans le fichier Excel (jours ouvrés)
            let dmrMesKey = Object.keys(row).find(k => k.replace(/\s+/g," ").trim().toUpperCase() === "DMR MES");
            let dmrMes = dmrMesKey ? Number(row[dmrMesKey]) : NaN;
            if(!isNaN(dmrMes) && dmrMesKey && row[dmrMesKey] !== "" && row[dmrMesKey] !== null){
                moisData[mois].dmrMesSomme += dmrMes;
                moisData[mois].dmrMesCount += 1;
            }
        }
    });

    const objectifs2026 = {
        "janvier 2026": 64,
        "février 2026": 61,
        "mars 2026": 64,
        "avril 2026": 62,
        "mai 2026": 67,
        "juin 2026": 67,
        "juillet 2026": 68,
        "août 2026": 67,
        "septembre 2026": 68,
        "octobre 2026": 79,
        "novembre 2026": 78,
        "décembre 2026": 66
    };

    const moisOrdre = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
    const moisTries = Object.keys(moisData).sort((a,b)=>{
        const [ma, ya] = a.split(" ");
        const [mb, yb] = b.split(" ");
        if(ya !== yb) return Number(ya) - Number(yb);
        return moisOrdre.indexOf(ma) - moisOrdre.indexOf(mb);
    });

    const tbody = document.querySelector("#resultTable tbody");
    tbody.innerHTML = "";

    moisTries.forEach(mois => {
        let tr = document.createElement("tr");
        let objectif = objectifs2026[mois] !== undefined ? objectifs2026[mois] : "-";
        let lignesStyle = "";
        if(objectif !== "-"){
            if(moisData[mois].lignes >= objectif){
                lignesStyle = 'style="color:green;font-weight:bold;"';
            } else {
                lignesStyle = 'style="color:orange;font-weight:bold;"';
            }
        }
        let dmrMoyen = moisData[mois].dmrCount > 0
            ? (moisData[mois].dmrSomme / moisData[mois].dmrCount).toFixed(1)
            : "-";
        let dmrMesMoyen = moisData[mois].dmrMesCount > 0
            ? (moisData[mois].dmrMesSomme / moisData[mois].dmrMesCount).toFixed(1)
            : "-";
        tr.innerHTML = `
            <td>${mois}</td>
            <td ${lignesStyle}>${moisData[mois].lignes}</td>
            <td class="cat-cell"><div>LS: ${moisData[mois].cat.LS}</div><div>LSI: ${moisData[mois].cat.LSI}</div><div>T0: ${moisData[mois].cat.T0}</div><div>T2: ${moisData[mois].cat.T2}</div></td>
            <td>${objectif}</td>
            <td>${moisData[mois].total.toLocaleString('fr-FR')}</td>
            <td>${dmrMoyen}</td>
            <td>${dmrMesMoyen}</td>
        `;
        tbody.appendChild(tr);
    });

    let totalObjectif = moisTries.reduce((sum, mois) => {
        return sum + (objectifs2026[mois] !== undefined ? objectifs2026[mois] : 0);
    }, 0);
    let totalStyle = totalLignes >= totalObjectif ? 'style="color:green;font-weight:bold;"' : 'style="color:orange;font-weight:bold;"';

    let dmrSommeGlobal = moisTries.reduce((s, mois) => s + moisData[mois].dmrSomme, 0);
    let dmrCountGlobal = moisTries.reduce((s, mois) => s + moisData[mois].dmrCount, 0);
    let dmrMoyenGlobal = dmrCountGlobal > 0 ? (dmrSommeGlobal / dmrCountGlobal).toFixed(1) : "-";

    let dmrMesSommeGlobal = moisTries.reduce((s, mois) => s + moisData[mois].dmrMesSomme, 0);
    let dmrMesCountGlobal = moisTries.reduce((s, mois) => s + moisData[mois].dmrMesCount, 0);
    let dmrMesMoyenGlobal = dmrMesCountGlobal > 0 ? (dmrMesSommeGlobal / dmrMesCountGlobal).toFixed(1) : "-";

    const kpiRow = document.getElementById("kpiRow");
    kpiRow.innerHTML = `
        <div class="kpi-card"><div class="kpi-label">LS</div><div class="kpi-value">${catGlobal.LS}</div></div>
        <div class="kpi-card"><div class="kpi-label">LSI</div><div class="kpi-value">${catGlobal.LSI}</div></div>
        <div class="kpi-card"><div class="kpi-label">T0</div><div class="kpi-value">${catGlobal.T0}</div></div>
        <div class="kpi-card"><div class="kpi-label">T2</div><div class="kpi-value">${catGlobal.T2}</div></div>
        <div class="kpi-card"><div class="kpi-label">Total lignes</div><div class="kpi-value">${totalLignes}</div></div>
    `;

    let trTotal = document.createElement("tr");
    trTotal.classList.add("total-row");
    trTotal.innerHTML = `
        <td>TOTAL</td>
        <td ${totalStyle}>${totalLignes}</td>
        <td class="cat-cell"><div>LS: ${catGlobal.LS}</div><div>LSI: ${catGlobal.LSI}</div><div>T0: ${catGlobal.T0}</div><div>T2: ${catGlobal.T2}</div></td>
        <td>${totalObjectif}</td>
        <td>${totalGlobal.toLocaleString('fr-FR')}</td>
        <td>${dmrMoyenGlobal}</td>
        <td>${dmrMesMoyenGlobal}</td>
    `;
    tbody.appendChild(trTotal);
});
</script>

</body>
</html>
