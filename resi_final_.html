<body>
<h1>📄 Résiliations</h1>
<a href="index.html"><button>Retour</button></a>
<div style="display:flex;align-items:center;gap:8px;margin:10px 0;"><input id="search" placeholder="Recherche dynamique..." type="text" style="padding:6px;width:280px;"/><button id="btn-summary-resi" style="background:linear-gradient(135deg,#7c3aed,#5b21b6);color:white;border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;">&#128203; Summary</button></div>
<h2>KPI Produits (2023-2024-2026)</h2>

<button onclick="exporterTableau('tableau-mensuel', 'Resiliations_mensuelles.xlsx')">📤 Exporter ce tableau</button>

<div class="popup" id="popup">
<span class="close" onclick="document.getElementById('popup').style.display='none'">✖</span>

</div>
<script>
let dataGlobal = [];
let dataFiltre = [];

function excelDateToJSDate(serial) {
  const excelEpoch = new Date(1899, 11, 30);
  return new Date(excelEpoch.getTime() + serial * 86400000);
}

function formatDateFR(date) {
  if (!(date instanceof Date) || isNaN(date)) return "";
  let d = date.getDate().toString().padStart(2,'0');
  let m = (date.getMonth()+1).toString().padStart(2,'0');
  let y = date.getFullYear();
  return `${d}/${m}/${y}`;
}

function getDateFromCell(value) {
  if (value == null) return null;
  const num = Number(value);
  if (!isNaN(num) && num > 20000 && num < 80000) {
    return excelDateToJSDate(num);
  }
  if (Object.prototype.toString.call(value) === "[object Date]") {
    return value;
  }
  const str = String(value).trim();

  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
    const [y, m, d] = str.split("-").map(Number);
    return new Date(y, m - 1, d);
  }
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(str)) {
    const [d, m, y] = str.split("/").map(Number);
    return new Date(y, m - 1, d);
  }
  if (/^\d{2}\/\d{2}\/\d{2}$/.test(str)) {
    const [d, m, y] = str.split("/").map(Number);
    const fullYear = y < 50 ? 2000 + y : 1900 + y; 
    return new Date(fullYear, m - 1, d);
  }
  return null;
}

function formatDatesInRows(rows) {
  if (!rows || !rows.length) return rows;
  const dateKeys = Object.keys(rows[0]).filter(k => k.toLowerCase().includes("date"));
  if (!dateKeys.length) return rows;
  return rows.map(r => {
    const copy = {...r};
    dateKeys.forEach(k => {
      const dt = getDateFromCell(copy[k]);
      if (dt) copy[k] = formatDateFR(dt);
    });
    return copy;
  });
}

async function chargerExcel() {
  const response = await fetch("resi_final_.xlsx");
  const arrayBuffer = await response.arrayBuffer();
  const data = new Uint8Array(arrayBuffer);
  const workbook = XLSX.read(data, { type: "array" });
  const sheet = workbook.Sheets[workbook.SheetNames[0]];
  dataGlobal = XLSX.utils.sheet_to_json(sheet);
  dataFiltre = dataGlobal;
  window._resiDataReady = true;

  mettreAJourAffichage();

  document.getElementById("search").addEventListener("keyup", function () {
    const valeur = this.value.toLowerCase();
    dataFiltre = dataGlobal.filter(row =>
      Object.values(row).some(v => String(v).toLowerCase().includes(valeur))
    );
    mettreAJourAffichage();
  });
}

// Fonction centrale de parsing du récurrent — robuste à l'encodage et au format
function parseRecurent(row) {
  // Détection dynamique de la clé (accent, espace, casse...)
  const key = Object.keys(row).find(k => k.replace(/\s/g,'').toLowerCase() === 'récurent'
    || k.replace(/\s/g,'').toLowerCase() === 'recurrent'
    || k.replace(/\s/g,'').toLowerCase() === 'r\u00e9curent');
  const val = key ? row[key] : null;
  if (val == null || val === '') return 0;
  // Si c'est déjà un nombre (XLSX parse parfois directement en Number)
  if (typeof val === 'number') return val;
  // Sinon nettoyage string : espaces, points séparateurs de milliers, virgule décimale
  const s = String(val)
    .replace(/\s/g, '')           // espaces insécables et normaux
    .replace(/\.(?=\d{3})/g, '')  // points séparateurs de milliers (1.500.000)
    .replace(',', '.');            // virgule décimale → point
  return parseFloat(s) || 0;
}

function mettreAJourAffichage() {
  afficherKPI(dataFiltre);
  afficherKPI2026(dataFiltre);
  afficherTableauMensuel(dataFiltre);

  let totalTrie = [...dataFiltre].sort((a, b) => {
    let da = getDateFromCell(a["Date résiliation "] || a["Date résiliation"]);
    let db = getDateFromCell(b["Date résiliation "] || b["Date résiliation"]);
    return (db?db.getTime():0) - (da?da.getTime():0);
  });

  const uniquement2026 = totalTrie.filter(r => {
    let d = getDateFromCell(r["Date résiliation "] || r["Date résiliation"]);
    return d && d.getFullYear() === 2026;
  });

  // Calcul récurrent sur données brutes (avant formatDatesInRows qui ne touche pas Récurent)
  let sommeRecurent = uniquement2026.reduce((acc, row) => acc + parseRecurent(row), 0);

  const totalFormate = formatDatesInRows(uniquement2026);
  afficherTableau(totalFormate, "tableau");
  afficherTableauResume(totalFormate);

  document.getElementById("titre-resi").innerText =
    "Liste totale des résiliations 2026 (" + totalFormate.length + ") - Total Récurent : " +
    Math.round(sommeRecurent).toLocaleString("fr-FR") + " FCFA";
}

function afficherKPI(data) {
  const produits = ["LS", "LSI", "T0", "T2"];
  let html = "";
  produits.forEach(p => {
    const filtres = data.filter(d => d["Produit"] === p);
    html += `<div class="kpi">${p} : ${filtres.length}</div>`;
  });
  document.getElementById("kpis").innerHTML = html;
}


function afficherKPI2026(data) {
  const uniquement2026 = data.filter(r => {
    let d = getDateFromCell(r["Date résiliation "] || r["Date résiliation"]);
    return d && d.getFullYear() === 2026;
  });

  const produits = ["LS", "LSI", "T0", "T2"];
  let html = "";
  produits.forEach(p => {
    const filtres = uniquement2026.filter(d => d["Produit"] === p);
    html += `<div class="kpi">${p} : ${filtres.length}</div>`;
  });
  document.getElementById("kpis2026").innerHTML = html;
}

function afficherTableauMensuel(data) {
  let volumes = {};
  let recurents = {};
  let details = {};

  data.forEach(d => {
    let dateRes = getDateFromCell(d["Date résiliation"] || d["Date résiliation "]);
    if (!dateRes) return;
    const mois = dateRes.getMonth();
    const annee = dateRes.getFullYear();
    const cle = annee + "-" + mois;
    if (!volumes[cle]) { volumes[cle] = 0; recurents[cle] = 0; details[cle] = []; }
    volumes[cle]++;
    recurents[cle] += parseRecurent(d);
    details[cle].push(d);
  });

  const moisLabels = ["Jan", "Fév", "Mar", "Avr", "Mai", "Juin",
                      "Juil", "Août", "Sep", "Oct", "Nov", "Déc"];

  let annees = [...new Set(Object.keys(volumes).map(k => k.split("-")[0]))].sort();
  let html = "<table><thead><tr>"
    + "<th>Année</th><th>Total</th>"
    + moisLabels.map(m => "<th>" + m + "</th>").join("")
    + "</tr></thead><tbody>";

  annees.forEach(annee => {
    let totalAnnuel = 0;
    let totalRecAnnuel = 0;
    for (let m = 0; m < 12; m++) {
      const cle = annee + "-" + m;
      totalAnnuel   += volumes[cle]   || 0;
      totalRecAnnuel += recurents[cle] || 0;
    }

    // Ligne volumes
    html += "<tr><td><b>" + annee + "</b></td><td style='font-weight:bold'>" + totalAnnuel + "</td>";
    for (let m = 0; m < 12; m++) {
      const cle = annee + "-" + m;
      const val = volumes[cle] || 0;
      if (val > 0) {
        html += `<td style="cursor:pointer;color:blue;text-decoration:underline" onclick="afficherPopupClients('${annee}', ${m})">${val}</td>`;
      } else {
        html += "<td>0</td>";
      }
    }
    html += "</tr>";

    // Ligne récurrent (sous chaque année)
    html += "<tr style='background:#fff8f0;font-size:11px;color:#c2440f;'>";
    html += "<td style='padding-left:10px;font-style:italic;white-space:nowrap;'>↳ Récurent (FCFA)</td>";
    html += "<td style='font-weight:bold;white-space:nowrap;text-align:right;'>"
      + Math.round(totalRecAnnuel).toLocaleString("fr-FR") + "</td>";
    for (let m = 0; m < 12; m++) {
      const cle = annee + "-" + m;
      const rec = recurents[cle] || 0;
      html += "<td style='white-space:nowrap;text-align:right;'>"
        + (rec > 0 ? Math.round(rec).toLocaleString("fr-FR") : "-") + "</td>";
    }
    html += "</tr>";
  });

  html += "</tbody></table>";
  document.getElementById("tableau-mensuel").innerHTML = html;
  window.detailsMensuels = details;
}

function afficherPopupClients(annee, mois) {
  const cle = annee + "-" + mois;
  const rows = window.detailsMensuels[cle] || [];
  if (!rows.length) return;

  let total = rows.length;
  let moisNom = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'][mois];
  let html = `<h3>Résiliations ${moisNom} ${annee} (${total})</h3>`;
  html += `<button onclick="exporterTableau('popupContent', 'Resiliations_${annee}_${mois+1}.xlsx')">📤 Exporter ce tableau</button>`;
  html += "<div class='tableau-scroll'><table><thead><tr><th>Client</th><th>Produit</th><th>ND</th><th>Récurent</th><th>Date</th><th>Motif</th></tr></thead><tbody>";

  rows.forEach(r => {
    html += "<tr><td>"+(r["Clients"]||"")+"</td><td>"+(r["Produit"]||"")+"</td><td>"+(r["ND"]||"")+"</td><td>"+(r["Récurent"]||"")+"</td><td>"+formatDateFR(getDateFromCell(r["Date résiliation"]||r["Date résiliation "]))+"</td><td>"+(r["Motif de résiliation"]||"")+"</td></tr>";
  });

  html += "</tbody></table></div>";

  document.getElementById("popupContent").innerHTML = html;
  document.getElementById("popup").style.display = "block";
}

function afficherTableau(data, id) {
  if (!data.length) { document.getElementById(id).innerHTML=""; return; }
  const cols = Object.keys(data[0]);
  let html = "<div class='tableau-scroll'><table><thead><tr><th>#</th>"+cols.map(c=>"<th>"+c+"</th>").join("")+"</tr></thead><tbody>";
  data.forEach((row, i)=>{
    html+="<tr><td>"+(i+1)+"</td>"+cols.map(c=>"<td>"+(row[c]||"")+"</td>").join("")+"</tr>";
  });
  html+="</tbody></table></div>";
  document.getElementById(id).innerHTML = html;
}

function normaliserClient(nom) {
  if (!nom) return "INCONNU";
  let n = nom.toUpperCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^A-Z0-9 ]/g," ")
    .replace(/\b(SA|SAS|SARL|CI|COTE DIVOIRE|COTE D IVOIRE|INTERNATIONAL|LIMITED|LTD)\b/g, "")
    .replace(/\s+/g," ")
    .trim();

  if (n.includes("ORANGE BUSINESS")) return "ORANGE BUSINESS SERVICES";
  if (n.includes("STANDARD CHARTERED")) return "STANDARD CHARTERED BANK";
  if (n.includes("ECOBANK")) return "ECOBANK";
  if (n.includes("CFAO")) return "CFAO";
  if (n.includes("AIR COTE DIVOIRE")) return "AIR COTE DIVOIRE";
  if (n.includes("MULTIMEDIA")) return "COTE D'IVOIRE MULTIMEDIA";
  if (n.includes("BRASSIVOIRE")) return "BRASSIVOIRE";
  if (n.includes("SUNU ASSURANCES")) return "SUNU ASSURANCES";
  if (n.includes("VIPNET")) return "VIPNET";   // ✅ Nouvelle règle ajoutée

  return n;
}

function levenshtein(a, b) {
  if (!a || !b) return Math.max(a?.length||0, b?.length||0);
  let matrix = [];
  let i, j;
  for (i = 0; i <= b.length; i++) {
    matrix[i] = [i];
  }
  for (j = 0; j <= a.length; j++) {
    matrix[0][j] = j;
  }
  for (i = 1; i <= b.length; i++) {
    for (j = 1; j <= a.length; j++) {
      if (b.charAt(i-1) == a.charAt(j-1)) {
        matrix[i][j] = matrix[i-1][j-1];
      } else {
        matrix[i][j] = Math.min(
          matrix[i-1][j-1] + 1,
          Math.min(matrix[i][j-1] + 1, matrix[i-1][j] + 1)
        );
      }
    }
  }
  return matrix[b.length][a.length];
}

function trouverGroupeSimilaire(groupes, nom, seuil=3) {
  let minDist = Infinity;
  let best = null;
  for (let g in groupes) {
    let d = levenshtein(nom, g);
    if (d < minDist && d <= seuil) {
      minDist = d;
      best = g;
    }
  }
  return best;
}

function afficherTableauResume(data) {
  if (!data.length) return;
  const groupes = {};

  data.forEach(row => {
    
    let cle = normaliserClient(row["Clients"]);
    let similaire = trouverGroupeSimilaire(groupes, cle);
    if (similaire) cle = similaire;
    
    if (!groupes[cle]) groupes[cle] = { volume: 0, recurent: 0, originaux: [] };
    groupes[cle].volume++;
    groupes[cle].originaux.push(row["Clients"]);
    const montant = String(row["Récurent"] || "0").replace(/\./g,"").replace(",",".");
    groupes[cle].recurent += Number(montant);
  });

  let html = "<div class='tableau-scroll'><table><thead><tr><th>Client regroupé</th><th>Volume</th></tr></thead><tbody>";
  Object.entries(groupes)
    .sort((a,b) => b[1].volume - a[1].volume) // tri par volume décroissant
    .forEach(([groupe, data]) => {
      html += `<tr><td>${groupe}</td><td style="cursor:pointer;color:blue;text-decoration:underline" onclick="afficherPopupClientsRegroupes('${groupe}')">${data.volume}</td></tr>`;
    });
  html += "</tbody></table></div>";

  document.getElementById("tableau-par-client").innerHTML = html;
  window.groupesResume = groupes;
  const titreClient = document.getElementById("titre-par-client");
  if (titreClient) {
    const nbClients = Object.keys(groupes).length;
    titreClient.innerText = "Résiliations par client 2026 (" + nbClients + ")";
  }
}

function exporterTableau(idDiv, nomFichier) {
  const table = document.querySelector(`#${idDiv} table`);
  if (!table) { alert("Tableau introuvable !"); return; }

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.table_to_sheet(table);
  XLSX.utils.book_append_sheet(wb, ws, "Feuille1");

  XLSX.writeFile(wb, nomFichier);
}


function afficherPopupClientsRegroupes(groupe) {
  const clients = window.groupesResume[groupe]?.originaux || [];
  if (!clients.length) return;
  let html = `<h3>Clients regroupés sous ${groupe}</h3><ul>`;
  clients.forEach(c => { html += "<li>" + c + "</li>"; });
  html += "</ul>";
  document.getElementById("popupContent").innerHTML = html;
  document.getElementById("popup").style.display = "block";
}

chargerExcel();
</script>

<h2 id="titre-par-motif">Résiliations par motif 2026</h2>
<div id="tableau-par-motif"></div>
<button onclick="exporterTableau('tableau-par-motif', 'Resiliations_motif.xlsx')">📤 Exporter ce tableau</button>
<script>
let motifsDetails = {};

function afficherTableauParMotif(data) {
  if (!data.length) return;
  const motifs = {};
  motifsDetails = {};
  data.forEach(row => {
    let motif = row["Motif de résiliation"] || "INCONNU";
    if (!motifs[motif]) { motifs[motif] = 0; motifsDetails[motif] = []; }
    motifs[motif]++;
    motifsDetails[motif].push(row);
  });

  let html = "<div class='tableau-scroll'><table><thead><tr><th>Motif</th><th>Volume</th></tr></thead><tbody>";
  Object.entries(motifs)
    .sort((a,b) => b[1] - a[1]) // tri par volume décroissant
    .forEach(([motif, vol]) => {
      html += `<tr><td>${motif}</td><td style="cursor:pointer;color:blue;text-decoration:underline" onclick="afficherPopupMotif('${motif}')">${vol}</td></tr>`;
    });
  html += "</tbody></table></div>";
  document.getElementById("tableau-par-motif").innerHTML = html;
  document.getElementById("titre-par-motif").innerText =
    "Résiliations par motif 2026 (" + Object.keys(motifs).length + ")";
}

function afficherPopupMotif(motif) {
  const rows = motifsDetails[motif] || [];
  if (!rows.length) return;
  let html = `<h3>Résiliations pour le motif : ${motif}</h3>`;
  html += `<button onclick="exporterTableau('popupContent', 'Resiliations_${motif}.xlsx')">📤 Exporter ce tableau</button>`;
  html += "<div class='tableau-scroll'><table><thead><tr><th>Client</th><th>Produit</th><th>ND</th><th>Récurent</th><th>Date</th><th>Motif</th></tr></thead><tbody>";
  rows.forEach(r => {
    html += "<tr><td>"+(r["Clients"]||"")+"</td><td>"+(r["Produit"]||"")+"</td><td>"+(r["ND"]||"")+"</td><td>"+(r["Récurent"]||"")+"</td><td>"+formatDateFR(getDateFromCell(r["Date résiliation"]||r["Date résiliation "]))+"</td><td>"+(r["Motif de résiliation"]||"")+"</td></tr>";
  });
  html += "</tbody></table></div>";
  document.getElementById("popupContent").innerHTML = html;
  document.getElementById("popup").style.display = "block";
}

// Injection dans mettreAJourAffichage
const oldMettreAJour = mettreAJourAffichage;
mettreAJourAffichage = function() {
  oldMettreAJour();
  const uniquement2026 = dataFiltre.filter(r => {
    let d = getDateFromCell(r["Date résiliation "] || r["Date résiliation"]);
    return d && d.getFullYear() === 2026;
  });
  const totalFormate = formatDatesInRows(uniquement2026);
  afficherTableauParMotif(totalFormate);
}
</script>

<script>
window.addEventListener('load', function() {

  var popSum  = document.getElementById('popup-resi-summary');
  var popDet  = document.getElementById('popup-resi-detail');
  var sumBody = document.getElementById('resi-sum-body');
  var detBody = document.getElementById('resi-det-body');
  var detTitle= document.getElementById('resi-det-title');
  var badge   = document.getElementById('resi-sum-badge');

  document.getElementById('btn-summary-resi').addEventListener('click', function() {
    var data = (typeof dataFiltre !== 'undefined' && dataFiltre && dataFiltre.length) ? dataFiltre
             : (typeof dataGlobal !== 'undefined' && dataGlobal && dataGlobal.length) ? dataGlobal : null;
    if (!data || !data.length) { alert('Données non encore chargées. Patientez quelques secondes et réessayez.'); return; }
    buildSummary(data);
    popSum.style.display = 'flex';
  });

  document.getElementById('btn-close-sum').addEventListener('click', function() {
    popSum.style.display = 'none';
    popDet.style.display = 'none';
  });
  document.getElementById('btn-close-det').addEventListener('click', function() {
    popDet.style.display = 'none';
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { popSum.style.display='none'; popDet.style.display='none'; }
  });

  // ── Helpers ────────────────────────────────────────────────────
  function getDate(v) {
    if (!v) return null;
    if (v instanceof Date && !isNaN(v)) return v;
    if (typeof v === 'number') { var d=new Date(new Date(1899,11,30).getTime()+v*86400000); return isNaN(d)?null:d; }
    var m=String(v).match(/(\d{1,2})[\/-](\d{1,2})[\/-](\d{4})/);
    if(m) return new Date(+m[3],+m[2]-1,+m[1]);
    return null;
  }
  function fmt(n) { return Math.round(n).toLocaleString('fr-FR'); }
  var MN = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  var ML = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  function mtnt(r) {
    var s=String(r['Récurent']||'0').replace(/\s/g,'').replace(/\.(?=\d{3})/g,'').replace(',','.');
    return parseFloat(s)||0;
  }
  function normCl(s) {
    if(!s) return '';
    s=String(s).toUpperCase().trim();
    if(/MUGEF|MUTUELLE G/.test(s)) return 'MUGEF CI';
    if(/CANAL/.test(s)) return 'CANAL+';
    if(/UCP SANTE|UNITE DE COORD/.test(s)) return 'UCP SANTÉ BM';
    if(/STE DICK JOEL/.test(s)) return 'STE DICK JOEL';
    if(/AMBASSADE.*ETATS|AMBASSADE.*USA/.test(s)) return 'AMBASSADE USA';
    return s.length>38 ? s.slice(0,38)+'…' : s;
  }
  function el(tag, css, txt) {
    var e=document.createElement(tag);
    if(css) e.style.cssText=css;
    if(txt!==undefined) e.textContent=txt;
    return e;
  }
  function card(titre) {
    var w=el('div','background:white;border-radius:12px;box-shadow:0 2px 8px rgba(124,58,237,.09);padding:12px;margin-bottom:12px;');
    var h=el('h3','margin:0 0 12px;font-size:11px;color:#4c1d95;border-bottom:2px solid #ede9fe;padding-bottom:4px;font-weight:700;',titre);
    w.appendChild(h); return w;
  }
  function barRow(label, val, maxV, color, clickFn) {
    var pct=maxV>0?Math.round((val/maxV)*100):0;
    var d=el('div','display:flex;align-items:center;gap:10px;padding:5px 3px;cursor:pointer;border-radius:6px;');
    d.onmouseover=function(){this.style.background='#f5f3ff';};
    d.onmouseout =function(){this.style.background='';};
    if(clickFn) d.addEventListener('click',clickFn);
    var lbl=el('div','width:185px;font-size:11px;color:#374151;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;');
    lbl.title=label; lbl.textContent=label;
    var track=el('div','flex:1;background:#f3f4f6;border-radius:4px;height:11px;');
    var fill=el('div','width:'+pct+'%;background:'+color+';border-radius:4px;height:11px;');
    track.appendChild(fill);
    var num=el('div','width:42px;text-align:right;font-size:11px;font-weight:700;color:'+color+';',''+val);
    d.appendChild(lbl); d.appendChild(track); d.appendChild(num);
    return d;
  }
  function kpiTile(label, val, sub, color, clickFn) {
    var d=el('div','flex:1;min-width:100px;background:#faf5ff;border:2px solid #ede9fe;border-radius:11px;padding:8px;text-align:center;cursor:'+(clickFn?'pointer':'default')+';transition:border-color .15s;');
    d.onmouseover=function(){if(clickFn)this.style.borderColor=color;};
    d.onmouseout =function(){this.style.borderColor='#ede9fe';};
    if(clickFn) d.addEventListener('click',clickFn);
    d.appendChild(el('div','font-size:32px;font-weight:900;color:'+color+';',''+val));
    d.appendChild(el('div','font-size:9px;color:#6b7280;margin-top:2px;font-weight:600;',label));
    if(sub) d.appendChild(el('div','font-size:9px;color:#9ca3af;margin-top:1px;',sub));
    return d;
  }

  // ── Tableau détail ─────────────────────────────────────────────
  function showDetail(titre, rows) {
    if(!rows||!rows.length){alert('Aucune donnée.');return;}
    detTitle.innerHTML = '&#128269; '+titre+' <span style="font-size:11px;font-weight:400;">('+rows.length+' ligne'+(rows.length>1?'s':'')+')</span>';
    var cols=['Clients','Produit','ND','Récurent','Date résiliation ','Motif de résiliation','Type de résiliation'];
    var tbl=document.createElement('table');
    tbl.style.cssText='width:100%;border-collapse:collapse;font-size:11px;';
    var thead=document.createElement('thead');
    var hr=document.createElement('tr');
    hr.style.cssText='background:linear-gradient(135deg,#7c3aed,#5b21b6);color:white;position:sticky;top:0;';
    cols.forEach(function(col){
      var th=document.createElement('th');
      th.style.cssText='padding:6px 5px;text-align:left;white-space:nowrap;';
      th.textContent=col; hr.appendChild(th);
    });
    thead.appendChild(hr); tbl.appendChild(thead);
    var tbody=document.createElement('tbody');
    rows.forEach(function(r,i){
      var tr=document.createElement('tr');
      tr.style.background=i%2===0?'#fff':'#faf5ff';
      cols.forEach(function(col){
        var td=document.createElement('td');
        td.style.cssText='padding:5px 6px;border-bottom:1px solid #f3f4f6;';
        var v=r[col]!=null?r[col]:'';
        if(col.includes('Date')&&v){var dt=getDate(v);if(dt)v=dt.toLocaleDateString('fr-FR');}
        if(col==='Récurent'&&v){td.style.cssText+='text-align:right;font-weight:700;color:#7c3aed;';v=fmt(v)+' FCFA';}
        td.textContent=String(v);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);
    detBody.innerHTML=''; detBody.appendChild(tbl);
    popDet.style.display='flex';
  }

  // ── Build Summary ──────────────────────────────────────────────
  function buildSummary(data) {
    badge.textContent = data.length+' résiliations';
    sumBody.innerHTML = '';

    var totRec=0, motifs={}, produits={}, typeResi={}, moisMap={}, clients={}, recParMotif={}, recurring={}, dataParMois={};

    data.forEach(function(r){
      var m=mtnt(r); totRec+=m;
      var motif=String(r['Motif de résiliation']||'(non renseigné)').trim()||'(non renseigné)';
      motifs[motif]=(motifs[motif]||0)+1; recParMotif[motif]=(recParMotif[motif]||0)+m;
      var prod=String(r['Produit']||'(vide)').trim();
      produits[prod]=(produits[prod]||0)+1;
      var tr2=String(r['Type de résiliation']||'(vide)').trim();
      typeResi[tr2]=(typeResi[tr2]||0)+1;
      var dt=getDate(r['Date résiliation ']||r['Date résiliation']);
      if(dt){var k=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');moisMap[k]=(moisMap[k]||0)+1;if(!dataParMois[k])dataParMois[k]=[];dataParMois[k].push(r);}
      var cl=normCl(r['Clients']);
      if(cl){if(!clients[cl])clients[cl]={count:0,rec:0,rows:[]};clients[cl].count++;clients[cl].rec+=m;clients[cl].rows.push(r);}
      var clB=String(r['Clients']||'').trim();
      if(clB) recurring[clB]=(recurring[clB]||0)+1;
    });

    function sorted(obj){return Object.entries(obj).sort(function(a,b){return b[1]-a[1];});}

    // KPIs
    var cKpi=card('\uD83D\uDD22 Indicateurs clés');
    var kpiRow=el('div','display:flex;gap:10px;flex-wrap:wrap;');
    var mKeys=Object.keys(moisMap).sort();
    var mPic=mKeys.reduce(function(a,b){return (moisMap[a]||0)>(moisMap[b]||0)?a:b;},mKeys[0]||'');
    var tMot=sorted(motifs)[0]; var tProd=sorted(produits)[0];
    var multi=Object.values(recurring).filter(function(v){return v>1;}).length;
    [
      ['Total résiliations', data.length, '', '#7c3aed', function(){showDetail('Toutes les résiliations',data);}],
      ['Récurent perdu', fmt(totRec)+' FCFA', '', '#dc2626', null],
      ['Produit dominant', tProd?tProd[0]:'—', tProd?tProd[1]+' rés.':'', '#0284c7', tProd?function(){showDetail('Produit: '+tProd[0],data.filter(function(r){return (r['Produit']||'').trim()===tProd[0];}));}:null],
      ['Cause principale', tMot?tMot[0]:'—', tMot?tMot[1]+' cas':'', '#ea580c', tMot?function(){showDetail('Motif: '+tMot[0],data.filter(function(r){return (String(r['Motif de résiliation']||'').trim()||'(non renseigné)')===tMot[0];}));}:null],
      ['Mois pic', mPic?ML[+mPic.split('-')[1]-1]:'—', mPic?moisMap[mPic]+' rés.':'', '#7c3aed', mPic?function(){showDetail('Mois '+mPic,dataParMois[mPic]||[]);}:null],
      ['Multi-résiliations', multi, 'clients ≥2 fois', '#b45309', null]
    ].forEach(function(k){kpiRow.appendChild(kpiTile(k[0],k[1],k[2],k[3],k[4]));});
    cKpi.appendChild(kpiRow); sumBody.appendChild(cKpi);

    // Fréquence par mois
    var cMois=card('\uD83D\uDCC5 Fréquence par mois');
    var mBar=el('div','display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;');
    var maxM=Math.max.apply(null,Object.values(moisMap).concat([1]));
    Object.keys(moisMap).sort().forEach(function(k){
      var v=moisMap[k], h=Math.round((v/maxM)*80)+12;
      var isPic=k===mPic;
      var col=el('div','flex:1;min-width:55px;text-align:center;cursor:pointer;');
      col.title=ML[+k.split('-')[1]-1]+' '+k.split('-')[0]+': '+v+' rés.';
      col.addEventListener('click',(function(kk){return function(){showDetail('Résiliations '+kk,dataParMois[kk]||[]);};})(k));
      col.appendChild(el('div','font-size:10px;font-weight:700;color:#4c1d95;margin-bottom:2px;',''+v));
      var bar=el('div','height:'+h+'px;background:'+(isPic?'#7c3aed':'#a78bfa')+';border-radius:6px 6px 0 0;transition:opacity .2s;');
      bar.onmouseover=function(){this.style.opacity='0.7';};
      bar.onmouseout=function(){this.style.opacity='1';};
      col.appendChild(bar);
      col.appendChild(el('div','font-size:9px;color:#6b7280;margin-top:2px;',MN[+k.split('-')[1]-1]+(isPic?' 🔺':'')));
      mBar.appendChild(col);
    });
    cMois.appendChild(mBar); sumBody.appendChild(cMois);

    // Grid 2 colonnes
    function grid2(a, b) {
      var g=el('div','display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;');
      g.appendChild(a); g.appendChild(b); sumBody.appendChild(g);
    }

    // Causes
    var cMotif=card('\uD83D\uDD0E Causes de résiliation');
    var sMotif=sorted(motifs); var maxMot=sMotif[0]?sMotif[0][1]:1;
    sMotif.forEach(function(e){cMotif.appendChild(barRow(e[0],e[1],maxMot,'#7c3aed',(function(mot){return function(){showDetail('Motif: '+mot,data.filter(function(r){return (String(r['Motif de résiliation']||'').trim()||'(non renseigné)')===mot;}));};})(e[0])));});

    // Produits
    var cProd=card('\uD83D\uDCE6 Par produit'); 
    var sProd=sorted(produits); var maxProd=sProd[0]?sProd[0][1]:1;
    sProd.forEach(function(e){cProd.appendChild(barRow(e[0],e[1],maxProd,'#0284c7',(function(p){return function(){showDetail('Produit: '+p,data.filter(function(r){return (r['Produit']||'').trim()===p;}));};})(e[0])));});
    grid2(cMotif, cProd);

    // Top clients
    var cCli=card('\uD83C\uDFE2 Top clients résiliés');
    var sCli=Object.entries(clients).sort(function(a,b){return b[1].rec-a[1].rec;}).slice(0,12);
    var maxCli=sCli.length?Math.max.apply(null,sCli.map(function(x){return x[1].count;})):1;
    sCli.forEach(function(e){
      var lbl=e[0]+' ('+e[1].count+' rés.) — '+fmt(e[1].rec)+' FCFA';
      cCli.appendChild(barRow(lbl,e[1].count,maxCli,'#dc2626',(function(rows,name){return function(){showDetail('Client: '+name,rows);};})(e[1].rows,e[0])));
    });

    // Récurent par cause
    var cRecM=card('\uD83D\uDCB8 Récurent perdu par cause');
    var sRecM=Object.entries(recParMotif).sort(function(a,b){return b[1]-a[1];});
    var maxRM=sRecM[0]?sRecM[0][1]:1;
    sRecM.forEach(function(e){
      var lbl=e[0]+' — '+fmt(e[1])+' FCFA';
      cRecM.appendChild(barRow(lbl,Math.round(e[1]/1000),Math.round(maxRM/1000),'#ea580c',(function(mot){return function(){showDetail('Motif: '+mot,data.filter(function(r){return (String(r['Motif de résiliation']||'').trim()||'(non renseigné)')===mot;}));};})(e[0])));
    });
    grid2(cCli, cRecM);

    // Multi-résiliations
    var multi2=Object.entries(recurring).filter(function(e){return e[1]>1;}).sort(function(a,b){return b[1]-a[1];});
    if(multi2.length){
      var cM=card('\u26A0\uFE0F Clients avec résiliations multiples');
      var g=el('div','display:flex;flex-wrap:wrap;gap:8px;');
      multi2.forEach(function(e){
        var b=el('span','background:#fef3c7;border:1px solid #fbbf24;color:#92400e;border-radius:8px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;');
        b.textContent=(e[0].length>42?e[0].slice(0,42)+'…':e[0])+' ×'+e[1];
        b.title=e[0];
        b.addEventListener('click',(function(cl){return function(){showDetail('Client: '+cl,data.filter(function(r){return String(r['Clients']||'').trim()===cl;}));};})(e[0]));
        g.appendChild(b);
      });
      cM.appendChild(g); sumBody.appendChild(cM);
    }

    // Type résiliation
    var cType=card('\uD83D\uDCCB Type de résiliation');
    var tRow=el('div','display:flex;gap:10px;flex-wrap:wrap;');
    sorted(typeResi).forEach(function(e){
      var pct=Math.round((e[1]/data.length)*100);
      var t=el('div','flex:1;min-width:120px;background:#faf5ff;border:2px solid #ede9fe;border-radius:11px;padding:8px;text-align:center;cursor:pointer;');
      t.onmouseover=function(){this.style.borderColor='#7c3aed';};
      t.onmouseout=function(){this.style.borderColor='#ede9fe';};
      t.addEventListener('click',(function(tv){return function(){showDetail('Type: '+tv,data.filter(function(r){return String(r['Type de résiliation']||'').trim()===tv;}));};})(e[0]));
      t.appendChild(el('div','font-size:18px;font-weight:800;color:#7c3aed;',''+e[1]));
      t.appendChild(el('div','font-size:10px;color:#374151;margin-top:2px;font-weight:600;',e[0]||'(vide)'));
      t.appendChild(el('div','font-size:9px;color:#9ca3af;',pct+'% du total'));
      tRow.appendChild(t);
    });
    cType.appendChild(tRow); sumBody.appendChild(cType);
  }

}); // end window.load
</script>

</body>
</html>
