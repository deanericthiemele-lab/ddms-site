<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Suivi des Dossiers</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Firebase Realtime Database -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcXkL5jdFj9TDsKAhIXds_bl82v24U5xw",
  authDomain: "production-c3930.firebaseapp.com",
  projectId: "production-c3930",
  databaseURL: "https://production-c3930-default-rtdb.europe-west1.firebasedatabase.app",
  storageBucket: "production-c3930.firebasestorage.app",
  messagingSenderId: "69326528736",
  appId: "1:69326528736:web:b8c1fa13421728ddc73885"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window._statuts = {};

// Charger tous les statuts et ecouter les changements
onValue(ref(db, "statuts_dossiers"), (snapshot) => {
  const data = snapshot.val() || {};
  window._statuts = data;
  // Mettre a jour les champs visibles
  document.querySelectorAll(".statut-input").forEach(inp => {
    const id = inp.dataset.id;
    if(id && data[id] !== undefined && document.activeElement !== inp){
      inp.value = data[id];
    }
  });
});

window._saveStatut = async function(id, val) {
  if(!id) return;
  // Remplacer les caracteres interdits dans les cles Firebase
  const safeKey = id.replace(/[.#$\[\]/]/g, "_");
  try {
    await set(ref(db, "statuts_dossiers/" + safeKey), val);
    window._statuts[safeKey] = val;
  } catch(e) {
    console.error("Erreur Firebase:", e);
  }
};

window._getStatut = function(id) {
  const safeKey = id.replace(/[.#$\[\]/]/g, "_");
  return window._statuts[safeKey] || "";
};
</script>

<style>
body{font-family:Arial,sans-serif;margin:10px;font-size:14px}
button{background:#d3d3d3;border:none;padding:6px 10px;border-radius:6px;font-size:13px;cursor:pointer;margin-right:6px}
button:hover{filter:brightness(.95)}
h1{border:1px solid #ccc;border-radius:6px;padding:8px;font-size:16px;font-weight:bold;margin-bottom:6px}
.subresume{border:1px solid #ccc;border-radius:6px;padding:8px;font-size:15px;font-weight:bold;margin-bottom:10px}
.search-zone{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.search-zone input[type="text"]{padding:6px 8px;border:1px solid #aaa;border-radius:6px;width:280px}
table{border-collapse:collapse;width:100%;margin-top:10px}
th,td{border:1px solid #ccc;padding:6px}
th{background:#eee}
td.num{text-align:right}
.statut-input{
  width:160px;padding:4px 6px;border:1px solid #bbb;
  border-radius:4px;font-size:13px;background:#fffde7;
  transition:border-color 0.2s, background 0.2s;
}
.statut-input:focus{outline:none;border-color:#f59e0b;background:#fff8e1;}
.statut-input.saved{border-color:#22c55e;background:#f0fdf4;}
.popup{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:1000}
.popup-content{background:#fff;border-radius:8px;padding:15px;width:1100px;max-height:85vh;overflow:auto}
.popup-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.close{cursor:pointer;font-weight:bold;font-size:18px}
</style>
</head>
<body>

<button onclick="location.href='index.html'">Retour</button>
<button onclick="location.href='recu prod.html'">Suivi CA</button>
<button onclick="location.href='suivi_dossiers2.html'">PIPE</button>
<button onclick="location.href='livraison.html'">Dossiers livrés</button>
<button id="btnNettoyage">Dossiers à geler</button>

<h1 id="resume">Dossiers : 0</h1>
<div class="subresume" id="subresume">LS : 0 | LSI : 0 | Numérique : 0</div>

<div class="search-zone">
  <input type="text" id="searchInput" placeholder="Rechercher ID, client ou type abonnement"/>
  <input type="file" id="fileInput" accept=".xlsx,.xls"/>
  <button id="btnExport">Exporter</button>
  <button id="btnSaveAll">💾 Enregistrer statuts</button>
</div>

<table id="tableDossiers">
<thead>
<tr>
<th>ID DOSSIER</th>
<th>DATE CREATION DOSSIER</th>
<th>DURÉE (j)</th>
<th>ETAPE</th>
<th>STATUT</th>
<th>CLIENT</th>
<th>TYPE ABONNEMENT</th>
<th>SUPPORT</th>
<th>ADR. GEO</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="popup" id="popupNettoyage">
 <div class="popup-content">
  <div class="popup-header">
   <h2 id="popupNettoyageTitle">Dossiers à geler</h2>
   <span class="close" onclick="closeNettoyage()">✕</span>
  </div>
  <table id="tableNettoyage">
   <thead><tr>
     <th>ID DOSSIER</th><th>DATE CREATION DOSSIER</th>
     <th>DURÉE GLOBALE</th><th>DURÉE ETAPE</th>
     <th>ETAPE</th><th>CLIENT</th><th>TYPE ABONNEMENT</th>
     <th>SUPPORT</th><th>ADR. GEO</th>
   </tr></thead>
   <tbody></tbody>
  </table>
 </div>
</div>

<script>
let dossiersGlobal=[], dossiersNettoyage=[];

function parseDate(v){
 if(!v) return null;
 if(typeof v==="number"){
  const d=XLSX.SSF.parse_date_code(v);
  return d?new Date(d.y,d.m-1,d.d):null;
 }
 const d=new Date(v);
 return isNaN(d)?null:d;
}
function formatDate(v){
 const d=parseDate(v);
 return !d?"":d.toLocaleDateString("fr-FR");
}
function daysBetween(date){
 const today=new Date();today.setHours(0,0,0,0);
 const d=parseDate(date);
 if(!d) return 0;
 return Math.floor((today-d)/(1000*60*60*24));
}

const pipeFiles=["pipe.xlsx"];

function dedupeById(rows){
 const map=new Map();
 rows.forEach(r=>{
  const id=(r["ID DOSSIER"]||"").toString().trim();
  if(id && !map.has(id)) map.set(id,r);
 });
 return Array.from(map.values());
}

function makeStatutInput(id){
 const val = window._getStatut ? window._getStatut(id) : "";
 const safeId = id.replace(/"/g,"&quot;");
 const safeVal = val.replace(/"/g,"&quot;");
 return `<input class="statut-input" data-id="${safeId}" maxlength="20" value="${safeVal}" placeholder="Statut..."/>`;
}

function attachStatutListeners(){
 document.querySelectorAll(".statut-input").forEach(inp=>{
  const clone=inp.cloneNode(true);
  inp.parentNode.replaceChild(clone,inp);
 });
 document.querySelectorAll(".statut-input").forEach(inp=>{
  inp.addEventListener("input", async function(){
   if(this.value.length>20) this.value=this.value.slice(0,20);
   const id=this.dataset.id;
   const val=this.value;
   if(window._saveStatut){
    await window._saveStatut(id,val);
    this.classList.add("saved");
    setTimeout(()=>this.classList.remove("saved"),1000);
   }
  });
 });
}

async function loadPipe(){
 for(const f of pipeFiles){
  try{
   const r=await fetch(f+"?v="+Date.now());
   if(!r.ok) continue;
   const b=await r.arrayBuffer();
   const wb=XLSX.read(b,{type:"array"});
   const ws=wb.Sheets[wb.SheetNames[0]];
   const raw=XLSX.utils.sheet_to_json(ws,{raw:true});
   dossiersGlobal=dedupeById(raw);
   renderMain();
   return;
  }catch(e){}
 }
}
loadPipe();

function renderMain(){
 document.getElementById("resume").textContent="Dossiers : "+dossiersGlobal.length;
 let ls=0,lsi=0,num=0;
 dossiersGlobal.forEach(r=>{
  const t=(r["TYPE ABONNEMENT"]||"").toUpperCase();
  if(t==="LS") ls++;
  else if(t==="LSI") lsi++;
  else if(t.includes("NUM")) num++;
 });
 document.getElementById("subresume").textContent=`LS : ${ls} | LSI : ${lsi} | Numérique : ${num}`;
 const tbody=document.querySelector("#tableDossiers tbody");
 tbody.innerHTML="";
 dossiersGlobal.forEach(r=>{
  const id=(r["ID DOSSIER"]||"").toString().trim();
  tbody.innerHTML+=`<tr>
   <td>${r["ID DOSSIER"]||""}</td>
   <td>${formatDate(r["DATE CREATION DOSSIER"])}</td>
   <td class="num">${daysBetween(r["DATE CREATION DOSSIER"])}</td>
   <td>${r["ETAPE"]||""}</td>
   <td>${makeStatutInput(id)}</td>
   <td>${r["CLIENT"]||""}</td>
   <td>${r["TYPE ABONNEMENT"]||""}</td>
   <td>${r["SUPPORT"]||""}</td>
   <td>${r["ADR. GEO"]||""}</td>
  </tr>`;
 });
 attachStatutListeners();
}

document.getElementById("searchInput").addEventListener("keyup",()=>{
 const q=searchInput.value.toLowerCase();
 const tbody=document.querySelector("#tableDossiers tbody");
 tbody.innerHTML="";
 let cpt=0;
 dossiersGlobal.forEach(r=>{
  const txt=(r["ID DOSSIER"]+" "+r["CLIENT"]+" "+r["TYPE ABONNEMENT"]+" "+r["SUPPORT"]).toLowerCase();
  if(txt.includes(q)){
   cpt++;
   const id=(r["ID DOSSIER"]||"").toString().trim();
   tbody.innerHTML+=`<tr>
    <td>${r["ID DOSSIER"]||""}</td>
    <td>${formatDate(r["DATE CREATION DOSSIER"])}</td>
    <td class="num">${daysBetween(r["DATE CREATION DOSSIER"])}</td>
    <td>${r["ETAPE"]||""}</td>
    <td>${makeStatutInput(id)}</td>
    <td>${r["CLIENT"]||""}</td>
    <td>${r["TYPE ABONNEMENT"]||""}</td>
    <td>${r["SUPPORT"]||""}</td>
    <td>${r["ADR. GEO"]||""}</td>
   </tr>`;
  }
 });
 document.getElementById("resume").textContent="Dossiers : "+cpt;
 attachStatutListeners();
});

document.getElementById("fileInput").addEventListener("change",e=>{
 const file=e.target.files[0];
 if(!file) return;
 const reader=new FileReader();
 reader.onload=evt=>{
  const data=evt.target.result;
  const wb=XLSX.read(data,{type:"array"});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const raw=XLSX.utils.sheet_to_json(ws,{raw:true});
  dossiersGlobal=dedupeById(raw);
  renderMain();
 };
 reader.readAsArrayBuffer(file);
});

document.getElementById("btnSaveAll").onclick=()=>{
 const inputs=document.querySelectorAll(".statut-input");
 if(inputs.length===0){alert("Aucun dossier chargé.");return;}
 const btn=document.getElementById("btnSaveAll");
 inputs.forEach(inp=>{
  const id=inp.dataset.id;
  const val=inp.value;
  if(id && window._saveStatut) window._saveStatut(id,val);
 });
 btn.textContent="✅ Enregistré";
 setTimeout(()=>btn.textContent="💾 Enregistrer statuts",2000);
};

document.getElementById("btnNettoyage").onclick=()=>{
 dossiersNettoyage=[];
 dossiersGlobal.forEach(r=>{
  const dg=daysBetween(r["DATE CREATION DOSSIER"]);
  const de=daysBetween(r["DATE CREATION TACHE"]);
  if(dg>=45&&de>=14) dossiersNettoyage.push({r,dg,de});
 });
 const tbody=document.querySelector("#tableNettoyage tbody");
 tbody.innerHTML="";
 dossiersNettoyage.forEach(o=>{
  const r=o.r;
  tbody.innerHTML+=`<tr>
   <td>${r["ID DOSSIER"]||""}</td>
   <td>${formatDate(r["DATE CREATION DOSSIER"])}</td>
   <td class="num">${o.dg}</td>
   <td class="num">${o.de}</td>
   <td>${r["ETAPE"]||""}</td>
   <td>${r["CLIENT"]||""}</td>
   <td>${r["TYPE ABONNEMENT"]||""}</td>
   <td>${r["SUPPORT"]||""}</td>
   <td>${r["ADR. GEO"]||""}</td>
  </tr>`;
 });
 document.getElementById("popupNettoyageTitle").textContent=
  "Dossiers à geler ("+dossiersNettoyage.length+") – ≥45 jrs + ≥14 jrs";
 document.getElementById("popupNettoyage").style.display="flex";
};

function closeNettoyage(){
 document.getElementById("popupNettoyage").style.display="none";
}

document.getElementById("btnExport").onclick=()=>{
 const q=document.getElementById("searchInput").value.toLowerCase();
 let dataExport=[];
 dossiersGlobal.forEach(r=>{
  const txt=(r["ID DOSSIER"]+" "+r["CLIENT"]+" "+r["TYPE ABONNEMENT"]+" "+r["SUPPORT"]).toLowerCase();
  if(!q||txt.includes(q)){
   const id=(r["ID DOSSIER"]||"").toString().trim();
   dataExport.push({
    "ID DOSSIER":r["ID DOSSIER"]||"",
    "DATE CREATION DOSSIER":formatDate(r["DATE CREATION DOSSIER"]),
    "DURÉE (j)":daysBetween(r["DATE CREATION DOSSIER"]),
    "ETAPE":r["ETAPE"]||"",
    "STATUT":window._getStatut ? window._getStatut(id) : "",
    "CLIENT":r["CLIENT"]||"",
    "TYPE ABONNEMENT":r["TYPE ABONNEMENT"]||"",
    "SUPPORT":r["SUPPORT"]||"",
    "ADR. GEO":r["ADR. GEO"]||""
   });
  }
 });
 const ws=XLSX.utils.json_to_sheet(dataExport);
 const wb=XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb,ws,"Export");
 XLSX.writeFile(wb,"export_dossiers.xlsx");
};
</script>
</body>
</html>
