<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Sites critiques Top 50</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {font-family: Arial; padding:20px; background:linear-gradient(135deg,#e6ecf3,#f9f9f9);}
.header {display:flex; justify-content:space-between; align-items:center;}
h1 {color:#003366;}
button {padding:10px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-left:5px;}
.btn-retour {background:#003366;color:white;}
.btn-export {background:#228B22;color:white;}
input {width:100%; padding:10px; margin:15px 0; border-radius:8px; border:1px solid #ccc;}
table {width:100%; border-collapse:collapse; background:white;}
th,td {padding:10px; border-bottom:1px solid #ddd;}
th {background:#003366;color:white;}
</style>
</head>

<body>

<div class="header">
<h1>Sites critiques Top 50</h1>
<div>
<button class="btn-retour" onclick="location.href='index.html'">Retour</button>
<button class="btn-export" onclick="exportExcel()">Exporter</button>
</div>
</div>

<input type="text" id="search" placeholder="Rechercher..." onkeyup="filterTable()">

<div>Total : <span id="total">0</span></div>

<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>

<script>
let data=[], filtered=[], headers=[];

// AUTO LOAD fichier local (même dossier)
async function loadExcel(){
    try{
        const response = await fetch("./Top 50.xlsx");
        const buffer = await response.arrayBuffer();

        const workbook = XLSX.read(buffer, {type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);

        data = json;
        filtered = json;
        headers = Object.keys(json[0]);

        render(filtered);
    }catch(e){
        alert("Erreur chargement fichier Top 50.xlsx (mets le fichier dans le même dossier)");
    }
}

function render(dataset){
    let thead="<tr>";
    headers.forEach(h=>thead+="<th>"+h+"</th>");
    thead+="</tr>";
    document.getElementById("thead").innerHTML=thead;

    let tbody="";
    dataset.forEach(r=>{
        tbody+="<tr>";
        headers.forEach(h=>tbody+="<td>"+(r[h]||"")+"</td>");
        tbody+="</tr>";
    });
    document.getElementById("tbody").innerHTML=tbody;

    document.getElementById("total").innerText=dataset.length;
}

function filterTable(){
    let v=document.getElementById("search").value.toLowerCase();
    filtered=data.filter(r=>headers.some(h=>String(r[h]).toLowerCase().includes(v)));
    render(filtered);
}

function exportExcel(){
    if(filtered.length===0){alert("Aucune donnée");return;}
    const ws=XLSX.utils.json_to_sheet(filtered);
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Top50");
    XLSX.writeFile(wb,"Top50_filtre.xlsx");
}

loadExcel();
</script>

</body>
</html>
